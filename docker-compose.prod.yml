# Production stack: uses pre-built images from GHCR (no local build stages)
# Deploy via Portainer (Git stack) or: docker stack deploy -c docker-compose.prod.yml verdify

services:
  db:
    image: postgres:12
    env_file:
      - .env.prod
    environment:
      - PGDATA=/var/lib/postgresql/data/pgdata
      - POSTGRES_PASSWORD_FILE=/run/secrets/verdify_postgres_password
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - type: bind
        source: /mnt/stacks/verdify/db
        target: /var/lib/postgresql/data/pgdata
    healthcheck:
      # Use container env (double $) so it evaluates at runtime
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 10s
    deploy:
      placement:
        constraints:
          - node.hostname == onyx
      restart_policy:
        condition: any
    secrets:
      - verdify_postgres_password
    networks:
      - default

  prestart:
    image: ${DOCKER_IMAGE_BACKEND?Variable not set}:${TAG-latest}
    command: bash scripts/prestart.sh
    env_file:
      - .env.prod
    environment:
      - DOMAIN=${DOMAIN}
      - FRONTEND_HOST=${FRONTEND_HOST?Variable not set}
      - ENVIRONMENT=${ENVIRONMENT}
      - BACKEND_CORS_ORIGINS=${BACKEND_CORS_ORIGINS}
      - SECRET_KEY_FILE=/run/secrets/verdify_secret_key
      - FIRST_SUPERUSER=${FIRST_SUPERUSER?Variable not set}
      - FIRST_SUPERUSER_PASSWORD_FILE=/run/secrets/verdify_first_superuser_password
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD_FILE=/run/secrets/verdify_smtp_password
      - EMAILS_FROM_EMAIL=${EMAILS_FROM_EMAIL}
      - POSTGRES_SERVER=db
      - POSTGRES_PORT=${POSTGRES_PORT}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER?Variable not set}
      - POSTGRES_PASSWORD_FILE=/run/secrets/verdify_postgres_password
      - SENTRY_DSN=${SENTRY_DSN}
    depends_on:
      - db
    deploy:
      placement:
        constraints:
          - node.hostname == onyx
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 10
        window: 30s
    secrets:
      - verdify_secret_key
      - verdify_first_superuser_password
      - verdify_postgres_password
      - verdify_smtp_password
    networks:
      - shared-services
      - default

  backend:
    image: ${DOCKER_IMAGE_BACKEND?Variable not set}:${TAG-latest}
    env_file:
      - .env.prod
    environment:
      - DOMAIN=${DOMAIN}
      - FRONTEND_HOST=${FRONTEND_HOST?Variable not set}
      - ENVIRONMENT=${ENVIRONMENT}
      - BACKEND_CORS_ORIGINS=${BACKEND_CORS_ORIGINS}
      - SECRET_KEY_FILE=/run/secrets/verdify_secret_key
      - FIRST_SUPERUSER=${FIRST_SUPERUSER?Variable not set}
      - FIRST_SUPERUSER_PASSWORD_FILE=/run/secrets/verdify_first_superuser_password
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD_FILE=/run/secrets/verdify_smtp_password
      - EMAILS_FROM_EMAIL=${EMAILS_FROM_EMAIL}
      - POSTGRES_SERVER=db
      - POSTGRES_PORT=${POSTGRES_PORT}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER?Variable not set}
      - POSTGRES_PASSWORD_FILE=/run/secrets/verdify_postgres_password
      - SENTRY_DSN=${SENTRY_DSN}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/utils/health-check/"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      placement:
        constraints:
          - node.hostname == onyx
      restart_policy:
        condition: any
    labels:
      - traefik.enable=true
      - traefik.docker.network=shared-services
      - traefik.constraint-label=shared-services
      - traefik.http.services.${STACK_NAME?Variable not set}-backend.loadbalancer.server.port=8000
      - traefik.http.routers.${STACK_NAME?Variable not set}-backend-http.rule=Host(`api.${DOMAIN?Variable not set}`)
      - traefik.http.routers.${STACK_NAME?Variable not set}-backend-http.entrypoints=web
      - traefik.http.routers.${STACK_NAME?Variable not set}-backend-http.middlewares=redirect-to-https
      - traefik.http.routers.${STACK_NAME?Variable not set}-backend-https.rule=Host(`api.${DOMAIN?Variable not set}`)
      - traefik.http.routers.${STACK_NAME?Variable not set}-backend-https.entrypoints=websecure
      - traefik.http.routers.${STACK_NAME?Variable not set}-backend-https.tls=true
      - traefik.http.routers.${STACK_NAME?Variable not set}-backend-https.tls.certresolver=cloudflare
      - traefik.http.routers.${STACK_NAME}-backend-https.priority=10
    secrets:
      - verdify_secret_key
      - verdify_first_superuser_password
      - verdify_postgres_password
      - verdify_smtp_password
    networks:
      - shared-services
      - default

  frontend:
    image: ${DOCKER_IMAGE_FRONTEND?Variable not set}:${TAG-latest}
    env_file:
      - .env.prod
    deploy:
      mode: global
      placement:
        constraints:
          - node.labels.verdify_frontend == true
      restart_policy:
        condition: any
    labels:
      - traefik.enable=true
      - traefik.docker.network=shared-services
      - traefik.constraint-label=shared-services
      - traefik.http.services.${STACK_NAME?Variable not set}-frontend.loadbalancer.server.port=80
      - traefik.http.routers.${STACK_NAME?Variable not set}-frontend-http.rule=Host(`app.${DOMAIN?Variable not set}`)
      - traefik.http.routers.${STACK_NAME?Variable not set}-frontend-http.entrypoints=web
      - traefik.http.routers.${STACK_NAME?Variable not set}-frontend-http.middlewares=redirect-to-https
      - traefik.http.routers.${STACK_NAME?Variable not set}-frontend-https.rule=Host(`app.${DOMAIN?Variable not set}`)
      - traefik.http.routers.${STACK_NAME?Variable not set}-frontend-https.entrypoints=websecure
      - traefik.http.routers.${STACK_NAME?Variable not set}-frontend-https.tls=true
      - traefik.http.routers.${STACK_NAME?Variable not set}-frontend-https.tls.certresolver=cloudflare
      - traefik.http.routers.${STACK_NAME}-frontend-https.priority=10      
    networks:
      - shared-services
      - default

networks:
  shared-services:
    external: true
  default:
    driver: overlay

secrets:
  verdify_secret_key:
    external: true
  verdify_first_superuser_password:
    external: true
  verdify_postgres_password:
    external: true
  verdify_smtp_password:
    external: true
