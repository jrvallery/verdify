apiVersion: 1

datasources:
  - name: TimescaleDB (Verdify)
    type: postgres
    uid: verdify-tsdb
    url: timescaledb:5432
    database: verdify
    user: verdify
    secureJsonData:
      password: ${POSTGRES_PASSWORD}
    jsonData:
      database: verdify
      sslmode: disable
      postgresVersion: 1600
      timescaledb: true
    isDefault: true
    editable: false
