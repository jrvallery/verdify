server {
    listen 80;
    server_name _;
    
    location / {
        proxy_pass http://verdify-grafana:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Inject CSS to hide "Powered by Grafana" into every HTML response
        sub_filter '</head>' '<style>
            .css-1jnma2h,
            [class*="PoweredBy"],
            a[href*="grafana.com/oss"],
            a[href*="grafana.com"][target="_blank"]:last-child,
            footer a[href*="grafana"],
            div[class*="css-"][class*="powered"] {
                display: none !important;
                visibility: hidden !important;
                height: 0 !important;
                overflow: hidden !important;
            }
        </style></head>';
        sub_filter_once off;
        sub_filter_types text/html;
        
        # Required for sub_filter to work with gzipped responses
        proxy_set_header Accept-Encoding "";
    }
    
    # WebSocket support for live updates
    location /api/live/ {
        proxy_pass http://verdify-grafana:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }
}
