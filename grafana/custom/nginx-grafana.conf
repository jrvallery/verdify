# /render/ responses are heavy: each is a Headless Chromium snapshot
# of a Grafana panel. Per-render time is ~6s solo and 20s under burst
# load. Cache them in a small disk pool so repeated requests within
# the cache TTL hit fast and don't pile up new render jobs in the
# image-renderer queue.
proxy_cache_path /var/cache/nginx/render
                 levels=1:2
                 keys_zone=render_cache:10m
                 max_size=200m
                 inactive=10m
                 use_temp_path=off;

server {
    listen 80;
    server_name _;

    # Cached fast path for the image-renderer endpoint. Cache key is
    # the request URI minus the `_qts` cache-bust query param, so the
    # GrafanaEmbeds client refresh interval gets fresh content while
    # burst loads (many tabs/panels in flight at once) coalesce on
    # the cache.
    location /render/ {
        set $cache_key_uri $request_uri;
        if ($cache_key_uri ~ "^(.*)([?&])_qts=[^&]*&?(.*)$") {
            set $cache_key_uri "$1$2$3";
        }
        proxy_cache_key "$scheme$proxy_host$cache_key_uri";
        proxy_cache render_cache;
        proxy_cache_lock on;
        proxy_cache_lock_timeout 30s;
        proxy_cache_use_stale updating timeout error;
        proxy_cache_valid 200 60s;
        proxy_cache_valid 429 500 502 504 5s;
        # Grafana sets Cache-Control: private on rendered images. Ignore
        # so nginx caches them anyway — we control freshness via our
        # own proxy_cache_valid TTL above.
        proxy_ignore_headers Cache-Control Expires Set-Cookie;
        proxy_hide_header Cache-Control;
        add_header X-Cache-Status $upstream_cache_status always;
        add_header Cache-Control "public, max-age=60" always;

        proxy_pass http://verdify-grafana:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    location / {
        proxy_pass http://verdify-grafana:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Inject CSS to hide "Powered by Grafana" into every HTML response
        sub_filter '</head>' '<style>
            .css-1jnma2h,
            [class*="PoweredBy"],
            a[href*="grafana.com/oss"],
            a[href*="grafana.com"][target="_blank"]:last-child,
            footer a[href*="grafana"],
            div[class*="css-"][class*="powered"] {
                display: none !important;
                visibility: hidden !important;
                height: 0 !important;
                overflow: hidden !important;
            }
        </style></head>';
        sub_filter_once off;
        sub_filter_types text/html;

        # Required for sub_filter to work with gzipped responses
        proxy_set_header Accept-Encoding "";
    }

    # WebSocket support for live updates
    location /api/live/ {
        proxy_pass http://verdify-grafana:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }
}
