networks:
  verdify-proxy:
    name: verdify-proxy
  verdify-internal:
    name: verdify-internal

services:

  # ── Reverse proxy ─────────────────────────────────────────────
  traefik:
    image: traefik:v3.6.7
    container_name: verdify-traefik
    ports:
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic:/etc/traefik/dynamic:ro
      - ./traefik/logs:/var/log/traefik
    networks:
      - verdify-proxy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Database ───────────────────────────────────────────────────
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: verdify-timescaledb
    ports:
      - "127.0.0.1:5432:5432"   # localhost-only; ingestor systemd service uses this
    environment:
      POSTGRES_DB: verdify
      POSTGRES_USER: verdify
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./db/init:/docker-entrypoint-initdb.d:ro
      - tsdb_data:/var/lib/postgresql/data
    networks:
      - verdify-internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U verdify -d verdify"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Grafana ────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana-oss:latest
    container_name: verdify-grafana
    environment:
      GF_SERVER_ROOT_URL: https://graphs.verdify.ai
      GF_SERVER_DOMAIN: graphs.verdify.ai
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      # Anonymous access — read-only Viewer role, no login required
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_NAME: "Main Org."
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
      # Keep login form for admin access
      GF_AUTH_DISABLE_LOGIN_FORM: "false"
      # Lock down viewers — no editing, no admin, no org switching
      GF_USERS_VIEWERS_CAN_EDIT: "false"
      GF_SNAPSHOTS_EXTERNAL_ENABLED: "false"
      # Allow embedding in verdify.ai iframes
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      GF_SECURITY_COOKIE_SAMESITE: "none"
      GF_SECURITY_COOKIE_SECURE: "true"
      # Disable features anonymous users shouldn't see
      GF_EXPLORE_ENABLED: "false"
      GF_ALERTING_ENABLED: "false"
      GF_UNIFIED_ALERTING_ENABLED: "false"
      # Hide branding
      GF_HIDE_VERSION: "true"
      # Image renderer — points at the grafana-renderer sidecar so
      # `/render/d-solo/...` produces real PNGs (instead of Grafana's
      # default "no renderer" placeholder image).
      GF_RENDERING_SERVER_URL: http://grafana-renderer:8081/render
      GF_RENDERING_CALLBACK_URL: http://grafana:3000/
      # Grafana's own concurrent-renders limit. Default is 30 but
      # something in the OSS image effectively rate-limits much
      # earlier — explicitly bumping this and the in-flight cap
      # so the renderer's MAX_CONCURRENCY can actually run at full
      # speed for a homepage burst.
      GF_RENDERING_CONCURRENT_RENDER_REQUEST_LIMIT: "30"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/custom:/usr/share/grafana/public/build/custom:ro
    networks:
      - verdify-proxy
      - verdify-internal
    depends_on:
      timescaledb:
        condition: service_healthy
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=verdify-proxy"

  # ── Grafana Proxy (injects CSS to hide branding) ────────────
  # ── Grafana Image Renderer ──────────────────────────────────
  # Headless Chromium service used by Grafana's `/render/d-solo/...`
  # endpoint to produce static PNGs. Used by the verdify.ai mobile
  # path to swap iframes for images on iOS Safari (which OOM-crashes
  # under the memory pressure of multiple live Grafana panels).
  grafana-renderer:
    image: grafana/grafana-image-renderer:latest
    container_name: verdify-grafana-renderer
    environment:
      ENABLE_METRICS: "true"
      HTTP_PORT: "8081"
      LOG_LEVEL: warn
      # Default mode is single-browser, which serializes all renders.
      # The verdify.ai homepage fires 8 panels at once on iOS — without
      # clustered mode they hit "Too many rendering requests" (429) and
      # most return broken images. Clustered mode spawns up to MAX
      # browser instances in parallel; 3 is enough headroom for the 8
      # panels (the IO-fired requests stagger naturally) without the
      # RAM cost of running all 8 concurrently.
      RENDERING_MODE: clustered
      RENDERING_CLUSTERING_MODE: browser
      # Per-render is ~6s solo but climbs to 20s under N=8 concurrent
      # because the host CPU saturates. Pair this with the nginx
      # render-cache (60s TTL) and the client-side concurrency=2
      # queue to keep response times reasonable: cache hits are
      # instant, fresh renders happen in parallel-of-4 max.
      RENDERING_CLUSTERING_MAX_CONCURRENCY: "4"
      RENDERING_CLUSTERING_TIMEOUT: "30"
    networks:
      - verdify-internal
    restart: unless-stopped

  grafana-proxy:
    image: nginx:alpine
    container_name: verdify-grafana-proxy
    volumes:
      - ./grafana/custom/nginx-grafana.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - grafana
    networks:
      - verdify-proxy
      - verdify-internal
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=verdify-proxy"
      - "traefik.http.routers.grafana.rule=Host(`graphs.verdify.ai`)"
      - "traefik.http.routers.grafana.entrypoints=websecure"
      - "traefik.http.routers.grafana.tls=true"
      - "traefik.http.routers.grafana.middlewares=security-headers-embeddable@file"
      - "traefik.http.routers.grafana.service=grafana-proxy"
      - "traefik.http.services.grafana-proxy.loadbalancer.server.port=80"
    restart: unless-stopped

  # ── MQTT Broker (ESP32 + Sentinel occupancy) ─────────────────
  mqtt:
    image: eclipse-mosquitto:2
    container_name: verdify-mqtt
    ports:
      - "1883:1883"
    volumes:
      - ./mqtt/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./mqtt/password_file:/mosquitto/config/password_file:ro
      - mqtt_data:/mosquitto/data
    networks:
      - verdify-internal
    restart: unless-stopped

  # ── Crop Catalog API + ESP32 Setpoints ───────────────────────
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: verdify-api
    environment:
      DB_HOST: timescaledb
      DB_NAME: verdify
      DB_USER: verdify
      DB_PASS: ${POSTGRES_PASSWORD}
    volumes:
      # Sprint 21: shared Pydantic schema package — mounted read-only so
      # `from verdify_schemas import ...` works without duplicating code into
      # the image. The sys.path.insert('/mnt/iris/verdify') in main.py is a
      # host-side dev convenience; in-container the package resolves via this
      # mount at /app/verdify_schemas.
      - ./verdify_schemas:/app/verdify_schemas:ro
    networks:
      - verdify-proxy
      - verdify-internal
    depends_on:
      timescaledb:
        condition: service_healthy
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=verdify-proxy"
      - "traefik.http.routers.verdify-api.rule=Host(`api.verdify.ai`)"
      - "traefik.http.routers.verdify-api.entrypoints=websecure"
      - "traefik.http.routers.verdify-api.tls=true"
      - "traefik.http.routers.verdify-api.middlewares=api-security-headers@file"
      - "traefik.http.services.verdify-api.loadbalancer.server.port=8080"

  # ── Verdify.ai Website (Quartz static site) ─────────────────
  verdify-site:
    image: nginx:alpine
    container_name: verdify-site
    volumes:
      - ./verdify-site/public:/usr/share/nginx/html:ro
      - ./verdify-site/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=verdify-proxy"
      - "traefik.http.routers.verdify-site.rule=Host(`verdify.ai`) || Host(`www.verdify.ai`)"
      - "traefik.http.routers.verdify-site.entrypoints=websecure"
      - "traefik.http.routers.verdify-site.tls=true"
      - "traefik.http.routers.verdify-site.middlewares=security-headers@file"
      - "traefik.http.services.verdify-site.loadbalancer.server.port=80"
    networks:
      - verdify-proxy
    restart: unless-stopped

  # ── Public Website Analytics ────────────────────────────────
  umami-db:
    image: postgres:16-alpine
    container_name: verdify-umami-db
    environment:
      POSTGRES_DB: umami
      POSTGRES_USER: umami
      POSTGRES_PASSWORD: ${UMAMI_DB_PASSWORD}
    volumes:
      - umami_db_data:/var/lib/postgresql/data
    networks:
      - verdify-internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U umami -d umami"]
      interval: 10s
      timeout: 5s
      retries: 5

  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    container_name: verdify-umami
    environment:
      DATABASE_URL: postgresql://umami:${UMAMI_DB_PASSWORD}@umami-db:5432/umami
      DATABASE_TYPE: postgresql
      APP_SECRET: ${UMAMI_APP_SECRET}
    depends_on:
      umami-db:
        condition: service_healthy
    networks:
      - verdify-proxy
      - verdify-internal
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=verdify-proxy"
      - "traefik.http.middlewares.umami-share-redirect.redirectregex.regex=^https://analytics\\.verdify\\.ai/$"
      - "traefik.http.middlewares.umami-share-redirect.redirectregex.replacement=https://analytics.verdify.ai/share/dceaeb6aa6d60a01/Verdify"
      - "traefik.http.middlewares.umami-share-redirect.redirectregex.permanent=false"
      - "traefik.http.routers.umami-share.rule=Host(`analytics.verdify.ai`) && Path(`/`)"
      - "traefik.http.routers.umami-share.entrypoints=websecure"
      - "traefik.http.routers.umami-share.tls=true"
      - "traefik.http.routers.umami-share.priority=200"
      - "traefik.http.routers.umami-share.middlewares=umami-share-redirect@docker,api-security-headers@file"
      - "traefik.http.routers.umami-share.service=umami"
      - "traefik.http.routers.umami.rule=Host(`analytics.verdify.ai`)"
      - "traefik.http.routers.umami.entrypoints=websecure"
      - "traefik.http.routers.umami.tls=true"
      - "traefik.http.routers.umami.middlewares=api-security-headers@file"
      - "traefik.http.services.umami.loadbalancer.server.port=3000"

  goaccess:
    image: allinurl/goaccess:latest
    container_name: verdify-goaccess
    volumes:
      - ./traefik/logs:/var/log/traefik:ro
      - ./goaccess/goaccess.conf:/etc/goaccess/goaccess.conf:ro
      - ./analytics/goaccess:/var/www/goaccess
    entrypoint:
      - /bin/sh
      - -c
      - while true; do goaccess /var/log/traefik/access.log -p /etc/goaccess/goaccess.conf --output=/var/www/goaccess/index.html --no-progress || true; sleep 60; done
    restart: unless-stopped

  goaccess-site:
    image: nginx:alpine
    container_name: verdify-goaccess-site
    volumes:
      - ./analytics/goaccess:/usr/share/nginx/html:ro
    networks:
      - verdify-proxy
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=verdify-proxy"
      - "traefik.http.routers.goaccess.rule=Host(`logs.verdify.ai`)"
      - "traefik.http.routers.goaccess.entrypoints=websecure"
      - "traefik.http.routers.goaccess.tls=true"
      - "traefik.http.routers.goaccess.middlewares=api-security-headers@file"
      - "traefik.http.services.goaccess.loadbalancer.server.port=80"

  # ── Promtail (log shipping to Loki) ────────────────────────────
  promtail:
    image: grafana/promtail:latest
    container_name: verdify-promtail
    network_mode: host
    volumes:
      - ./promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/log/journal:/var/log/journal:ro
      - /run/log/journal:/run/log/journal:ro
      - /etc/machine-id:/etc/machine-id:ro
      - /srv/verdify/state:/srv/verdify/state:ro
      - promtail_positions:/tmp
    command: -config.file=/etc/promtail/config.yml
    restart: unless-stopped

volumes:
  tsdb_data:
  grafana_data:
  mqtt_data:
  promtail_positions:
  umami_db_data:
