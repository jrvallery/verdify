      summary: Ingest mixed telemetry batch (sensors, actuators, status, inputs) - supports gzip compression
      security:
        - DeviceToken: []
      parameters:
        - $ref: '#/components/parameters/IdempotencyKeyParam'
        - name: Content-Encoding
          in: header
          description: Request body compression (optional)
