openapi: 3.1.0
info:
  title: Project Verdify MVP API
  version: "2.0"
  description: >
    REST API for AI-powered greenhouse MVP. HTTPS required for all endpoints. Metric units on wire.
    ETag used for config/plan. Device identity via device_name (verdify-aabbcc).
    Rate limiting applies to telemetry endpoints to prevent DoS attacks.
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
servers:
  - url: https://api.verdify.ai/api/v1
tags:
  - name: Authentication
    description: User and device authentication endpoints including registration, login, and token management
  - name: Onboarding
    description: Device discovery, claiming, and initial setup endpoints
  - name: Config
    description: Configuration management including publishing, fetching, and diff operations
  - name: Plan
    description: Cultivation plan management and retrieval
  - name: Telemetry
    description: Device telemetry ingestion endpoints for sensors, actuators, status, and inputs
  - name: CRUD
    description: Create, read, update, delete operations for resources like greenhouses, controllers, sensors, actuators
  - name: Meta
    description: Health and metadata endpoints
security:
  - UserJWT: []
paths:
  /auth/register:
    post:
      tags: [Authentication]
      summary: Register new user account
      operationId: registerUser
      security: []
      parameters:
        - $ref: '#/components/parameters/CSRFTokenParam'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UserRegisterRequest' }
            examples:
              ex:
                value:
                  email: "user@example.com"
                  password: "secure_password"
                  full_name: "John Doe"
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UserRegisterResponse' }
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
  /auth/login:
    post:
      operationId: loginUser
      tags: [Authentication]
      summary: Login and obtain JWT
      security: []
      parameters:
        - $ref: '#/components/parameters/CSRFTokenParam'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UserLoginRequest' }
            examples:
              ex:
                value:
                  email: "user@example.com"
                  password: "secure_password"
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UserLoginResponse' }
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/csrf:
    get:
      operationId: getCsrfToken
      tags: [Authentication]
      summary: Get CSRF token for browser-based authentication
      security: []
      responses:
        '200':
          description: CSRF token generated
          content:
            application/json:
              schema:
                type: object
                required: [csrf_token, expires_at]
                properties:
                  csrf_token:
                    type: string
                    description: CSRF token for use in X-CSRF-Token header
                  expires_at:
                    type: string
                    format: date-time
                    description: UTC timestamp when CSRF token expires
              examples:
                ex:
                  value:
                    csrf_token: "csrf_1234567890abcdef"
                    expires_at: "2025-08-13T19:05:00Z"
        '400':
          $ref: '#/components/responses/BadRequest'

  /auth/revoke-token:
    post:
      operationId: revokeUserToken
      tags: [Authentication]
      summary: Revoke current user JWT (logout)
      security:
        - UserJWT: []
      responses:
        '204':
          description: Token successfully revoked
        '401':
          $ref: '#/components/responses/Unauthorized'

  /controllers/{controller_id}/revoke-token:
    post:
      operationId: revokeControllerToken
      tags: [Authentication]
      summary: Revoke device token for controller (admin)
      security:
        - UserJWT: []
      parameters:
        - $ref: '#/components/parameters/ControllerIdParam'
      responses:
        '204':
          description: Device token successfully revoked
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /controllers/{controller_id}/rotate-token:
    post:
      operationId: rotateControllerToken
      tags: [Authentication]
      summary: Rotate device token for controller
      security:
        - UserJWT: []
      parameters:
        - $ref: '#/components/parameters/ControllerIdParam'
      responses:
        '200':
          description: New device token generated
          content:
            application/json:
              schema:
                type: object
                required: [device_token, expires_at]
                properties:
                  device_token: { type: string }
                  expires_at: { type: string, format: date-time }
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  # User Management CRUD
  /users:
    get:
      operationId: listUsers
      tags: [Authentication]
      summary: List users
      description: Retrieve users with pagination and filtering (admin only)
      security:
        - UserJWT: []
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
      responses:
        '200':
          description: Users retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Paginated'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

    post:
      operationId: createUser
      tags: [Authentication]
      summary: Create user (admin)
      description: Create new user without the need to be logged in (admin only)
      security:
        - UserJWT: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UserCreate' }
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UserPublic' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '409': { $ref: '#/components/responses/Conflict' }

  /users/{user_id}:
    get:
      operationId: getUser
      tags: [Authentication]
      summary: Get user by ID
      description: Get a specific user by id (admin only)
      security:
        - UserJWT: []
      parameters:
        - name: user_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: User retrieved
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UserPublic' }
        '404': { $ref: '#/components/responses/NotFound' }

    patch:
      operationId: updateUser
      tags: [Authentication]
      summary: Update user
      description: Update a user (admin only)
      security:
        - UserJWT: []
      parameters:
        - name: user_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UserUpdate' }
      responses:
        '200':
          description: User updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UserPublic' }
        '404': { $ref: '#/components/responses/NotFound' }

    delete:
      operationId: deleteUser
      tags: [Authentication]
      summary: Delete user
      description: Delete a user (admin only)
      security:
        - UserJWT: []
      parameters:
        - name: user_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204':
          description: User deleted
        '404': { $ref: '#/components/responses/NotFound' }

  /users/me:
    get:
      operationId: getCurrentUser
      tags: [Authentication]
      summary: Get current user
      description: Get current user profile
      security:
        - UserJWT: []
      responses:
        '200':
          description: Current user profile
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UserPublic' }
        '401': { $ref: '#/components/responses/Unauthorized' }

    patch:
      operationId: updateCurrentUser
      tags: [Authentication]
      summary: Update current user
      description: Update own user profile
      security:
        - UserJWT: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UserUpdate' }
      responses:
        '200':
          description: User updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UserPublic' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }

    delete:
      operationId: deleteCurrentUser
      tags: [Authentication]
      summary: Delete current user
      description: Delete own user account
      security:
        - UserJWT: []
      responses:
        '204':
          description: User deleted
        '401': { $ref: '#/components/responses/Unauthorized' }

  /users/me/password:
    patch:
      operationId: updateCurrentUserPassword
      tags: [Authentication]
      summary: Update current user password
      description: Update own password
      security:
        - UserJWT: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PasswordUpdate' }
      responses:
        '200':
          description: Password updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Message' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /users/signup:
    post:
      operationId: registerUserPublic
      tags: [Authentication]
      summary: Public user registration
      description: Create new user account (public endpoint)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UserRegisterRequest' }
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UserPublic' }
        '409': { $ref: '#/components/responses/Conflict' }

  # Enhanced Authentication Endpoints
  /login/access-token:
    post:
      operationId: loginAccessToken
      tags: [Authentication]
      summary: OAuth2 compatible token login
      description: OAuth2 compatible token login, get an access token for future requests
      security: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                username: { type: string }
                password: { type: string }
                grant_type: { type: string, default: "password" }
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UserLoginResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }

  /login/test-token:
    post:
      operationId: testToken
      tags: [Authentication]
      summary: Test access token
      description: Validate current access token and return user info
      security:
        - UserJWT: []
      responses:
        '200':
          description: Token valid
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UserPublic' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /login/password-recovery/{email}:
    post:
      operationId: initiatePasswordRecovery
      tags: [Authentication]
      summary: Initiate password recovery
      description: Send password recovery email to user
      security: []
      parameters:
        - name: email
          in: path
          required: true
          schema: { type: string, format: email }
      responses:
        '200':
          description: Recovery email sent
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Message' }
        '400': { $ref: '#/components/responses/BadRequest' }

  /login/password-recovery-html-content/{email}:
    post:
      operationId: initiatePasswordRecoveryHtml
      tags: [Authentication]
      summary: Initiate password recovery (HTML content)
      description: Send password recovery email with HTML content to user
      security: []
      parameters:
        - name: email
          in: path
          required: true
          schema: { type: string, format: email }
      responses:
        '200':
          description: Recovery email sent
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Message' }
        '400': { $ref: '#/components/responses/BadRequest' }

  /login/reset-password:
    post:
      operationId: resetPassword
      tags: [Authentication]
      summary: Reset password
      description: Reset user password using recovery token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PasswordResetRequest' }
      responses:
        '200':
          description: Password reset successful
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Message' }
        '400': { $ref: '#/components/responses/BadRequest' }

  /hello:
    post:
      operationId: announceController
      tags: [Onboarding]
      summary: Controller announces itself on first boot
      security: [] # public (no auth) for hello
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HelloRequest'
            examples:
              ex:
                value:
                  device_name: verdify-a1b2c3
                  claim_code: "123456"
                  hardware_profile: kincony_a16s
                  firmware: "esphome-2025.8"
                  ts_utc: "2025-08-12T18:00:00Z"
      responses:
        '200':
          description: Hello accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HelloResponse'
              examples:
                pending:
                  value:
                    status: pending
                    message: "Waiting for user claim"
                claimed:
                  value:
                    status: claimed
                    controller_uuid: "1b5a0b5f-1d8f-4fc2-9c4d-f1a6a7f9d1a3"
                    greenhouse_id: "9a94a0a7-d039-4d9b-86f2-46b1c7f7942c"
                    message: "Controller already claimed"
        '400':
          $ref: '#/components/responses/BadRequest'
  /controllers/claim:
    post:
      operationId: claimController
      tags: [Onboarding]
      summary: Claim a controller to a greenhouse and issue device_token
      security:
        - UserJWT: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ControllerClaimRequest' }
            examples:
              ex:
                value:
                  device_name: verdify-a1b2c3
                  claim_code: "932611"
                  greenhouse_id: "9a94a0a7-d039-4d9b-86f2-46b1c7f7942c"
      responses:
        '201':
          description: Claimed
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ControllerClaimResponse' }
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
  /controllers/{controller_id}/token-exchange:
    post:
      operationId: exchangeControllerToken
      tags: [Onboarding]
      summary: One-time exchange of claim_code + device_name for long-lived device_token & initial ETags
      description: |
        Performs a single-use token exchange after /hello indicates status=claimed. Idempotent: a second identical request (after success) returns 200 with same values (no new token) while first successful call returns 201.
      security: [] # public (unauthenticated, guarded by claim_code & freshness)
      parameters:
        - $ref: '#/components/parameters/ControllerIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/TokenExchangeRequest' }
            examples:
              ex:
                value:
                  device_name: verdify-a1b2c3
                  claim_code: "123456"
      responses:
        '201':
          description: Token issued (first successful exchange)
          headers:
            ETag-Config:
              description: Strong config ETag the controller should use in If-None-Match on subsequent GET
              schema: { type: string, pattern: '^config:v[0-9]+:[0-9a-f]{8}$' }
            ETag-Plan:
              description: Strong plan ETag the controller should use in If-None-Match on subsequent GET
              schema: { type: string, pattern: '^plan:v[0-9]+:[0-9a-f]{8}$' }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TokenExchangeResponse' }
              examples:
                ex:
                  value:
                    device_token: "eyJhbGciOi..."
                    config_etag: "config:v42:1a2b3c4d"
                    plan_etag: "plan:v17:0f9e8d7c"
                    expires_at: "2025-06-15T10:30:00Z"
        '200':
          description: Idempotent replay (token previously issued)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TokenExchangeResponse' }
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
  /controllers/by-name/{device_name}/config:
    get:
      operationId: getConfigByDeviceName
      tags: [Config]
      summary: Controller fetches materialized config by device_name (ETag supported, gzip compression available)
      security:
        - DeviceToken: []
      parameters:
        - $ref: '#/components/parameters/DeviceNameParam'
        - $ref: '#/components/parameters/IfNoneMatch'
        - name: Accept-Encoding
          in: header
          description: Compression preferences
          schema:
            type: string
            enum: [gzip, identity]
            default: identity
          example: gzip
      responses:
        '200':
          description: Config payload
          headers:
            ETag:
              description: "Strong ETag format. Format: config:v<version>:<sha8> (first 8 hex of SHA-256)"
              schema: { type: string, pattern: '^config:v[0-9]+:[0-9a-f]{8}$' }
            Last-Modified:
              schema: { type: string, format: date-time }
            Content-Encoding:
              description: Compression algorithm used (if any)
              schema:
                type: string
                enum: [gzip, identity]
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ConfigPayload' }
        '304':
          description: Not Modified
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /controllers/{controller_id}/plan:
    get:
      operationId: getPlanByControllerId
      tags: [Plan]
      summary: Controller fetches current plan (ETag supported)
      security:
        - DeviceToken: []
      parameters:
        - $ref: '#/components/parameters/ControllerIdParam'
        - $ref: '#/components/parameters/IfNoneMatch'
      responses:
        '200':
          description: Plan payload
          headers:
            ETag:
              description: "Strong ETag of canonical JSON excluding volatile fields. Format: plan:v<version>:<sha8>"
              schema: { type: string, pattern: '^plan:v[0-9]+:[0-9a-f]{8}$' }
            Last-Modified:
              schema: { type: string, format: date-time }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PlanPayload' }
        '304': { description: Not Modified }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /controllers/me/config:
    get:
      operationId: getMyConfig
      tags: [Config]
      summary: Controller fetches current config for authenticated device (identity inferred from token)
      security:
        - DeviceToken: []
      parameters:
        - $ref: '#/components/parameters/IfNoneMatch'
      responses:
        '200':
          description: Configuration payload
          headers:
            ETag:
              description: Strong config ETag config:v<version>:<sha8>
              schema:
                type: string
                pattern: '^config:v[0-9]+:[0-9a-f]{8}$'
            Last-Modified:
              schema: { type: string, format: date-time }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ConfigPayload' }
        '304': { description: Not Modified }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /controllers/me/plan:
    get:
      operationId: getMyPlan
      tags: [Plan]
      summary: Controller fetches current plan for authenticated device (identity inferred from token)
      security:
        - DeviceToken: []
      parameters:
        - $ref: '#/components/parameters/IfNoneMatch'
      responses:
        '200':
          description: Plan payload
          headers:
            ETag:
              description: Strong plan ETag plan:v<version>:<sha8>
              schema:
                type: string
                pattern: '^plan:v[0-9]+:[0-9a-f]{8}$'
            Last-Modified:
              schema: { type: string, format: date-time }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PlanPayload' }
        '304': { description: Not Modified }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /greenhouses/{id}/config/publish:
    post:
      operationId: publishGreenhouseConfig
      tags: [Config]
      summary: Materialize and publish config snapshot for a greenhouse
      security:
        - UserJWT: []
      parameters:
        - $ref: '#/components/parameters/GreenhouseIdParam'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                dry_run: { type: boolean, default: false }
      responses:
        '201':
          description: Published config (new snapshot created)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ConfigPublishResult' }
        '200':
          description: Dry-run preview (no snapshot persisted)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ConfigPublishResult' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }

  /greenhouses/{id}/config/diff:
    get:
      operationId: getGreenhouseConfigDiff
      tags: [Config]
      summary: Diff current DB config vs last published snapshot
      security:
        - UserJWT: []
      parameters:
        - $ref: '#/components/parameters/GreenhouseIdParam'
      responses:
        '200':
          description: JSON patch-like diff
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ConfigDiff' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  # Telemetry ingest (HTTP only)
  /telemetry/sensors:
    post:
      operationId: ingestSensorTelemetry
      tags: [Telemetry]
      summary: Ingest sensor readings (batch)
      security:
        - DeviceToken: []
      parameters:
        - $ref: '#/components/parameters/IdempotencyKeyParam'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/TelemetrySensors' }
      responses:
        '202':
          description: Accepted
          headers:
            X-RateLimit-Limit:
              description: Number of requests allowed per time window
              schema: { type: integer }
            X-RateLimit-Remaining:
              description: Number of requests remaining in current window
              schema: { type: integer }
            X-RateLimit-Reset:
              description: UTC timestamp when rate limit window resets
              schema: { type: integer }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/IngestResult' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '429': { $ref: '#/components/responses/TooManyRequests' }

  /telemetry/actuators:
    post:
      operationId: ingestActuatorTelemetry
      tags: [Telemetry]
      summary: Ingest actuator edge events
      security:
        - DeviceToken: []
      parameters:
        - $ref: '#/components/parameters/IdempotencyKeyParam'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/TelemetryActuators' }
      responses:
        '202':
          description: Accepted
          headers:
            X-RateLimit-Limit:
              description: Number of requests allowed per time window
              schema: { type: integer }
            X-RateLimit-Remaining:
              description: Number of requests remaining in current window
              schema: { type: integer }
            X-RateLimit-Reset:
              description: UTC timestamp when rate limit window resets
              schema: { type: integer }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/IngestResult' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '429': { $ref: '#/components/responses/TooManyRequests' }

  /telemetry/status:
    post:
      operationId: ingestStatusTelemetry
      tags: [Telemetry]
      summary: Ingest controller status frames
      security:
        - DeviceToken: []
