                email_to: { type: string, format: email }
                subject: { type: string }
      responses:
        '200':
          description: Test email sent
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Message' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }

components:
  securitySchemes:
    UserJWT:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: User JWT for app/admin calls
    DeviceToken:
      type: apiKey
      in: header
      name: X-Device-Token
      description: Long-lived device token for controllers

  parameters:
    IfNoneMatch:
      in: header
      name: If-None-Match
      schema: { type: string }
      required: false
    GreenhouseIdParam:
      in: path
      name: id
      required: true
      schema: { type: string, format: uuid }
    ZoneIdParam:
      in: path
      name: id
      required: true
      schema: { type: string, format: uuid }
    CropIdParam:
      in: path
      name: id
      required: true
      schema: { type: string, format: uuid }
    ZoneCropIdParam:
      in: path
      name: id
      required: true
      schema: { type: string, format: uuid }
    ObservationIdParam:
      in: path
      name: id
      required: true
      schema: { type: string, format: uuid }
    ControllerIdParam:
      in: path
      name: controller_id
      required: true
      schema: { type: string, format: uuid }
    ActuatorIdParam:
      in: path
      name: id
      required: true
      schema: { type: string, format: uuid }
    SensorIdParam:
      in: path
      name: id
      required: true
      schema: { type: string, format: uuid }
    FanGroupIdParam:
      in: path
      name: id
      required: true
      schema: { type: string, format: uuid }
    DeviceNameParam:
      in: path
      name: device_name
      required: true
      schema:
        type: string
        pattern: '^verdify-[0-9a-f]{6}$'
    PageParam:
      in: query
      name: page
      schema: { type: integer, minimum: 1, default: 1 }
    PageSizeParam:
      in: query
      name: page_size
      schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
    CSRFTokenParam:
      in: header
      name: X-CSRF-Token
      required: false
      description: CSRF token for browser-based requests (optional for non-browser clients)
      schema: { type: string }
    IdempotencyKeyParam:
      in: header
      name: Idempotency-Key
      required: false
      description: Idempotency key for exactly-once processing (recommended for telemetry)
      schema: { type: string, maxLength: 255 }

  responses:
    BadRequest:
      description: Bad request
      headers:
        X-Request-Id:
          description: Request identifier for tracing
          schema: { type: string }
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
          examples:
            ex:
              value:
                error_code: E400_BAD_REQUEST
                message: "Invalid input"
                timestamp: "2025-08-13T18:05:00Z"
                details:
                  field: "email"
                  reason: "Invalid email format"
                request_id: "req_1234567890abcdef"
    Unauthorized:
      description: Unauthorized
      headers:
        X-Request-Id:
          description: Request identifier for tracing
          schema: { type: string }
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
          examples:
            ex:
              value:
                error_code: E401_UNAUTHORIZED
                message: "Missing/invalid token"
                timestamp: "2025-08-13T18:05:00Z"
                request_id: "req_1234567890abcdef"
    NotFound:
      description: Not found
      headers:
        X-Request-Id:
          description: Request identifier for tracing
          schema: { type: string }
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
          examples:
            ex:
              value:
                error_code: E404_NOT_FOUND
                message: "Resource not found"
                timestamp: "2025-08-13T18:05:00Z"
                request_id: "req_1234567890"
    Conflict:
      description: Conflict (uniqueness violated)
      headers:
        X-Request-Id:
          description: Request identifier for tracing
          schema: { type: string }
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
          examples:
            ex:
              value:
                error_code: E409_CONFLICT
                message: "Unique constraint violated"
                timestamp: "2025-08-13T18:05:00Z"
                request_id: "req_1234567890"
    TooManyRequests:
      description: Rate limit exceeded
      headers:
        X-RateLimit-Limit:
          description: Number of requests allowed per time window
          schema: { type: integer }
        X-RateLimit-Remaining:
          description: Number of requests remaining in current window
          schema: { type: integer }
        X-RateLimit-Reset:
          description: Epoch seconds when the window resets
          schema: { type: integer }
        Retry-After:
          description: Seconds to wait before retry
          schema: { type: integer }
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
          examples:
            ex:
              value:
                error_code: E429_TOO_MANY_REQUESTS
                message: "Rate limit exceeded. Try again in 60 seconds."
                timestamp: "2025-08-13T18:05:00Z"
                request_id: "req_1234567890abcdef"

    Forbidden:
      description: Forbidden - insufficient permissions
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
          examples:
            ex:
              value:
                error_code: E403_FORBIDDEN
                message: "Insufficient permissions"
                timestamp: "2025-08-13T18:05:00Z"
                request_id: "req_1234567890abcdef"

    UnprocessableEntity:
      description: Unprocessable entity - validation failed
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
          examples:
            ex:
              value:
                error_code: E422_UNPROCESSABLE
                message: "Validation failed"
                timestamp: "2025-08-13T18:05:00Z"
                details:
                  - field: "email"
                    value: "invalid-email"
                    expected: "Valid email format"
                request_id: "req_1234567890abcdef"

  schemas:
    # --- Enums / simple types ---
    ErrorCode:
      type: string
      enum:
        - E400_BAD_REQUEST
        - E401_UNAUTHORIZED
        - E403_FORBIDDEN
        - E404_NOT_FOUND
        - E409_CONFLICT
        - E412_PRECONDITION_FAILED
        - E422_UNPROCESSABLE
        - E429_TOO_MANY_REQUESTS
        - E500_INTERNAL
        - E503_SERVICE_UNAVAILABLE
      description: Standardized error codes used across the API
    LocationEnum:
      type: string
      enum: [N, NE, E, SE, S, SW, W, NW]
    SensorKind:
      type: string
      enum:
        - temperature
        - humidity
        - vpd
        - co2
        - light
        - soil_moisture
        - water_flow
        - water_total
        - dew_point
        - absolute_humidity
        - enthalpy_delta
        - air_pressure
        - kwh
        - gas_consumption
        - ppfd
        - wind_speed
        - rainfall
        - power
    SensorScope:
      type: string
      enum: [zone, greenhouse, external]
    ActuatorKind:
      type: string
      enum: [fan, heater, vent, fogger, irrigation_valve, fertilizer_valve, pump, light]
    FailSafeState:
      type: string
      enum: [on, off]
    ButtonKind:
      type: string
      enum: [cool, heat, humid]

    # --- Error response ---
    ErrorResponse:
      type: object
      required: [error_code, message, timestamp, request_id]
      properties:
        error_code:
          $ref: '#/components/schemas/ErrorCode'
          description: Standardized error code
          example: "E409_CONFLICT"
        message:
          type: string
          description: Human-readable error message
          example: "Email already exists"
        timestamp:
          type: string
          format: date-time
          description: ISO 8601 timestamp of when the error occurred
        request_id:
          type: string
          description: Unique request identifier for tracing
          example: "req_1234567890"
        details:
          oneOf:
            - type: array
              items: { $ref: '#/components/schemas/ErrorDetail' }
            - type: object
              additionalProperties: true
            - type: string
          description: Structured error details for field-specific issues
          example:
            field: "email"
            value: "user@example.com"

    ErrorDetail:
      type: object
      required: [field, value, expected]
      properties:
        field:
          type: string
          description: Name of the field that caused the error
          example: "email"
        value:
          description: The actual value that was provided
          example: "invalid-email"
        expected:
          type: string
          description: What was expected for this field
          example: "Valid email address"

    # --- Authentication ---
    UserRegisterRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        full_name:
          type: [string, "null"]
    UserRegisterResponse:
      type: object
      required: [user, access_token]
      properties:
        user:
          type: object
          required: [id, email, created_at]
          properties:
            id: { type: string, format: uuid }
            email: { type: string, format: email }
            full_name: { type: [string, "null"] }
            created_at: { type: string, format: date-time }
        access_token:
          type: string
    UserLoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
    UserLoginResponse:
      type: object
      required: [access_token, token_type, expires_in]
      properties:
        access_token:
          type: string
        token_type:
          type: string
          enum: [bearer]
          default: bearer
        expires_in:
          type: integer
          description: Token expiry in seconds

    # Enhanced User Management Schemas
    UserCreate:
      type: object
      required: [email, password, full_name]
      properties:
        email: { type: string, format: email }
        password: { type: string, minLength: 8 }
        full_name: { type: string }
        is_active: { type: boolean, default: true }
        is_superuser: { type: boolean, default: false }

    UserUpdate:
      type: object
      properties:
        email: { type: string, format: email }
        full_name: { type: string }
        is_active: { type: boolean }
        is_superuser: { type: boolean }

    UserPublic:
      type: object
      properties:
        id: { type: string, format: uuid }
        email: { type: string, format: email }
        full_name: { type: string }
        is_active: { type: boolean }
        is_superuser: { type: boolean }
        created_at: { type: string, format: date-time }

    PasswordUpdate:
      type: object
      required: [current_password, new_password]
      properties:
        current_password: { type: string }
        new_password: { type: string, minLength: 8 }

    PasswordResetRequest:
      type: object
      required: [token, new_password]
      properties:
        token: { type: string }
        new_password: { type: string, minLength: 8 }

    Message:
      type: object
      properties:
        message: { type: string }

    # --- Onboarding ---
    HelloRequest:
      type: object
      required: [device_name, claim_code, hardware_profile, firmware, ts_utc]
      properties:
        device_name:
          type: string
          pattern: '^verdify-[0-9a-f]{6}$'
        claim_code:
          type: string
          pattern: '^\d{6}$'
          description: 6 digit numeric claim code printed on label / shown in captive portal
        hardware_profile:
          type: string
          example: kincony_a16s
        firmware:
          type: string
        ts_utc:
          type: string
          format: date-time
    HelloResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [pending, claimed]
        controller_uuid:
          type: [string, "null"]
          format: uuid
        greenhouse_id:
          type: [string, "null"]
          format: uuid
        retry_after_s:
          type: integer
          minimum: 1
          description: Suggested client poll backoff when status=pending
        message:
          type: string
    TokenExchangeRequest:
      type: object
      required: [device_name, claim_code]
      properties:
        device_name:
          type: string
          pattern: '^verdify-[0-9a-f]{6}$'
        claim_code:
          type: string
          pattern: '^\d{6}$'
    TokenExchangeResponse:
      type: object
      required: [device_token, config_etag, plan_etag, expires_at]
      properties:
        device_token:
          type: string
        config_etag:
          type: string
          pattern: '^config:v[0-9]+:[0-9a-f]{8}$'
        plan_etag:
          type: string
          pattern: '^plan:v[0-9]+:[0-9a-f]{8}$'
        expires_at:
          type: string
          format: date-time
          description: UTC timestamp when device token expires (180 days from issue)

    ControllerClaimRequest:
      type: object
      required: [device_name, claim_code, greenhouse_id]
      properties:
        device_name:
          type: string
          pattern: '^verdify-[0-9a-f]{6}$'
        claim_code:
          type: string
          pattern: '^\d{6}$'
        greenhouse_id:
          type: string
          format: uuid
    ControllerClaimResponse:
      type: object
      required: [controller, device_token, expires_at]
      properties:
        controller: { $ref: '#/components/schemas/Controller' }
        device_token:
          type: string
          description: Long-lived token valid until controller deletion
        expires_at:
          type: string
          format: date-time
          description: UTC timestamp when device token expires (180 days from issue)

    # --- Generic pagination schema ---
    Paginated:
      type: object
      required: [data, page, page_size, total]
      properties:
        data:
          type: array
          description: Array of items for current page
        page:
          type: integer
          minimum: 1
          description: Current page number
        page_size:
          type: integer
          minimum: 1
          maximum: 200
          description: Number of items per page
        total:
          type: integer
          minimum: 0
          description: Total number of items across all pages

    # --- CRUD core entities ---
    Greenhouse:
      type: object
      required: [id, title, is_active, min_temp_c, max_temp_c, min_vpd_kpa, max_vpd_kpa]
      properties:
        id: { type: string, format: uuid }
        title: { type: string, minLength: 1, maxLength: 255 }
        description: { type: [string, "null"], maxLength: 255 }
        is_active: { type: boolean, default: true }
        latitude: { type: [number, "null"], minimum: -90, maximum: 90 }
        longitude: { type: [number, "null"], minimum: -180, maximum: 180 }
        min_temp_c: { type: number, default: 7.0 }
        max_temp_c: { type: number, default: 35.0 }
        min_vpd_kpa: { type: number, default: 0.3 }
        max_vpd_kpa: { type: number, default: 2.5 }
        enthalpy_open_kjkg: { type: number, default: -2.0 }
        enthalpy_close_kjkg: { type: number, default: 1.0 }
        site_pressure_hpa: { type: number, default: 840.0 }
        context_text: { type: [string, "null"], maxLength: 4000 }

    GreenhouseCreate:
      type: object
      required: [title]
      properties:
        title: { type: string, minLength: 1, maxLength: 255 }
        description: { type: [string, "null"], maxLength: 255 }
        is_active: { type: boolean, default: true }
        latitude: { type: [number, "null"], minimum: -90, maximum: 90 }
        longitude: { type: [number, "null"], minimum: -180, maximum: 180 }
        min_temp_c: { type: number, default: 7.0 }
        max_temp_c: { type: number, default: 35.0 }
        min_vpd_kpa: { type: number, default: 0.3 }
        max_vpd_kpa: { type: number, default: 2.5 }
        enthalpy_open_kjkg: { type: number, default: -2.0 }
        enthalpy_close_kjkg: { type: number, default: 1.0 }
        site_pressure_hpa: { type: number, default: 840.0 }
        context_text: { type: [string, "null"], maxLength: 4000 }
    GreenhouseUpdate:
      type: object
      properties:
        title: { type: string }
        description: { type: [string, "null"] }
        is_active: { type: boolean }
        latitude: { type: [number, "null"] }
        longitude: { type: [number, "null"] }
        min_temp_c: { type: number }
        max_temp_c: { type: number }
        min_vpd_kpa: { type: number }
        max_vpd_kpa: { type: number }
        enthalpy_open_kjkg: { type: number }
        enthalpy_close_kjkg: { type: number }
        site_pressure_hpa: { type: number }
        context_text: { type: [string, "null"] }
    GreenhouseList:
      type: object
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/Greenhouse' }
        page: { type: integer }
        page_size: { type: integer }
        total: { type: integer }

    Zone:
      type: object
      required: [id, greenhouse_id, zone_number, location]
      properties:
        id: { type: string, format: uuid }
        greenhouse_id: { type: string, format: uuid }
        zone_number: { type: integer, minimum: 1 }
        location: { $ref: '#/components/schemas/LocationEnum' }
        context_text: { type: [string, "null"], maxLength: 2000 }
    ZoneCreate:
      required: [greenhouse_id, zone_number, location]
      type: object
      properties:
        greenhouse_id: { type: string, format: uuid }
        zone_number: { type: integer, minimum: 1 }
        location: { $ref: '#/components/schemas/LocationEnum' }
        context_text: { type: [string, "null"] }
    ZoneUpdate:
      type: object
      properties:
        zone_number: { type: integer, minimum: 1 }
        location: { $ref: '#/components/schemas/LocationEnum' }
        context_text: { type: [string, "null"] }
    ZoneList:
      type: object
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/Zone' }
        page: { type: integer }
        page_size: { type: integer }
        total: { type: integer }

    Crop:
      type: object
      required: [id, name]
      properties:
        id: { type: string, format: uuid }
        name: { type: string, maxLength: 255 }
        description: { type: [string, "null"], maxLength: 500 }
        expected_yield_per_sqm: { type: [number, "null"] }
        growing_days: { type: [integer, "null"] }
        recipe:
          anyOf:
            - type: object
              additionalProperties: true
            - type: "null"
    CropCreate:
      required: [name]
      type: object
      properties:
        name: { type: string }
        description: { type: [string, "null"] }
        expected_yield_per_sqm: { type: [number, "null"] }
        growing_days: { type: [integer, "null"] }
        recipe:
          anyOf:
            - type: object
              additionalProperties: true
            - type: "null"
    CropUpdate:
      type: object
      properties:
        name: { type: string }
        description: { type: [string, "null"] }
        expected_yield_per_sqm: { type: [number, "null"] }
        growing_days: { type: [integer, "null"] }
        recipe:
          anyOf:
            - type: object
              additionalProperties: true
            - type: "null"
    CropList:
      type: object
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/Crop' }
        page: { type: integer }
        page_size: { type: integer }
        total: { type: integer }

    ZoneCrop:
      type: object
      required: [id, zone_id, crop_id, is_active, start_date]
      properties:
        id: { type: string, format: uuid }
        zone_id: { type: string, format: uuid }
        crop_id: { type: string, format: uuid }
        start_date: { type: string, format: date-time }
        end_date: { type: [string, "null"], format: date-time }
        is_active: { type: boolean, default: true }
        final_yield: { type: [number, "null"] }
        area_sqm: { type: [number, "null"] }
    ZoneCropCreate:
      type: object
      required: [zone_id, crop_id, start_date]
      properties:
        zone_id: { type: string, format: uuid }
        crop_id: { type: string, format: uuid }
        start_date: { type: string, format: date-time }
        area_sqm: { type: [number, "null"] }
    ZoneCropUpdate:
      type: object
      properties:
        end_date: { type: [string, "null"], format: date-time }
        is_active: { type: boolean }
        final_yield: { type: [number, "null"] }
        area_sqm: { type: [number, "null"] }
    ZoneCropList:
      type: object
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/ZoneCrop' }
        page: { type: integer }
        page_size: { type: integer }
        total: { type: integer }

    ZoneCropObservation:
      type: object
      required: [id, zone_crop_id, observed_at]
      properties:
        id: { type: string, format: uuid }
        zone_crop_id: { type: string, format: uuid }
        observed_at: { type: string, format: date-time }
        observation_type:
          anyOf:
            - type: string
              enum: [growth, pest, disease, harvest, general]
            - type: "null"
        notes: { type: [string, "null"], maxLength: 2000 }
        image_url: { type: [string, "null"] }
        height_cm: { type: [number, "null"] }
        health_score:
          anyOf:
            - type: integer
              minimum: 1
              maximum: 10
            - type: "null"
    ZoneCropObservationCreate:
      type: object
      required: [zone_crop_id, observed_at]
      properties:
        zone_crop_id: { type: string, format: uuid }
        observed_at: { type: string, format: date-time }
        observation_type:
          anyOf:
            - type: string
              enum: [growth, pest, disease, harvest, general]
            - type: "null"
        notes: { type: [string, "null"] }
        image_url: { type: [string, "null"] }
        height_cm: { type: [number, "null"] }
        health_score:
          anyOf:
            - type: integer
              minimum: 1
              maximum: 10
            - type: "null"
    ZoneCropObservationUpdate:
      type: object
      properties:
        observed_at: { type: string, format: date-time }
        notes: { type: [string, "null"] }
        image_url: { type: [string, "null"] }
        height_cm: { type: [number, "null"] }
        health_score:
          anyOf:
            - type: integer
              minimum: 1
              maximum: 10
            - type: "null"
    ZoneCropObservationList:
      type: object
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/ZoneCropObservation' }
        page: { type: integer }
        page_size: { type: integer }
        total: { type: integer }

    Controller:
      type: object
      required: [id, greenhouse_id, device_name, is_climate_controller]
      properties:
        id: { type: string, format: uuid }
        greenhouse_id: { type: string, format: uuid }
        label: { type: [string, "null"] }
        model: { type: [string, "null"] }
        device_name:
          type: string
          pattern: '^verdify-[0-9a-f]{6}$'
        is_climate_controller: { type: boolean, default: false }
        fw_version: { type: [string, "null"] }
        hw_version: { type: [string, "null"] }
        last_seen: { type: [string, "null"], format: date-time }
    ControllerCreate:
      type: object
      required: [greenhouse_id, device_name]
      properties:
        greenhouse_id: { type: string, format: uuid }
        label: { type: [string, "null"] }
        model: { type: [string, "null"] }
        device_name:
          type: string
          pattern: '^verdify-[0-9a-f]{6}$'
        is_climate_controller: { type: boolean, default: false }
        fw_version: { type: [string, "null"] }
        hw_version: { type: [string, "null"] }
    ControllerUpdate:
      type: object
      properties:
        label: { type: [string, "null"] }
        model: { type: [string, "null"] }
        is_climate_controller: { type: boolean }
        fw_version: { type: [string, "null"] }
        hw_version: { type: [string, "null"] }
    ControllerList:
      type: object
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/Controller' }
        page: { type: integer }
        page_size: { type: integer }
        total: { type: integer }

    Sensor:
      type: object
      required: [id, controller_id, name, kind, scope]
      properties:
        id: { type: string, format: uuid }
        controller_id: { type: string, format: uuid }
        name: { type: string }
        kind: { $ref: '#/components/schemas/SensorKind' }
        scope: { $ref: '#/components/schemas/SensorScope' }
        include_in_climate_loop: { type: boolean, default: false }
        modbus_slave_id: { type: [integer, "null"] }
        modbus_reg: { type: [integer, "null"] }
        value_type: { anyOf: [{ type: string, enum: [float, int] }, { type: "null" }] }
        scale_factor: { type: number, default: 1.0 }
        offset: { type: number, default: 0.0 }
        poll_interval_s: { type: integer, default: 10 }
    SensorCreate:
      type: object
      required: [controller_id, name, kind, scope]
      properties:
        controller_id: { type: string, format: uuid }
        name: { type: string }
        kind: { $ref: '#/components/schemas/SensorKind' }
        scope: { $ref: '#/components/schemas/SensorScope' }
        include_in_climate_loop: { type: boolean, default: false }
        modbus_slave_id: { type: [integer, "null"] }
        modbus_reg: { type: [integer, "null"] }
        value_type: { anyOf: [{ type: string, enum: [float, int] }, { type: "null" }] }
        scale_factor: { type: number, default: 1.0 }
        offset: { type: number, default: 0.0 }
        poll_interval_s: { type: integer, default: 10 }
    SensorUpdate:
      type: object
      properties:
        name: { type: string }
        include_in_climate_loop: { type: boolean }
        modbus_slave_id: { type: [integer, "null"] }
        modbus_reg: { type: [integer, "null"] }
        scale_factor: { type: number }
        offset: { type: number }
        poll_interval_s: { type: integer }
    SensorList:
      type: object
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/Sensor' }
        page: { type: integer }
        page_size: { type: integer }
        total: { type: integer }

    SensorZoneMap:
      type: object
      required: [sensor_id, zone_id, kind]
      properties:
        sensor_id: { type: string, format: uuid }
        zone_id: { type: string, format: uuid }
        kind: { $ref: '#/components/schemas/SensorKind' }
    SensorZoneMapCreate:
      allOf:
        - $ref: '#/components/schemas/SensorZoneMap'

    Actuator:
      type: object
      required: [id, controller_id, name, kind]
      properties:
        id: { type: string, format: uuid }
        controller_id: { type: string, format: uuid }
        name: { type: string }
        kind: { $ref: '#/components/schemas/ActuatorKind' }
        relay_channel: { type: [integer, "null"] }
        min_on_ms: { type: integer, default: 60000 }
        min_off_ms: { type: integer, default: 60000 }
        fail_safe_state: { $ref: '#/components/schemas/FailSafeState' }
        zone_id: { type: [string, "null"], format: uuid }
    ActuatorCreate:
      type: object
      required: [controller_id, name, kind]
      properties:
        controller_id: { type: string, format: uuid }
        name: { type: string }
        kind: { $ref: '#/components/schemas/ActuatorKind' }
        relay_channel: { type: [integer, "null"] }
        min_on_ms: { type: integer, default: 60000 }
        min_off_ms: { type: integer, default: 60000 }
        fail_safe_state: { $ref: '#/components/schemas/FailSafeState' }
        zone_id: { type: [string, "null"], format: uuid }
    ActuatorUpdate:
      type: object
      properties:
        name: { type: string }
        kind: { $ref: '#/components/schemas/ActuatorKind' }
        relay_channel: { type: [integer, "null"] }
        min_on_ms: { type: integer }
        min_off_ms: { type: integer }
        fail_safe_state: { $ref: '#/components/schemas/FailSafeState' }
        zone_id: { type: [string, "null"], format: uuid }
    ActuatorList:
      allOf:
        - $ref: '#/components/schemas/Paginated'
        - type: object
          properties:
            data:
              type: array
              items: { $ref: '#/components/schemas/Actuator' }

    FanGroup:
      type: object
      required: [id, controller_id, name]
      properties:
        id: { type: string, format: uuid }
        controller_id: { type: string, format: uuid }
        name: { type: string }
    FanGroupCreate:
      type: object
      required: [controller_id, name]
      properties:
        controller_id: { type: string, format: uuid }
        name: { type: string }
    FanGroupMember:
      type: object
      required: [fan_group_id, actuator_id]
      properties:
        fan_group_id: { type: string, format: uuid }
        actuator_id: { type: string, format: uuid }
    FanGroupMemberCreate:
      allOf:
        - $ref: '#/components/schemas/FanGroupMember'
    FanGroupList:
      allOf:
        - $ref: '#/components/schemas/Paginated'
        - type: object
          properties:
            data:
              type: array
              items: { $ref: '#/components/schemas/FanGroup' }

    ControllerButton:
      type: object
      required: [id, controller_id, button_kind, timeout_s]
      properties:
        id: { type: string, format: uuid }
        controller_id: { type: string, format: uuid }
        button_kind: { $ref: '#/components/schemas/ButtonKind' }
        target_temp_stage: { anyOf: [{ type: integer, minimum: -3, maximum: 3 }, { type: "null" }] }
        target_humi_stage: { anyOf: [{ type: integer, minimum: -3, maximum: 3 }, { type: "null" }] }
        timeout_s: { type: integer, minimum: 1 }
    ControllerButtonCreate:
      type: object
      required: [controller_id, button_kind, timeout_s]
      properties:
        controller_id: { type: string, format: uuid }
        button_kind: { $ref: '#/components/schemas/ButtonKind' }
        target_temp_stage: { anyOf: [{ type: integer, minimum: -3, maximum: 3 }, { type: "null" }] }
        target_humi_stage: { anyOf: [{ type: integer, minimum: -3, maximum: 3 }, { type: "null" }] }
        timeout_s: { type: integer, minimum: 1 }
    ControllerButtonUpdate:
      type: object
      properties:
        button_kind: { $ref: '#/components/schemas/ButtonKind' }
        target_temp_stage: { anyOf: [{ type: integer, minimum: -3, maximum: 3 }, { type: "null" }] }
        target_humi_stage: { anyOf: [{ type: integer, minimum: -3, maximum: 3 }, { type: "null" }] }
        timeout_s: { type: integer, minimum: 1 }
    ControllerButtonList:
      allOf:
        - $ref: '#/components/schemas/Paginated'
        - type: object
          properties:
            data:
              type: array
              items: { $ref: '#/components/schemas/ControllerButton' }

    StateMachineRow:
      type: object
      required: [id, greenhouse_id, temp_stage, humi_stage]
      properties:
        id: { type: string, format: uuid }
        greenhouse_id: { type: string, format: uuid }
        temp_stage: { anyOf: [{ type: integer, minimum: -3, maximum: 3 }, { type: "null" }] }
        humi_stage: { anyOf: [{ type: integer, minimum: -3, maximum: 3 }, { type: "null" }] }
        is_fallback: { type: boolean, default: false }
        must_on_actuators:
          type: array
          items: { type: string, format: uuid }
          default: []
        must_off_actuators:
          type: array
          items: { type: string, format: uuid }
          default: []
        must_on_fan_groups:
          type: array
          items:
            type: object
            required: [fan_group_id, on_count]
            properties:
              fan_group_id: { type: string, format: uuid }
              on_count: { type: integer, minimum: 0 }
          default: []
    StateMachineRowCreate:
      allOf:
        - $ref: '#/components/schemas/StateMachineRow'
    StateMachineRowUpdate:
      type: object
      properties:
        temp_stage: { anyOf: [{ type: integer, minimum: -3, maximum: 3 }, { type: "null" }] }
        humi_stage: { anyOf: [{ type: integer, minimum: -3, maximum: 3 }, { type: "null" }] }
        is_fallback: { type: boolean }
        must_on_actuators:
          type: array
          items: { type: string, format: uuid }
        must_off_actuators:
          type: array
          items: { type: string, format: uuid }
        must_on_fan_groups:
          type: array
          items:
            type: object
            required: [fan_group_id, on_count]
            properties:
              fan_group_id: { type: string, format: uuid }
              on_count: { type: integer, minimum: 1 }
        must_off_fan_groups:
          type: array
          items: { type: string, format: uuid }
    StateMachineRowList:
      allOf:
        - $ref: '#/components/schemas/Paginated'
        - type: object
          properties:
            data:
              type: array
              items: { $ref: '#/components/schemas/StateMachineRow' }

    StateMachineFallback:
      type: object
      required: [greenhouse_id, must_on_actuators, must_off_actuators]
      properties:
        greenhouse_id: { type: string, format: uuid }
        must_on_actuators:
          type: array
          items: { type: string, format: uuid }
          description: Actuators that must be on when no state machine rule matches
        must_off_actuators:
          type: array
          items: { type: string, format: uuid }
          description: Actuators that must be off when no state machine rule matches
        must_on_fan_groups:
          type: array
          items:
            type: object
            required: [fan_group_id, on_count]
            properties:
              fan_group_id: { type: string, format: uuid }
              on_count: { type: integer, minimum: 0 }
          description: Fan groups and their required on counts for fallback state

    StateMachineFallbackUpdate:
      type: object
      properties:
        must_on_actuators:
          type: array
          items: { type: string, format: uuid }
        must_off_actuators:
          type: array
          items: { type: string, format: uuid }
        must_on_fan_groups:
          type: array
          items:
            type: object
            required: [fan_group_id, on_count]
            properties:
              fan_group_id: { type: string, format: uuid }
              on_count: { type: integer, minimum: 0 }

    # --- Config payload (materialized) ---
    ConfigPayload:
      type: object
      description: Complete configuration package for controllers, including greenhouse parameters, sensor/actuator mappings, and control rules
      required: [version, greenhouse, controllers, sensors, actuators, state_rules, baselines, rails]
      properties:
        version:
          type: integer
          minimum: 1
          description: Configuration version number for ETag generation and change tracking
        generated_at:
          type: string
          format: date-time
          description: UTC timestamp when configuration was generated
        greenhouse:
          type: object
          description: Greenhouse physical parameters and operational limits
          required: [id, title, min_temp_c, max_temp_c, min_vpd_kpa, max_vpd_kpa, enthalpy_open_kjkg, enthalpy_close_kjkg, site_pressure_hpa]
          properties:
            id:
              type: string
              format: uuid
              description: Unique greenhouse identifier
            title:
              type: string
              description: Human-readable greenhouse name
            min_temp_c:
              type: number
              description: Minimum allowable temperature in Celsius (hard safety limit)
            max_temp_c:
              type: number
              description: Maximum allowable temperature in Celsius (hard safety limit)
            min_vpd_kpa:
              type: number
              description: Minimum vapor pressure deficit in kPa (humidity control bound)
            max_vpd_kpa:
              type: number
              description: Maximum vapor pressure deficit in kPa (humidity control bound)
            enthalpy_open_kjkg:
              type: number
              description: Enthalpy threshold in kJ/kg below which ventilation is beneficial for dehumidification
            enthalpy_close_kjkg:
              type: number
              description: Enthalpy threshold in kJ/kg above which ventilation should be reduced
            site_pressure_hpa:
              type: number
              description: Local atmospheric pressure in hPa for enthalpy calculations
        baselines:
          type: object
          description: Control thresholds and hysteresis values for staging decisions
          required: [temp_thresholds, vpd_thresholds, hysteresis]
          properties:
            temp_thresholds:
              type: object
              description: Temperature thresholds in Celsius for staging levels (-3 to +3, where negative indicates heat demand and positive indicates cooling demand)
              required: [minus3, minus2, minus1, zero, plus1, plus2, plus3]
              properties:
                minus3:
                  type: number
                  description: Stage -3 temperature threshold (maximum heat demand)
                minus2:
                  type: number
                  description: Stage -2 temperature threshold (high heat demand)
                minus1:
                  type: number
                  description: Stage -1 temperature threshold (moderate heat demand)
                zero:
                  type: number
                  description: Stage 0 temperature threshold (target/neutral temperature)
                plus1:
                  type: number
                  description: Stage +1 temperature threshold (moderate cooling demand)
                plus2:
                  type: number
                  description: Stage +2 temperature threshold (high cooling demand)
                plus3:
                  type: number
                  description: Stage +3 temperature threshold (maximum cooling demand)
            vpd_thresholds:
              type: object
              description: VPD thresholds in kPa for humidity staging levels (-3 to +3, where negative indicates humidification need and positive indicates dehumidification need)
              required: [minus3, minus2, minus1, zero, plus1, plus2, plus3]
              properties:
                minus3: { type: number }
                minus2: { type: number }
                minus1: { type: number }
                zero: { type: number }
                plus1: { type: number }
                plus2: { type: number }
                plus3: { type: number }
            hysteresis:
              type: object
              properties:
                temp_c: { type: number, default: 0.5 }
                vpd_kpa: { type: number, default: 0.1 }
        rails:
          type: object
          required: [min_temp_c, max_temp_c, min_vpd_kpa, max_vpd_kpa]
          properties:
            min_temp_c: { type: number }
            max_temp_c: { type: number }
            min_vpd_kpa: { type: number }
            max_vpd_kpa: { type: number }
        controllers:
          type: array
          items:
            type: object
            required: [controller_id, device_name, is_climate_controller]
            properties:
              controller_id: { type: string, format: uuid }
              device_name:
                type: string
                pattern: '^verdify-[0-9a-f]{6}$'
              is_climate_controller: { type: boolean }
        sensors:
          type: array
          items:
            type: object
            required: [sensor_id, controller_id, name, kind, scope, include_in_climate_loop]
            properties:
              sensor_id: { type: string, format: uuid }
              controller_id: { type: string, format: uuid }
              name: { type: string }
              kind: { $ref: '#/components/schemas/SensorKind' }
              scope: { $ref: '#/components/schemas/SensorScope' }
              include_in_climate_loop: { type: boolean }
              zone_ids:
                type: array
                items: { type: string, format: uuid }
              poll_interval_s: { type: integer }
        actuators:
          type: array
          items:
            type: object
            required: [actuator_id, controller_id, name, kind]
            properties:
              actuator_id: { type: string, format: uuid }
              controller_id: { type: string, format: uuid }
              name: { type: string }
              kind: { $ref: '#/components/schemas/ActuatorKind' }
              relay_channel: { type: [integer, "null"] }
              min_on_ms: { type: integer }
              min_off_ms: { type: integer }
              zone_id: { type: [string, "null"], format: uuid }
        fan_groups:
          type: array
          items:
            type: object
            required: [fan_group_id, controller_id, name, members]
            properties:
              fan_group_id: { type: string, format: uuid }
              controller_id: { type: string, format: uuid }
              name: { type: string }
              members:
                type: array
                items:
                  type: object
                  required: [actuator_id]
                  properties:
                    actuator_id: { type: string, format: uuid }
        buttons:
          type: array
          items: { $ref: '#/components/schemas/ControllerButton' }
        state_rules:
          type: object
          required: [grid, fallback]
          properties:
            grid:
              type: array
              items:
                type: object
                required: [temp_stage, humi_stage, must_on_actuators, must_off_actuators]
                properties:
                  temp_stage: { type: integer, minimum: -3, maximum: 3 }
                  humi_stage: { type: integer, minimum: -3, maximum: 3 }
                  must_on_actuators:
                    type: array
                    items: { type: string, format: uuid }
                  must_off_actuators:
                    type: array
                    items: { type: string, format: uuid }
                  must_on_fan_groups:
                    type: array
                    items:
                      type: object
                      required: [fan_group_id, on_count]
                      properties:
                        fan_group_id: { type: string, format: uuid }
                        on_count: { type: integer, minimum: 0 }
            fallback:
              type: object
              required: [must_on_actuators, must_off_actuators, must_on_fan_groups, is_fallback]
              properties:
                is_fallback: { type: boolean, enum: [true] }
                must_on_actuators:
                  type: array
                  items: { type: string, format: uuid }
                must_off_actuators:
                  type: array
                  items: { type: string, format: uuid }
                must_on_fan_groups:
                  type: array
                  items:
                    type: object
                    required: [fan_group_id, on_count]
                    properties:
                      fan_group_id: { type: string, format: uuid }
                      on_count: { type: integer, minimum: 0 }

    ConfigPublishResult:
      type: object
      required: [published, version, errors, warnings, payload]
      properties:
        published: { type: boolean }
        version: { type: integer }
        errors:
          type: array
          items: { type: string }
        warnings:
          type: array
          items: { type: string }
        payload:
          $ref: '#/components/schemas/ConfigPayload'

    ConfigDiff:
      type: object
      properties:
        added: { type: array, items: { type: string } }
        removed: { type: array, items: { type: string } }
        changed: { type: array, items: { type: string } }

    # --- Plan schemas ---
    Plan:
      type: object
      required: [id, version, greenhouse_id, is_active, effective_from, effective_to, created_at, payload]
      properties:
        id: { type: string, format: uuid }
        version: { type: integer }
        greenhouse_id: { type: string, format: uuid }
        is_active: { type: boolean }
        effective_from: { type: string, format: date-time }
        effective_to: { type: string, format: date-time }
        created_at: { type: string, format: date-time }
        payload: { $ref: '#/components/schemas/PlanPayload' }

    PlanCreate:
      type: object
      required: [greenhouse_id, effective_from, effective_to, payload]
      properties:
        greenhouse_id: { type: string, format: uuid }
        is_active: { type: boolean, default: false }
        effective_from: { type: string, format: date-time }
        effective_to: { type: string, format: date-time }
        payload: { $ref: '#/components/schemas/PlanPayload' }

    PlanList:
      type: object
      allOf:
        - $ref: '#/components/schemas/Paginated'
        - type: object
          properties:
            data:
              type: array
              items: { $ref: '#/components/schemas/Plan' }

    # --- Plan payload ---
    PlanPayload:
      type: object
      required: [version, greenhouse_id, effective_from, effective_to, setpoints]
      properties:
        version: { type: integer }
        greenhouse_id: { type: string, format: uuid }
        effective_from: { type: string, format: date-time }
        effective_to: { type: string, format: date-time }
        setpoints:
          type: array
          description: 30-min steps recommended
          items:
            type: object
            required: [ts_utc, min_temp_c, max_temp_c, min_vpd_kpa, max_vpd_kpa]
            properties:
              ts_utc: { type: string, format: date-time }
              min_temp_c: { type: number }
              max_temp_c: { type: number }
              min_vpd_kpa: { type: number }
              max_vpd_kpa: { type: number }
              temp_stage_delta: { type: integer, minimum: -1, maximum: 1, default: 0 }
              humi_stage_delta: { type: integer, minimum: -1, maximum: 1, default: 0 }
              hysteresis_overrides:
                type: object
                properties:
                  temp_c: { type: number }
                  vpd_kpa: { type: number }
        irrigation:
          type: array
          items:
            type: object
            required: [ts_utc, actuator_id, duration_s]
            properties:
              ts_utc: { type: string, format: date-time }
              actuator_id: { type: string, format: uuid }
              zone_id: { type: [string, "null"], format: uuid }
              duration_s: { type: integer, minimum: 1 }
              min_soil_vwc: { type: [number, "null"] }
        fertilization:
          type: array
          items:
            type: object
            required: [ts_utc, actuator_id, duration_s]
            properties:
              ts_utc: { type: string, format: date-time }
              actuator_id: { type: string, format: uuid }
              zone_id: { type: [string, "null"], format: uuid }
              duration_s: { type: integer, minimum: 1 }
        lighting:
          type: array
          items:
            type: object
            required: [ts_utc, actuator_id, duration_s]
            properties:
              ts_utc: { type: string, format: date-time }
              actuator_id: { type: string, format: uuid }
              duration_s: { type: integer, minimum: 1 }

    # --- Telemetry ---
    TelemetrySensors:
      type: object
      required: [readings]
      properties:
  # Identity (controller) is derived from DeviceToken; explicit controller_id/device_name omitted for security & payload reduction.
        batch_id: { type: [string, "null"] }
        ts_utc: { type: [string, "null"], format: date-time }
        readings:
          type: array
          items:
            type: object
            required: [sensor_id, kind, value, ts_utc]
            properties:
              sensor_id: { type: string, format: uuid }
              kind: { $ref: '#/components/schemas/SensorKind' }
              value: { type: number }
              ts_utc: { type: string, format: date-time }
              scope: { $ref: '#/components/schemas/SensorScope' }
              zone_ids:
                type: array
                items: { type: string, format: uuid }
    TelemetryActuators:
      type: object
      required: [events]
      properties:
        events:
          type: array
          items:
            type: object
            required: [actuator_id, ts_utc, state, reason]
            properties:
              actuator_id: { type: string, format: uuid }
              ts_utc: { type: string, format: date-time }
              state: { type: boolean }
              reason: { type: string }
    TelemetryStatus:
      type: object
      required: [ts_utc, temp_stage, humi_stage]
      properties:
  # Identity derived from DeviceToken
        ts_utc: { type: string, format: date-time }
        temp_stage: { type: integer, minimum: -3, maximum: 3 }
        humi_stage: { type: integer, minimum: -3, maximum: 3 }
        avg_interior_temp_c: { type: [number, "null"] }
        avg_interior_rh_pct: { type: [number, "null"] }
        avg_interior_pressure_hpa: { type: [number, "null"] }
        avg_exterior_temp_c: { type: [number, "null"] }
        avg_exterior_rh_pct: { type: [number, "null"] }
        avg_exterior_pressure_hpa: { type: [number, "null"] }
        avg_vpd_kpa: { type: [number, "null"] }
        enthalpy_in_kj_per_kg: { type: [number, "null"] }
        enthalpy_out_kj_per_kg: { type: [number, "null"] }
        override_active: { type: boolean, default: false }
        plan_version: { type: [integer, "null"] }
        plan_stale: { type: boolean, default: false, description: "True if plan expired beyond grace period" }
        offline_sensors: { type: array, items: { type: string, format: uuid }, description: "List of sensor IDs that are offline/failed" }
        fallback_active: { type: boolean, default: false, description: "True if controller is operating in fallback mode" }
        # Operational fields for debugging and monitoring
        uptime_s: { type: [integer, "null"], description: "Controller uptime in seconds" }
        loop_ms: { type: [integer, "null"], description: "Main control loop execution time in milliseconds" }
        config_version: { type: [integer, "null"], description: "Current config version number" }
    TelemetryInputs:
      type: object
      required: [inputs]
      properties:
        inputs:
          type: array
          items:
            type: object
            required: [button_kind, ts_utc, action]
            properties:
              button_kind: { $ref: '#/components/schemas/ButtonKind' }
              ts_utc: { type: string, format: date-time }
              action: { type: string, enum: [pressed, released] }
