      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [healthy]
                  timestamp:
                    type: string
                    format: date-time
                  version:
                    type: string
                    description: API version
                required: [status, timestamp, version]
                example:
                  status: healthy
                  timestamp: "2025-08-13T18:05:00Z"
                  version: "1.0.0"
        '400':
          $ref: '#/components/responses/BadRequest'
        '503':
          description: Service unavailable
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [unhealthy]
                  timestamp:
                    type: string
                    format: date-time
                  error:
                    type: string
                    description: Error description
                required: [status, timestamp]

