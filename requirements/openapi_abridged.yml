      responses:
        '200':
          description: Plan payload
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PlanPayload' }
        '304':
          description: Not Modified
        default:
          $ref: '#/components/responses/Error'
  /controllers/me/config:
    get:
      operationId: getMyConfig
      tags: [Config]
      summary: Fetch config for authenticated device
      security:
        - DeviceToken: []
      parameters:
        - $ref: '#/components/parameters/IfNoneMatch'
      responses:
        '200':
          description: Configuration payload
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ConfigPayload' }
        '304':
          description: Not Modified
        default:
          $ref: '#/components/responses/Error'
  /controllers/me/plan:
