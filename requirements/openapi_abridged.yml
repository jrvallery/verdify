      required: [greenhouse_id, effective_from, effective_to, payload]
      properties:
        greenhouse_id: { type: string, format: uuid }
        is_active: { type: boolean }
        effective_from: { type: string, format: date-time }
        effective_to: { type: string, format: date-time }
        payload: { $ref: '#/components/schemas/PlanPayload' }
    PlanList:
      type: object
      properties:
        data: { type: array, items: { $ref: '#/components/schemas/Plan' } }
        page: { type: integer }
        page_size: { type: integer }
        total: { type: integer }
    PlanPayload:
      type: object
      required: [version, greenhouse_id, effective_from, effective_to, setpoints]
      properties:
        version: { type: integer }
        greenhouse_id: { type: string, format: uuid }
        effective_from: { type: string, format: date-time }
        effective_to: { type: string, format: date-time }
        setpoints:
          type: array
          items:
            type: object
            required: [ts_utc, min_temp_c, max_temp_c, min_vpd_kpa, max_vpd_kpa]
            properties:
              ts_utc: { type: string, format: date-time }
              min_temp_c: { type: number }
              max_temp_c: { type: number }
              min_vpd_kpa: { type: number }
              max_vpd_kpa: { type: number }
              temp_stage_delta: { type: integer }
              humi_stage_delta: { type: integer }
              hysteresis_overrides: { type: object, properties: { temp_c: { type: number }, vpd_kpa: { type: number } } }
        irrigation:
          type: array
          items:
            type: object
            required: [ts_utc, actuator_id, duration_s]
            properties:
              ts_utc: { type: string, format: date-time }
              actuator_id: { type: string, format: uuid }
              zone_id: { type: [string, "null"], format: uuid }
              duration_s: { type: integer }
              min_soil_vwc: { type: [number, "null"] }
        fertilization:
          type: array
          items:
            type: object
            required: [ts_utc, actuator_id, duration_s]
            properties:
              ts_utc: { type: string, format: date-time }
              actuator_id: { type: string, format: uuid }
              zone_id: { type: [string, "null"], format: uuid }
              duration_s: { type: integer }
        lighting:
          type: array
          items:
            type: object
            required: [ts_utc, actuator_id, duration_s]
            properties:
              ts_utc: { type: string, format: date-time }
              actuator_id: { type: string, format: uuid }
              duration_s: { type: integer }
    TelemetrySensors:
      type: object
      required: [readings]
      properties:
        batch_id: { type: [string, "null"] }
        ts_utc: { type: [string, "null"], format: date-time }
        readings:
          type: array
          items:
            type: object
            required: [sensor_id, kind, value, ts_utc]
            properties:
              sensor_id: { type: string, format: uuid }
              kind: { $ref: '#/components/schemas/SensorKind' }
              value: { type: number }
              ts_utc: { type: string, format: date-time }
              scope: { $ref: '#/components/schemas/SensorScope' }
              zone_ids: { type: array, items: { type: string, format: uuid } }
    TelemetryActuators:
      type: object
      required: [events]
      properties:
        events:
          type: array
          items:
            type: object
            required: [actuator_id, ts_utc, state, reason]
            properties:
              actuator_id: { type: string, format: uuid }
              ts_utc: { type: string, format: date-time }
              state: { type: boolean }
              reason: { type: string }
    TelemetryStatus:
      type: object
      required: [ts_utc, temp_stage, humi_stage]
      properties:
        ts_utc: { type: string, format: date-time }
        temp_stage: { type: integer }
        humi_stage: { type: integer }
        avg_interior_temp_c: { type: [number, "null"] }
        avg_interior_rh_pct: { type: [number, "null"] }
        avg_interior_pressure_hpa: { type: [number, "null"] }
        avg_exterior_temp_c: { type: [number, "null"] }
        avg_exterior_rh_pct: { type: [number, "null"] }
        avg_exterior_pressure_hpa: { type: [number, "null"] }
        avg_vpd_kpa: { type: [number, "null"] }
        enthalpy_in_kj_per_kg: { type: [number, "null"] }
        enthalpy_out_kj_per_kg: { type: [number, "null"] }
        override_active: { type: boolean }
        plan_version: { type: [integer, "null"] }
        plan_stale: { type: boolean }
        offline_sensors: { type: array, items: { type: string, format: uuid } }
        fallback_active: { type: boolean }
        uptime_s: { type: [integer, "null"] }
        loop_ms: { type: [integer, "null"] }
        config_version: { type: [integer, "null"] }
    TelemetryInputs:
      type: object
      required: [inputs]
      properties:
        inputs:
          type: array
          items:
            type: object
            required: [button_kind, ts_utc, action]
            properties:
              button_kind: { $ref: '#/components/schemas/ButtonKind' }
              ts_utc: { type: string, format: date-time }
              action: { type: string, enum: [pressed, released] }
              latched: { type: boolean }
    TelemetryBatch:
      type: object
      properties:
        sensors: { $ref: '#/components/schemas/TelemetrySensors' }
        actuators: { $ref: '#/components/schemas/TelemetryActuators' }
        status: { $ref: '#/components/schemas/TelemetryStatus' }
        inputs: { $ref: '#/components/schemas/TelemetryInputs' }
    IngestResult:
      type: object
      properties:
        accepted: { type: integer }
        rejected: { type: integer }
        errors: { type: array, items: { $ref: '#/components/schemas/ErrorResponse' } }
```
