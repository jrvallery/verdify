components:
  securitySchemes:
    UserJWT:
      type: http
      scheme: bearer
      bearerFormat: JWT
    DeviceToken:
      type: apiKey
      in: header
      name: X-Device-Token
  parameters:
    IfNoneMatch:
      in: header
      name: If-None-Match
      schema: { type: string }
    GreenhouseIdParam:
      in: path
      name: id
      required: true
      schema: { type: string, format: uuid }
    ZoneIdParam:
      in: path
      name: id
      required: true
      schema: { type: string, format: uuid }
    CropIdParam:
      in: path
      name: id
      required: true
      schema: { type: string, format: uuid }
    ZoneCropIdParam:
      in: path
      name: id
      required: true
      schema: { type: string, format: uuid }
    ObservationIdParam:
      in: path
      name: id
      required: true
      schema: { type: string, format: uuid }
    ControllerIdParam:
      in: path
      name: controller_id
      required: true
      schema: { type: string, format: uuid }
    ActuatorIdParam:
      in: path
      name: id
      required: true
      schema: { type: string, format: uuid }
    SensorIdParam:
      in: path
      name: id
      required: true
      schema: { type: string, format: uuid }
    FanGroupIdParam:
      in: path
      name: id
      required: true
      schema: { type: string, format: uuid }
    DeviceNameParam:
      in: path
      name: device_name
      required: true
      schema: { type: string }
    PageParam:
      in: query
      name: page
      schema: { type: integer, default: 1 }
    PageSizeParam:
      in: query
      name: page_size
      schema: { type: integer, default: 50 }
    CSRFTokenParam:
      in: header
      name: X-CSRF-Token
      schema: { type: string }
    IdempotencyKeyParam:
      in: header
      name: Idempotency-Key
      schema: { type: string }
  responses:
    Error:
      description: Error
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
  schemas:
    ErrorCode:
      type: string
      enum:
        - E400_BAD_REQUEST
        - E401_UNAUTHORIZED
        - E403_FORBIDDEN
        - E404_NOT_FOUND
        - E409_CONFLICT
        - E412_PRECONDITION_FAILED
        - E422_UNPROCESSABLE
        - E429_TOO_MANY_REQUESTS
        - E500_INTERNAL
        - E503_SERVICE_UNAVAILABLE
    LocationEnum:
      type: string
      enum: [N, NE, E, SE, S, SW, W, NW]
    SensorKind:
      type: string
      enum: [temperature, humidity, vpd, co2, light, soil_moisture, water_flow, water_total, dew_point, absolute_humidity, enthalpy_delta, air_pressure, kwh, gas_consumption, ppfd, wind_speed, rainfall, power]
    SensorScope:
      type: string
      enum: [zone, greenhouse, external]
    ActuatorKind:
      type: string
      enum: [fan, heater, vent, fogger, irrigation_valve, fertilizer_valve, pump, light]
    FailSafeState:
      type: string
      enum: [on, off]
    ButtonKind:
      type: string
      enum: [cool, heat, humid]
    ErrorResponse:
      type: object
      required: [error_code, message, timestamp, request_id]
      properties:
        error_code: { $ref: '#/components/schemas/ErrorCode' }
        message: { type: string }
        timestamp: { type: string, format: date-time }
        request_id: { type: string }
        details: { type: object }
    UserRegisterRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string }
        password: { type: string }
        full_name: { type: [string, "null"] }
    UserRegisterResponse:
      type: object
      required: [user, access_token]
      properties:
        user:
          type: object
          required: [id, email, created_at]
          properties:
            id: { type: string, format: uuid }
            email: { type: string }
            full_name: { type: [string, "null"] }
            created_at: { type: string, format: date-time }
        access_token: { type: string }
    UserLoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string }
        password: { type: string }
    UserLoginResponse:
      type: object
      required: [access_token, token_type, expires_in]
      properties:
        access_token: { type: string }
        token_type: { type: string }
        expires_in: { type: integer }
    HelloRequest:
      type: object
      required: [device_name, claim_code, hardware_profile, firmware, ts_utc]
      properties:
        device_name: { type: string }
        claim_code: { type: string }
        hardware_profile: { type: string }
        firmware: { type: string }
        ts_utc: { type: string, format: date-time }
    HelloResponse:
      type: object
      required: [status]
      properties:
        status: { type: string, enum: [pending, claimed] }
        controller_uuid: { type: [string, "null"], format: uuid }
        greenhouse_id: { type: [string, "null"], format: uuid }
        retry_after_s: { type: integer }
        message: { type: string }
    TokenExchangeRequest:
      type: object
      required: [device_name, claim_code]
      properties:
        device_name: { type: string }
        claim_code: { type: string }
    TokenExchangeResponse:
      type: object
      required: [device_token, config_etag, plan_etag, expires_at]
      properties:
        device_token: { type: string }
        config_etag: { type: string }
        plan_etag: { type: string }
        expires_at: { type: string, format: date-time }
    ControllerClaimRequest:
      type: object
      required: [device_name, claim_code, greenhouse_id]
      properties:
        device_name: { type: string }
        claim_code: { type: string }
        greenhouse_id: { type: string, format: uuid }
    ControllerClaimResponse:
      type: object
      required: [controller, device_token, expires_at]
      properties:
        controller: { $ref: '#/components/schemas/Controller' }
        device_token: { type: string }
        expires_at: { type: string, format: date-time }
    Paginated:
      type: object
      required: [data, page, page_size, total]
      properties:
        data: { type: array }
        page: { type: integer }
        page_size: { type: integer }
        total: { type: integer }
    Greenhouse:
      type: object
      required: [id, title, is_active, min_temp_c, max_temp_c, min_vpd_kpa, max_vpd_kpa]
      properties:
        id: { type: string, format: uuid }
        title: { type: string }
        description: { type: [string, "null"] }
        is_active: { type: boolean }
        latitude: { type: [number, "null"] }
        longitude: { type: [number, "null"] }
