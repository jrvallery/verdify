```yaml
openapi: 3.1.0
info:
  title: Project Verdify MVP API
  version: "2.0"
  description: REST API for AI-powered greenhouse MVP.
servers:
  - url: https://api.verdify.ai/api/v1
tags:
  - name: Authentication
  - name: Onboarding
  - name: Config
  - name: Plan
  - name: Telemetry
  - name: CRUD
  - name: Meta
security:
  - UserJWT: []
paths:
  /auth/register:
    post:
      tags: [Authentication]
      summary: Register new user account
      operationId: registerUser
      security: []
      parameters:
        - $ref: '#/components/parameters/CSRFTokenParam'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UserRegisterRequest' }
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UserRegisterResponse' }
        default:
          $ref: '#/components/responses/Error'
  /auth/login:
    post:
      operationId: loginUser
      tags: [Authentication]
      summary: Login and obtain JWT
      security: []
      parameters:
        - $ref: '#/components/parameters/CSRFTokenParam'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UserLoginRequest' }
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UserLoginResponse' }
        default:
          $ref: '#/components/responses/Error'
  /auth/csrf:
    get:
      operationId: getCsrfToken
      tags: [Authentication]
      summary: Get CSRF token
      security: []
      responses:
        '200':
          description: CSRF token generated
          content:
            application/json:
              schema:
                type: object
                required: [csrf_token, expires_at]
                properties:
                  csrf_token: { type: string }
                  expires_at: { type: string, format: date-time }
        default:
          $ref: '#/components/responses/Error'
  /auth/revoke-token:
    post:
      operationId: revokeUserToken
      tags: [Authentication]
      summary: Revoke current user JWT
      security:
        - UserJWT: []
      responses:
        '204':
          description: Token successfully revoked
        default:
          $ref: '#/components/responses/Error'
  /controllers/{controller_id}/revoke-token:
    post:
      operationId: revokeControllerToken
      tags: [Authentication]
      summary: Revoke device token for controller
      security:
        - UserJWT: []
      parameters:
        - $ref: '#/components/parameters/ControllerIdParam'
      responses:
        '204':
          description: Device token successfully revoked
        default:
          $ref: '#/components/responses/Error'
  /controllers/{controller_id}/rotate-token:
    post:
      operationId: rotateControllerToken
      tags: [Authentication]
      summary: Rotate device token for controller
      security:
        - UserJWT: []
      parameters:
        - $ref: '#/components/parameters/ControllerIdParam'
      responses:
        '200':
          description: New device token generated
          content:
            application/json:
              schema:
                type: object
                required: [device_token, expires_at]
                properties:
                  device_token: { type: string }
                  expires_at: { type: string, format: date-time }
        default:
          $ref: '#/components/responses/Error'
  /hello:
    post:
      operationId: announceController
      tags: [Onboarding]
      summary: Controller announces itself
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/HelloRequest' }
      responses:
        '200':
          description: Hello accepted
          content:
            application/json:
              schema: { $ref: '#/components/schemas/HelloResponse' }
        default:
          $ref: '#/components/responses/Error'
  /controllers/claim:
    post:
      operationId: claimController
      tags: [Onboarding]
      summary: Claim a controller
      security:
        - UserJWT: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ControllerClaimRequest' }
      responses:
        '201':
          description: Claimed
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ControllerClaimResponse' }
        default:
          $ref: '#/components/responses/Error'
  /controllers/{controller_id}/token-exchange:
    post:
      operationId: exchangeControllerToken
      tags: [Onboarding]
      summary: Exchange claim_code for device_token
      security: []
      parameters:
        - $ref: '#/components/parameters/ControllerIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/TokenExchangeRequest' }
      responses:
        '201':
          description: Token issued
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TokenExchangeResponse' }
        '200':
          description: Idempotent replay
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TokenExchangeResponse' }
        default:
          $ref: '#/components/responses/Error'
  /controllers/by-name/{device_name}/config:
    get:
      operationId: getConfigByDeviceName
      tags: [Config]
      summary: Fetch config by device_name
      security:
        - DeviceToken: []
      parameters:
        - $ref: '#/components/parameters/DeviceNameParam'
        - $ref: '#/components/parameters/IfNoneMatch'
      responses:
        '200':
          description: Config payload
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ConfigPayload' }
        '304':
          description: Not Modified
        default:
          $ref: '#/components/responses/Error'
  /controllers/{controller_id}/plan:
    get:
      operationId: getPlanByControllerId
      tags: [Plan]
      summary: Fetch plan
      security:
        - DeviceToken: []
      parameters:
        - $ref: '#/components/parameters/ControllerIdParam'
