name: Build & Push to GHCR

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]   # tag releases as v1.2.3 to get semver tags
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  packages: write    # required to push to ghcr.io
  # id-token: write  # (optional) for future attestations/provenance

env:
  REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ubuntu-latest

    # EDIT the matrix to match your services & their build contexts
    strategy:
      matrix:
        include:
          - name: backend
            context: ./backend
            dockerfile: ./backend/Dockerfile
          - name: frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile
          # - name: worker
          #   context: ./worker
          #   dockerfile: ./worker/Dockerfile

    steps:
      - name: Checkout (only needed for path context)
        uses: actions/checkout@v4

      - name: Set up QEMU (for multi-arch; optional)
        uses: docker/setup-qemu-action@v3
        # omit if you only build linux/amd64
        # with:
        #   platforms: arm64,amd64
        # docs: https://github.com/docker/setup-qemu-action

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (tags/labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.IMAGE_PREFIX }}/verdify-${{ matrix.name }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,format=short
            # adds semver tags when you push a vX.Y.Z tag:
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # platforms: linux/amd64,linux/arm64   # uncomment for multi-arch
          cache-from: type=gha
          cache-to: type=gha,mode=max
