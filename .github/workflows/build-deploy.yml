name: Build & Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: verdify-production
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: [self-hosted, verdify]
    permissions:
      contents: read
      packages: write
    env:
      REGISTRY: ghcr.io
      IMAGE_BACKEND: ghcr.io/${{ github.repository_owner }}/verdify-backend
      IMAGE_FRONTEND: ghcr.io/${{ github.repository_owner }}/verdify-frontend
      DOCKER_BUILDKIT: 1
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Login GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login $REGISTRY -u ${{ github.actor }} --password-stdin

      - name: Backend build
        run: |
          docker build \
            -t $IMAGE_BACKEND:latest \
            -t $IMAGE_BACKEND:${{ github.sha }} \
            backend

      - name: Frontend build
        run: |
          docker build \
            -t $IMAGE_FRONTEND:latest \
            -t $IMAGE_FRONTEND:${{ github.sha }} \
            frontend

      - name: Push images
        run: |
          docker push $IMAGE_BACKEND:latest
          docker push $IMAGE_BACKEND:${{ github.sha }}
          docker push $IMAGE_FRONTEND:latest
          docker push $IMAGE_FRONTEND:${{ github.sha }}

      - name: Deploy stack
        env:
          # Stack / compose runtime vars
          STACK_NAME: verdify
          TAG: latest
          DOCKER_IMAGE_BACKEND: ${{ env.IMAGE_BACKEND }}
          DOCKER_IMAGE_FRONTEND: ${{ env.IMAGE_FRONTEND }}
          # Provide any secrets below via runner env or compose .env if not committed
          # SECRET_KEY: ${{ secrets.SECRET_KEY }}
          # FIRST_SUPERUSER: ${{ secrets.FIRST_SUPERUSER }}
          # FIRST_SUPERUSER_PASSWORD: ${{ secrets.FIRST_SUPERUSER_PASSWORD }}
          # POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
        run: |
          # If you manage secrets through an external .env on the server, this will pick it up automatically.
          # Otherwise, uncomment to generate a transient .env file:
          # cat > .env <<'EOF'
          # PROJECT_NAME=Verdify
          # DOMAIN=example.com
          # FRONTEND_HOST=https://dashboard.example.com
          # ENVIRONMENT=production
          # SECRET_KEY=${SECRET_KEY}
          # FIRST_SUPERUSER=${FIRST_SUPERUSER}
          # FIRST_SUPERUSER_PASSWORD=${FIRST_SUPERUSER_PASSWORD}
          # POSTGRES_USER=${POSTGRES_USER:-verdify}
          # POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
          # POSTGRES_DB=${POSTGRES_DB:-verdify}
          # BACKEND_CORS_ORIGINS=["https://dashboard.example.com"]
          # EOF

          docker stack deploy -c docker-compose.yml verdify

      - name: Rollback hint
        if: always()
        run: |
          echo "To rollback backend: docker service update --image $IMAGE_BACKEND:<previous-sha> verdify_backend"
          echo "To rollback frontend: docker service update --image $IMAGE_FRONTEND:<previous-sha> verdify_frontend"
          echo "Or redeploy with: TAG=<previous-sha> docker stack deploy -c docker-compose.yml verdify"
