name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install ruff
        run: pip install ruff
      - name: Ruff lint
        run: ruff check ingestor/ api/ mcp/ scripts/*.py tests/ verdify_schemas/
      - name: Ruff format check
        run: ruff format --check ingestor/ api/ mcp/ scripts/*.py tests/ verdify_schemas/

  schemas:
    name: Pydantic Schemas + Drift Guards
    runs-on: ubuntu-latest
    services:
      postgres:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_USER: verdify
          POSTGRES_PASSWORD: verdify
          POSTGRES_DB: verdify
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U verdify -d verdify"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      POSTGRES_USER: verdify
      POSTGRES_PASSWORD: verdify
      POSTGRES_DB: verdify
      PGHOST: localhost
      PGPORT: "5432"
      PGUSER: verdify
      PGPASSWORD: verdify
      PGDATABASE: verdify
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install system deps (psql client + postgres extensions)
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client
      - name: Install Python deps
        run: pip install pydantic>=2.8 pytest pyyaml
      - name: Apply migrations (and schema.sql if present)
        run: |
          # Prefer schema.sql (full schema snapshot) over replaying every migration.
          # Falls back to applying every migration in filename order.
          if [ -f db/schema.sql ]; then
            # schema.sql may reference TimescaleDB functions; ignore non-fatal errors
            psql -v ON_ERROR_STOP=0 -f db/schema.sql > /tmp/schema.log 2>&1 || true
            tail -50 /tmp/schema.log
          fi
          for f in $(ls db/migrations/*.sql 2>/dev/null | sort); do
            echo "Applying $f"
            psql -v ON_ERROR_STOP=0 -f "$f" > /tmp/mig.log 2>&1 || true
          done
      - name: Schema unit tests
        run: pytest verdify_schemas/tests/ -v --ignore=verdify_schemas/tests/test_drift_guards.py --ignore=verdify_schemas/tests/test_vault_writers.py --ignore=verdify_schemas/tests/test_views.py
      - name: Drift guards (against CI Postgres)
        run: pytest verdify_schemas/tests/test_drift_guards.py -v

  firmware:
    name: Firmware Compile Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install ESPHome
        run: pip install esphome
      - name: Validate firmware config
        run: |
          cp firmware/secrets.example.yaml firmware/secrets.yaml
          cd firmware
          esphome config greenhouse.yaml
        # Note: full compile requires ESP-IDF toolchain (~1.5GB)
        # Config validation catches YAML errors and missing references

  # ─── Phase-0 stabilization gates ────────────────────────────────────────
  # Background: the plan at
  #   .claude-agents/iris-dev/plans/yo-iris-dev-you-help-humming-stonebraker.md
  # calls for a test-harness + CI net landing BEFORE the next firmware change,
  # so that the sprint-15 gate / sprint-15.1 interlock / plan-vs-tunable gap
  # class of regression is caught pre-merge. These jobs implement that net.

  firmware-logic:
    name: Firmware Logic Tests + Replay + Invariants
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install g++
        run: |
          sudo apt-get update
          sudo apt-get install -y g++ make
      - name: Native firmware unit tests
        run: |
          cd firmware
          g++ -std=c++17 -I lib -o test/test_greenhouse test/test_greenhouse_logic.cpp
          ./test/test_greenhouse
      - name: Unpack replay corpus
        run: |
          test -f firmware/test/data/replay_overrides.csv \
            || gunzip -k firmware/test/data/replay_overrides.csv.gz
      - name: Replay (OBS-1e evaluate_overrides validation)
        run: |
          cd firmware
          g++ -std=c++17 -O2 -I lib -o test/replay_overrides test/replay_overrides.cpp
          ./test/replay_overrides test/data/replay_overrides.csv | tail -30
      - name: Replay invariants (15 bulletproof gates)
        # Binary exits 2 with a clear message when the corpus predates the
        # Phase-0 schema extension — that's expected until the first corpus
        # refresh with the new schema. Non-zero count < 10 => real failures.
        run: |
          cd firmware
          g++ -std=c++17 -O2 -I lib -o test/replay_invariants test/replay_invariants.cpp
          set +e
          ./test/replay_invariants test/data/replay_overrides.csv
          rc=$?
          if [ "$rc" -eq 2 ]; then
            echo "::warning::replay corpus predates Phase-0 schema extension; skipping invariants this run"
            exit 0
          fi
          exit $rc

  firmware-replay-diff:
    name: Firmware Replay Diff (behavioral regression gate)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # need full history for merge-base worktree
      - name: Install g++
        run: sudo apt-get install -y g++
      - name: Unpack replay corpus
        run: |
          test -f firmware/test/data/replay_overrides.csv \
            || gunzip -k firmware/test/data/replay_overrides.csv.gz
      - name: Run replay diff (PR HEAD vs merge-base)
        # THRESHOLD_PCT=0 => any mode/relay divergence blocks the PR.
        # Phase 2+ may raise this during intentional rollouts; coordinator
        # marks that in the PR body and CI operator sets the env var.
        run: |
          set +e
          BASE=$(git merge-base HEAD origin/${{ github.base_ref }})
          if [ -z "$BASE" ] || [ "$BASE" = "$(git rev-parse HEAD)" ]; then
            echo "No merge-base change; skipping replay diff"
            exit 0
          fi
          CHANGED=$(git diff --name-only "$BASE" HEAD -- \
            firmware/lib/greenhouse_logic.h \
            firmware/lib/greenhouse_types.h \
            firmware/greenhouse/controls.yaml)
          if [ -z "$CHANGED" ]; then
            echo "No firmware-logic diff in PR; skipping replay diff"
            exit 0
          fi
          THRESHOLD_PCT=${THRESHOLD_PCT:-0} bash scripts/firmware-replay-diff.sh "$BASE" HEAD

  no-new-fire-and-forget:
    name: No new tunables without readback
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check for new tunables without cfg_* readback
        run: |
          BASE=$(git merge-base HEAD origin/${{ github.base_ref }})
          NEW_IDS=$(git diff "$BASE" HEAD -- firmware/greenhouse/tunables.yaml 2>/dev/null \
            | awk '/^\+[[:space:]]+- id:/ {print $3}' | sort -u || true)
          if [ -z "$NEW_IDS" ]; then
            echo "No new tunable entities in PR"
            exit 0
          fi
          echo "New tunable IDs in PR: $NEW_IDS"
          MISSING=""
          for id in $NEW_IDS; do
            if ! grep -qE "(id: cfg_${id}|id\\(${id}\\))" firmware/greenhouse/sensors.yaml 2>/dev/null; then
              MISSING="$MISSING $id"
            fi
          done
          if [ -n "$MISSING" ]; then
            echo "::error::New tunables without cfg_* readback:$MISSING"
            echo "Per plan Appendix B freeze rule, every new tunable needs a readback."
            exit 1
          fi
          echo "All new tunables have readback coverage"

  service-restart-drift-guard:
    name: Service restart hygiene (schema → runtime)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Flag schema changes without restart documentation
        # Observed need from 2026-04-21 MCP staleness incident — MCP ran
        # 40+ hours with stale schema because nobody restarted it post-merge.
        # Forces PR authors to document which services bounce post-merge.
        # Reads PR body via jq from $GITHUB_EVENT_PATH (not shell-interpolated
        # ${{ github.event.pull_request.body }}) so arbitrary PR-body content
        # including backticks/parens/quotes doesn't break the script.
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          BASE=$(git merge-base HEAD "origin/${BASE_REF}")
          SCHEMA_CHANGED=$(git diff --name-only "$BASE" HEAD -- \
            'verdify_schemas/**' 'ingestor/entity_map.py' 'mcp/server.py' 2>/dev/null | head -1)
          if [ -z "$SCHEMA_CHANGED" ]; then
            echo "No schema files changed"
            exit 0
          fi
          echo "Schema-touching files changed: $SCHEMA_CHANGED"
          PR_BODY=$(jq -r '.pull_request.body // ""' "$GITHUB_EVENT_PATH")
          if ! printf '%s' "$PR_BODY" | grep -iqE '(restart|bounce|service|systemctl)'; then
            echo "::error::PR touches schema/entity_map/mcp but PR body doesn't mention service restart."
            echo "Add a 'Post-merge restart' line listing which services need to bounce (e.g. verdify-mcp, verdify-ingestor)."
            exit 1
          fi
          echo "PR body documents service restart"
