###############################################################################
# greenhouse/sensors.yaml — refactored edition (2025-07-20)
#
# Defines uptime, analog sensors, Modbus sensors, derived metrics and daily
# counters.  All lambdas end with a semicolon to satisfy the ESPHome compiler.
###############################################################################

substitutions:
  upd_int: 10s
  modbus_temp_lambda: |
    /* raw register = 0.1 °C; convert → °F.
       0x7FFF (32767) = Modbus sensor error sentinel → NAN */
    if(x >= 32000.0f) return NAN;
    return (x * 0.1f) * 9.0f / 5.0f + 32.0f;
  vpd_lambda: |-
    /* VPD [kPa] from T (°F) & RH (%) */
    float tc = (T - 32) * 5.0 / 9.0;
    float es = 0.6108 * expf((17.27 * tc) / (tc + 237.3));
    return es * (1.0 - RH / 100.0);

sensor:
  # --------------------------------------------------------------------------
  # 1‑A Uptime
  # --------------------------------------------------------------------------
  - platform: uptime
    id: uptime_seconds
    name: "Uptime"
    entity_category: diagnostic
    update_interval: 60s

  - platform: wifi_signal
    name: "WiFi Signal"
    entity_category: diagnostic
    update_interval: 60s

  - platform: template
    id: heap_free
    name: "Free Heap"
    unit_of_measurement: "kB"
    entity_category: diagnostic
    accuracy_decimals: 1
    update_interval: 60s
    lambda: 'return esp_get_free_heap_size() / 1024.0f;'

  # --------------------------------------------------------------------------
  # 1‑B Analog – CO₂ & Light
  # --------------------------------------------------------------------------
  - platform: adc
    id: co2_raw_v
    pin: GPIO36
    attenuation: 12db
    internal: true
    update_interval: 5s
  - platform: template
    id: greenhouse_co2_ppm
    name: "CO₂ (ppm)"
    device_class: carbon_dioxide
    unit_of_measurement: "ppm"
    state_class: measurement
    accuracy_decimals: 0
    lambda: "return id(co2_raw_v).state * (5.0/3.3) * (10000.0/5.0);"
    filters:
      - clamp:
          min_value: 0
          max_value: 10000

  - platform: adc
    id: lux_raw_v
    pin: GPIO35
    attenuation: 12db
    internal: true
    update_interval: 5s
  - platform: template
    id: greenhouse_light_lux
    name: "Light (lx)"
    device_class: illuminance
    unit_of_measurement: "lx"
    state_class: measurement
    accuracy_decimals: 0
    lambda: |-
      // ADC baseline offset: 0.142V at 12dB attenuation = 2820 lux phantom reading.
      // Subtract offset voltage before scaling.  Confirmed by 72h of nighttime data
      // reading a constant 2820 lux while Tempest reads 0.
      float v = id(lux_raw_v).state - 0.142f;
      if (v < 0.0f) v = 0.0f;
      return v * (5.0f/3.3f) * (65535.0f/5.0f);
    filters:
      - clamp:
          min_value: 0
          max_value: 65535

  # --------------------------------------------------------------------------
  # 1‑C Water meter (diagnostic flow + total usage)
  # DAE AS200U-75P, 3/4" NPT, pulse output, measures in gallons.
  # Measures ALL water downstream including: misting, hydro, sink,
  # workstation, pressure washer hose. NOT greenhouse-only.
  # Calibrate: fill a known container (e.g., 5 gallon bucket), read
  # pulse count, adjust multiply factor. Current multiply: 1.0 (uncalibrated).
  # --------------------------------------------------------------------------
  - platform: pulse_counter
    id: water_flow_rate
    name: "Water Flow (gpm)"
    pin:
      number: GPIO33
      mode: INPUT_PULLUP
      inverted: true
    internal_filter: 10us
    update_interval: 60s
    unit_of_measurement: gal/min
    accuracy_decimals: 2
    entity_category: diagnostic
    filters:
      - multiply: 1.0   # adjust after calibration (see above)
    total:
      id: water_total_used
      name: "Water Used (gal)"
      unit_of_measurement: gal
      device_class: water
      state_class: total_increasing
      accuracy_decimals: 1
      filters:
        - multiply: 1.0

  # --------------------------------------------------------------------------
  # 2. MODBUS PROBES
  # --------------------------------------------------------------------------
  # Controller case
  - platform: modbus_controller
    id: case_temperature
    name: "Case Temp (°F)"
    modbus_controller_id: case_probe
    register_type: holding
    address: 0x0000
    value_type: U_WORD
    device_class: temperature
    unit_of_measurement: "°F"
    state_class: measurement
    accuracy_decimals: 1
    filters:
      - lambda: ${modbus_temp_lambda}
    on_value:
      then:
        - lambda: |-
            id(last_case_probe)      = id(sntp_time).now().timestamp;
            id(last_external_update) = millis() / 1000;
            id(last_case_ms) = millis();

  - platform: modbus_controller
    id: case_humidity
    name: "Case RH (%)"
    modbus_controller_id: case_probe
    register_type: holding
    address: 0x0001
    value_type: U_WORD
    device_class: humidity
    unit_of_measurement: "%"
    state_class: measurement
    accuracy_decimals: 1
    filters:
      - multiply: 0.1
      - lambda: "return x > 110.0f ? NAN : x;"  # 0x7FFF sentinel → NAN

  # North wall
  - platform: modbus_controller
    id: north_wall_temperature
    name: "North Temp (°F)"
    modbus_controller_id: north_wall_probe
    register_type: holding
    address: 0x0000
    value_type: U_WORD
    device_class: temperature
    unit_of_measurement: "°F"
    state_class: measurement
    accuracy_decimals: 1
    filters:
      - lambda: ${modbus_temp_lambda}
    on_value:
      then:
        - lambda: |-
            id(last_external_update) = millis() / 1000;
            id(last_north_ms) = millis();
  - platform: modbus_controller
    id: north_wall_humidity
    name: "North RH (%)"
    modbus_controller_id: north_wall_probe
    register_type: holding
    address: 0x0001
    value_type: U_WORD
    device_class: humidity
    unit_of_measurement: "%"
    state_class: measurement
    accuracy_decimals: 1
    filters:
      - multiply: 0.1
      - lambda: "return x > 110.0f ? NAN : x;"  # 0x7FFF sentinel → NAN
  - platform: template
    id: vpd_north
    name: "North VPD (kPa)"
    unit_of_measurement: "kPa"
    state_class: measurement
    accuracy_decimals: 2
    update_interval: 15s
    lambda: |-
      float T  = id(north_wall_temperature).state;
      float RH = id(north_wall_humidity).state;
      if(isnan(T) || isnan(RH)) return NAN;
      ${vpd_lambda}

  # West wall
  - platform: modbus_controller
    id: west_wall_temperature
    name: "West Temp (°F)"
    modbus_controller_id: west_wall_probe
    register_type: holding
    address: 0x0000
    value_type: U_WORD
    device_class: temperature
    unit_of_measurement: "°F"
    state_class: measurement
    accuracy_decimals: 1
    filters:
      - lambda: ${modbus_temp_lambda}
    on_value:
      then:
        - lambda: |-
            id(last_external_update) = millis() / 1000;
            id(last_west_ms) = millis();
  - platform: modbus_controller
    id: west_wall_humidity
    name: "West RH (%)"
    modbus_controller_id: west_wall_probe
    register_type: holding
    address: 0x0001
    value_type: U_WORD
    device_class: humidity
    unit_of_measurement: "%"
    state_class: measurement
    accuracy_decimals: 1
    filters:
      - multiply: 0.1
      - lambda: "return x > 110.0f ? NAN : x;"  # 0x7FFF sentinel → NAN
  - platform: template
    id: vpd_west
    name: "West VPD (kPa)"
    unit_of_measurement: "kPa"
    state_class: measurement
    accuracy_decimals: 2
    update_interval: 15s
    lambda: |-
      float T  = id(west_wall_temperature).state;
      float RH = id(west_wall_humidity).state;
      if(isnan(T) || isnan(RH)) return NAN;
      ${vpd_lambda}

  # South wall
  - platform: modbus_controller
    id: south_wall_temperature
    name: "South Temp (°F)"
    modbus_controller_id: south_wall_probe
    register_type: holding
    address: 0x0000
    value_type: U_WORD
    device_class: temperature
    unit_of_measurement: "°F"
    state_class: measurement
    accuracy_decimals: 1
    filters:
      - lambda: ${modbus_temp_lambda}
    on_value:
      then:
        - lambda: |-
            id(last_external_update) = millis() / 1000;
            id(last_south_ms) = millis();
  - platform: modbus_controller
    id: south_wall_humidity
    name: "South RH (%)"
    modbus_controller_id: south_wall_probe
    register_type: holding
    address: 0x0001
    value_type: U_WORD
    device_class: humidity
    unit_of_measurement: "%"
    state_class: measurement
    accuracy_decimals: 1
    filters:
      - multiply: 0.1
      - lambda: "return x > 110.0f ? NAN : x;"  # 0x7FFF sentinel → NAN
  - platform: template
    id: vpd_south
    name: "South VPD (kPa)"
    unit_of_measurement: "kPa"
    state_class: measurement
    accuracy_decimals: 2
    update_interval: 15s
    lambda: |-
      float T  = id(south_wall_temperature).state;
      float RH = id(south_wall_humidity).state;
      if(isnan(T) || isnan(RH)) return NAN;
      ${vpd_lambda}

  # East wall
  - platform: modbus_controller
    id: east_wall_temperature
    name: "East Temp (°F)"
    modbus_controller_id: east_wall_probe
    register_type: holding
    address: 0x0000
    value_type: U_WORD
    device_class: temperature
    unit_of_measurement: "°F"
    state_class: measurement
    accuracy_decimals: 1
    filters:
      - lambda: ${modbus_temp_lambda}
    on_value:
      then:
        - lambda: |-
            id(last_external_update) = millis() / 1000;
            id(last_east_ms) = millis();
  - platform: modbus_controller
    id: east_wall_humidity
    name: "East RH (%)"
    modbus_controller_id: east_wall_probe
    register_type: holding
    address: 0x0001
    value_type: U_WORD
    device_class: humidity
    unit_of_measurement: "%"
    state_class: measurement
    accuracy_decimals: 1
    filters:
      - multiply: 0.1
      - lambda: "return x > 110.0f ? NAN : x;"  # 0x7FFF sentinel → NAN
  - platform: template
    id: vpd_east
    name: "East VPD (kPa)"
    unit_of_measurement: "kPa"
    state_class: measurement
    accuracy_decimals: 2
    update_interval: 15s
    lambda: |-
      float T  = id(east_wall_temperature).state;
      float RH = id(east_wall_humidity).state;
      if(isnan(T) || isnan(RH)) return NAN;
      ${vpd_lambda}

  # Exterior intake
  - platform: modbus_controller
    id: exterior_intake_temperature
    name: "Exterior Intake Temp (°F)"
    modbus_controller_id: exterior_intake_probe
    register_type: holding
    address: 0x0000
    value_type: U_WORD
    device_class: temperature
    unit_of_measurement: "°F"
    state_class: measurement
    accuracy_decimals: 1
    filters:
      - lambda: ${modbus_temp_lambda}
    on_value:
      then:
        - lambda: |-
            id(last_external_update) = millis() / 1000;
  - platform: modbus_controller
    id: exterior_intake_humidity
    name: "Exterior Intake RH (%)"
    modbus_controller_id: exterior_intake_probe
    register_type: holding
    address: 0x0001
    value_type: U_WORD
    device_class: humidity
    unit_of_measurement: "%"
    state_class: measurement
    accuracy_decimals: 1
    filters:
      - multiply: 0.1
      - lambda: "return x > 110.0f ? NAN : x;"  # 0x7FFF sentinel → NAN
  - platform: template
    id: vpd_exterior
    name: "Exterior Intake VPD (kPa)"
    unit_of_measurement: "kPa"
    state_class: measurement
    accuracy_decimals: 2
    update_interval: 15s
    lambda: |-
      float T  = id(exterior_intake_temperature).state;
      float RH = id(exterior_intake_humidity).state;
      if(isnan(T) || isnan(RH)) return NAN;
      ${vpd_lambda}

  # --------------------------------------------------------------------------
  # 2a. SOIL SENSORS (DFRobot SEN0600 / SEN0601)
  # Modbus RTU 9600 8N1. Poll every 60s with 200ms throttle.
  # timeout_filter: if no valid reading in 5 min, publish NaN (avoids stale data)
  # --------------------------------------------------------------------------
  # South zone sensor 1 — SEN0601 (moisture + temp + EC), addr 7
  - platform: modbus_controller
    id: south_1_soil_moisture
    name: "South 1 Soil Moisture (%)"
    modbus_controller_id: south_1_soil_probe
    register_type: holding
    address: 0x0000
    value_type: U_WORD
    device_class: moisture
    unit_of_measurement: "%"
    state_class: measurement
    accuracy_decimals: 1
    filters:
      - multiply: 0.1
      - timeout: 300s
  - platform: modbus_controller
    id: south_1_soil_temp
    name: "South 1 Soil Temp (°F)"
    modbus_controller_id: south_1_soil_probe
    register_type: holding
    address: 0x0001
    value_type: U_WORD
    device_class: temperature
    unit_of_measurement: "°F"
    state_class: measurement
    accuracy_decimals: 1
    filters:
      - lambda: ${modbus_temp_lambda}
      - timeout: 300s
  - platform: modbus_controller
    id: south_1_soil_ec
    name: "South 1 Soil EC (µS⁄cm)"
    modbus_controller_id: south_1_soil_probe
    register_type: holding
    address: 0x0002
    value_type: U_WORD
    unit_of_measurement: "µS/cm"
    state_class: measurement
    accuracy_decimals: 0
    filters:
      - timeout: 300s

  # South zone sensor 2 — SEN0600 (moisture + temp), addr 8
  - platform: modbus_controller
    id: south_2_soil_moisture
    name: "South 2 Soil Moisture (%)"
    modbus_controller_id: south_2_soil_probe
    register_type: holding
    address: 0x0000
    value_type: U_WORD
    device_class: moisture
    unit_of_measurement: "%"
    state_class: measurement
    accuracy_decimals: 1
    filters:
      - multiply: 0.1
      - timeout: 300s
  - platform: modbus_controller
    id: south_2_soil_temp
    name: "South 2 Soil Temp (°F)"
    modbus_controller_id: south_2_soil_probe
    register_type: holding
    address: 0x0001
    value_type: U_WORD
    device_class: temperature
    unit_of_measurement: "°F"
    state_class: measurement
    accuracy_decimals: 1
    filters:
      - lambda: ${modbus_temp_lambda}
      - timeout: 300s

  # West zone — SEN0600 (moisture + temp)
  - platform: modbus_controller
    id: west_soil_moisture
    name: "West Soil Moisture (%)"
    modbus_controller_id: west_soil_probe
    register_type: holding
    address: 0x0000
    value_type: U_WORD
    device_class: moisture
    unit_of_measurement: "%"
    state_class: measurement
    accuracy_decimals: 1
    filters:
      - multiply: 0.1
      - timeout: 300s
  - platform: modbus_controller
    id: west_soil_temp
    name: "West Soil Temp (°F)"
    modbus_controller_id: west_soil_probe
    register_type: holding
    address: 0x0001
    value_type: U_WORD
    device_class: temperature
    unit_of_measurement: "°F"
    state_class: measurement
    accuracy_decimals: 1
    filters:
      - lambda: ${modbus_temp_lambda}
      - timeout: 300s

  # --------------------------------------------------------------------------
  # 2b. OUTDOOR CLIMATE — Tempest direct (primary) + HTTP pull (fallback)
  # --------------------------------------------------------------------------
  # Tempest UDP provides data every 60s. HTTP /setpoints pull every 300s as backup.
  # The enthalpy calculation and economiser reference these IDs.
  - platform: template
    id: ha_outdoor_temp
    internal: true
    update_interval: 30s
    lambda: |-
      float t = id(tempest_temp_f);
      if (!isnan(t)) return t;
      return id(pulled_outdoor_temp_f);

  - platform: template
    id: ha_outdoor_rh
    internal: true
    update_interval: 30s
    lambda: |-
      float r = id(tempest_rh_pct);
      if (!isnan(r)) return r;
      return id(pulled_outdoor_rh_pct);

  # Outdoor weather — now sourced from Tempest UDP (see external_sensors.yaml)
  # Legacy HA imports removed. Tempest sensors: tempest_outdoor_temp, tempest_outdoor_rh, tempest_illuminance

  # Expose Tempest illuminance as outdoor reference for grow light automation
  - platform: template
    id: outdoor_illuminance
    name: "Outdoor Illuminance"
    icon: mdi:weather-sunny
    unit_of_measurement: "lx"
    accuracy_decimals: 0
    device_class: illuminance
    update_interval: 60s
    lambda: |-
      float v = id(tempest_lux);
      if(isnan(v)) return NAN;
      return v;

  # --------------------------------------------------------------------------
  # 3. DERIVED METRICS
  # --------------------------------------------------------------------------
  # Absolute humidity outside (g/m³, internal)
  - platform: template
    id: absolute_humidity_out
    internal: true
    unit_of_measurement: "g/m³"
    accuracy_decimals: 1
    update_interval: 15s
    lambda: |-
      // Prefer local Modbus probe; fall back to HA 3-tier sensor
      float T  = id(exterior_intake_temperature).state;
      float RH = id(exterior_intake_humidity).state;
      if(isnan(T) || isnan(RH)){
        T  = id(ha_outdoor_temp).state;
        RH = id(ha_outdoor_rh).state;
      }
      if(isnan(T) || isnan(RH)){
        T  = id(pulled_outdoor_temp_f);
        RH = id(pulled_outdoor_rh_pct);
      }
      if(isnan(T) || isnan(RH)) return NAN;
      float tc = (T - 32) * 5.0f / 9.0f;
      float es = 0.6108f * expf((17.27f * tc) / (tc + 237.3f)) * 10.0f;  // kPa→hPa
      float avp= es * RH / 100.0f;
      return 216.7f * (avp / (tc + 273.15f));

  # Interior averages
  - platform: template
    id: average_temperature
    name: "Avg Temp (°F)"
    device_class: temperature
    unit_of_measurement: "°F"
    state_class: measurement
    accuracy_decimals: 1
    update_interval: 15s
    lambda: |
      float s = 0; int n = 0;
      float vals[] = {
        id(north_wall_temperature).state, id(west_wall_temperature).state,
        id(south_wall_temperature).state, id(east_wall_temperature).state
      };
      for(float v : vals) if(!isnan(v)){ s += v; n++; }
      return n ? s/n : NAN;

  - platform: template
    id: average_humidity
    name: "Avg RH (%)"
    device_class: humidity
    unit_of_measurement: "%"
    state_class: measurement
    accuracy_decimals: 1
    update_interval: 15s
    lambda: |
      float s = 0; int n = 0;
      float vals[] = {
        id(north_wall_humidity).state, id(west_wall_humidity).state,
        id(south_wall_humidity).state, id(east_wall_humidity).state
      };
      for(float v : vals) if(!isnan(v)){ s += v; n++; }
      return n ? s/n : NAN;

  - platform: template
    id: average_vpd_kpa
    name: "Avg VPD (kPa)"
    unit_of_measurement: "kPa"
    state_class: measurement
    accuracy_decimals: 2
    update_interval: 15s
    lambda: |
      float s = 0; int n = 0;
      float vals[] = {
        id(vpd_north).state, id(vpd_west).state,
        id(vpd_south).state, id(vpd_east).state
      };
      for(float v : vals) if(!isnan(v)){ s += v; n++; }
      return n ? s/n : NAN;

  # Absolute humidity inside
  - platform: template
    id: absolute_humidity
    name: "Abs Humidity (g⁄m³)"
    unit_of_measurement: "g/m³"
    state_class: measurement
    accuracy_decimals: 1
    update_interval: 15s
    lambda: |
      if(isnan(id(average_temperature).state) || isnan(id(average_humidity).state)) return NAN;
      float tc = (id(average_temperature).state - 32.0f) * 5.0f / 9.0f;
      float rh = id(average_humidity).state;
      float es = 0.6108f * expf((17.27f * tc) / (tc + 237.3f)) * 10.0f;  // kPa→hPa
      float avp= es * rh / 100.0f;
      return 216.7f * (avp / (tc + 273.15f));

  # Dew point
  - platform: template
    id: dewpoint_avg
    name: "Dew Point (°F)"
    device_class: temperature
    unit_of_measurement: "°F"
    state_class: measurement
    accuracy_decimals: 1
    update_interval: 15s
    lambda: |
      if(isnan(id(average_temperature).state) || isnan(id(average_humidity).state)) return NAN;
      float tc  = (id(average_temperature).state - 32.0f) * 5.0f / 9.0f;
      float rh  = id(average_humidity).state;
      float lnR = logf(rh / 100.0f);
      float dpC = (237.3f * (lnR + ((17.27f * tc) / (237.3f + tc)))) /
                  (17.27f - lnR - ((17.27f * tc) / (237.3f + tc)));
      return dpC * 9.0f / 5.0f + 32.0f;

  # Enthalpy (inside, outside, Δ)
  - platform: template
    id: inside_enthalpy
    internal: true
    accuracy_decimals: 2
    update_interval: 15s
    lambda: |-
      float T  = id(average_temperature).state;
      float RH = id(average_humidity).state;
      if(isnan(T) || isnan(RH)) return NAN;
      float tc = (T - 32.0f) * 5.0f / 9.0f;
      float pv = 0.6108f * expf((17.27f * tc) / (tc + 237.3f)) * RH / 100.0f * 10.0f;  // kPa→hPa
      float P  = id(site_pressure_hpa);
      float x  = 0.622f * pv / (P - pv);
      return 1.006f * tc + x * (2501.0f + 1.84f * tc);

  - platform: template
    id: outside_enthalpy
    internal: true
    accuracy_decimals: 2
    update_interval: 15s
    lambda: |-
      // Prefer local Modbus probe; fall back to HA 3-tier sensor
      float T  = id(exterior_intake_temperature).state;
      float RH = id(exterior_intake_humidity).state;
      if(isnan(T) || isnan(RH)){
        T  = id(ha_outdoor_temp).state;
        RH = id(ha_outdoor_rh).state;
      }
      if(isnan(T) || isnan(RH)){
        T  = id(pulled_outdoor_temp_f);
        RH = id(pulled_outdoor_rh_pct);
      }
      if(isnan(T) || isnan(RH)) return NAN;
      float tc = (T - 32.0f) * 5.0f / 9.0f;
      float pv = 0.6108f * expf((17.27f * tc) / (tc + 237.3f)) * RH / 100.0f * 10.0f;  // kPa→hPa
      float P  = id(site_pressure_hpa);
      float x  = 0.622f * pv / (P - pv);
      return 1.006f * tc + x * (2501.0f + 1.84f * tc);

  - platform: template
    id: enthalpy_diff
    name: "Enthalpy Δ (kJ⁄kg)"
    unit_of_measurement: "kJ/kg"
    state_class: measurement
    accuracy_decimals: 2
    update_interval: 15s
    lambda: |-
      float out = id(outside_enthalpy).state;
      float in  = id(inside_enthalpy).state;
      if(isnan(out) || isnan(in)) return NAN;
      float diff = out - in;
      if(diff < -200.0f || diff > 200.0f) return NAN;
      return diff;

  # --------------------------------------------------------------------------
  # 4. DAILY CYCLE COUNTERS (diagnostic)
  # --------------------------------------------------------------------------
  - platform: template
    id: daily_fan1_cycles
    name: "Cycles • Fan 1 (today)"
    entity_category: diagnostic
    state_class: total
    unit_of_measurement: "cycles"
    accuracy_decimals: 0
    update_interval: 30s
