  # These sensors mirror the temperature and VPD values actually used in the
  # control loop after applying fallback logic.  They are helpful for debugging
  # when averages are invalid or sensors are failing.
  - platform: template
    id: control_tin
    name: "Control Tin (°F)"
    device_class: temperature
    unit_of_measurement: "°F"
    state_class: measurement
    accuracy_decimals: 1
    update_interval: 10s
    lambda: |-
      if(isnan(id(average_temperature).state) || isnan(id(average_humidity).state)){
        return id(case_temperature).state;
      }else{
        return id(average_temperature).state;
      }

  - platform: template
    id: control_vpd_kpa
    name: "Control VPD (kPa)"
    unit_of_measurement: "kPa"
    state_class: measurement
    accuracy_decimals: 2
    update_interval: 10s
    lambda: |-
      float Tin;
      float RHin;
      if(isnan(id(average_temperature).state) || isnan(id(average_humidity).state)){
        Tin = id(case_temperature).state;
        RHin = id(case_humidity).state;
      }else{
        Tin = id(average_temperature).state;
        RHin = id(average_humidity).state;
      }
      float tc=(Tin-32.0f)*5.0f/9.0f;
      float es=0.6108f*expf((17.27f*tc)/(tc+237.3f));
      if(isnan(RHin)) return NAN;
      float vpd = es*(1.0f-RHin/100.0f);
      return vpd < 0.0f ? 0.0f : vpd;

