    state_class: measurement
    accuracy_decimals: 2
    entity_category: diagnostic
    update_interval: 30s
    lambda: "return id(east_adjacency_factor);"

  # Mister pulse VPD effectiveness (updated by controls.yaml after each pulse)
  - platform: template
    id: mister_vpd_delta
    name: "Mister VPD Delta"
    unit_of_measurement: "kPa"
    accuracy_decimals: 3
    update_interval: never
    icon: "mdi:water-opacity"

# ─────────────────── TEXT SENSORS ──────────────────────────────────────────

text_sensor:
  # A1: State machine transition logging
  - platform: template
    id: ts_last_transition
    name: "Last State Transition"
    entity_category: diagnostic

  # A2: Per-probe health monitoring
  - platform: template
    id: probe_health
    name: "Probe Health"
    entity_category: diagnostic
    update_interval: 60s
    lambda: |-
      uint32_t now = millis();
      const uint32_t STALE_MS = 120000;
      std::string result;
      struct { const char* name; uint32_t last; } probes[] = {
        {"Case", id(last_case_ms)},
        {"North", id(last_north_ms)},
        {"West", id(last_west_ms)},
        {"South", id(last_south_ms)},
        {"East", id(last_east_ms)}
      };
      bool all_ok = true;
      for(auto &p : probes){
        if(p.last == 0 || (now - p.last) > STALE_MS){
          if(!all_ok) result += ", ";
          result += p.name;
          result += " STALE";
          all_ok = false;
        }
      }
      return all_ok ? std::string("OK") : result;

