                    if(key == "mist_vent_close_lead_s"){ int v = ci((int)val, 0, 60); if(id(mist_vent_close_lead_s) != v){ id(mist_vent_close_lead_s) = v; id(num_mist_vent_close_lead).publish_state(v); applied++; }}
                    if(key == "mist_max_closed_vent_s"){ int v = ci((int)val, 120, 900); if(id(mist_max_closed_vent_s) != v){ id(mist_max_closed_vent_s) = v; id(num_mist_max_closed_vent).publish_state(v); applied++; }}
                    if(key == "fog_escalation_kpa"){ val = cf(val, 0.1, 1.0); if(fabs(id(fog_escalation_kpa) - val) > 0.01f){ id(fog_escalation_kpa) = val; id(num_fog_escalation_kpa).publish_state(val); applied++; }}
                    if(key == "sw_gl_auto_mode"){ bool v = val > 0.5f; if(id(gl_auto_enabled) != v){ id(gl_auto_enabled) = v; id(sw_gl_auto).publish_state(v); applied++; }}
