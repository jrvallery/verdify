################################################################################
# greenhouse/controls.yaml — Mode-based climate controller (2026-04-10)
#
# 6-mode architecture: SAFETY_COOL, SAFETY_HEAT, SEALED_MIST,
# THERMAL_RELIEF, VENTILATE, IDLE. Each mode defines a complete, consistent
# set of relay outputs. No override layers — the mode table IS the truth.
#
# Vent and fans are always consistent: sealed modes have vent closed + fans off,
# open modes have vent open + fans on. Open-vent moisture is allowed only for
# the explicit VENTILATE assist path. Heater/vent oscillation is structurally
# impossible.
################################################################################

interval:
  - interval: 5s
    then:
      - lambda: |-
          /*************** CONFIG CONSTANTS **************************************/
          const uint32_t MIN_HEAT_ON_MS    = uint32_t(id(min_heat_on_s))  * 1000UL;
          const uint32_t MIN_HEAT_OFF_MS   = uint32_t(id(min_heat_off_s)) * 1000UL;
          const uint32_t MIN_FAN_ON_MS     = uint32_t(id(min_fan_on_s))   * 1000UL;
          const uint32_t MIN_FAN_OFF_MS    = uint32_t(id(min_fan_off_s))  * 1000UL;
          const uint32_t MIN_VENT_ON_MS    = uint32_t(id(min_vent_on_s))  * 1000UL;
          const uint32_t MIN_VENT_OFF_MS   = uint32_t(id(min_vent_off_s)) * 1000UL;
          const uint32_t MIN_FOG_ON_MS     = uint32_t(id(min_fog_on_s))  * 1000UL;
          const uint32_t MIN_FOG_OFF_MS    = uint32_t(id(min_fog_off_s)) * 1000UL;

          const float    EXTRA_COOL_S3_DELTA_F = 2.0f;
          const uint32_t LEAD_ROTATE_TIMEOUT_MS =
                   std::max(uint32_t(id(lead_rotate_timeout_s)) * 1000UL, uint32_t(60000UL));

          // Enums (Mode) and structs (SensorInputs, Setpoints,
          // ControlState, RelayOutputs) defined in greenhouse_logic.h
          // — included via esphome.includes in greenhouse.yaml

          /**************** 1 — time bookkeeping *********************************/
          static uint32_t last_ms = millis();
          uint32_t now_ms = millis();
          uint32_t dt_ms  = (now_ms < last_ms) ? 0 : (now_ms - last_ms);
          // Sprint-10 0.4a: clamp dt_ms. The interval is 5 s; anything
          // larger is a hiccup (RTOS hang, OTA pause, debugger break).
          // sat_add prevents overflow but not behavioral skipping — one
          // huge dt_ms can leap through vpd_watch_dwell, sealed_max_ms,
          // and mist_s2_delay_ms in a single tick.
          if(dt_ms > 5000) dt_ms = 5000;
          last_ms = now_ms;

          /**************** 1b — occupancy fail-safe *****************************/
          const uint32_t OCCUPANCY_FAILSAFE_MS = 3600000UL;
          const bool occupancy_override_active = id(occupancy_override_until_ms) != 0
            && (int32_t)(id(occupancy_override_until_ms) - now_ms) > 0;
          if(id(occupancy_override_until_ms) != 0 && !occupancy_override_active){
            id(occupancy_override_until_ms) = 0;
            ESP_LOGW("occupancy","Local quiet override expired");
          }
          if(occupancy_override_active && id(greenhouse_occupied)){
            id(greenhouse_occupied) = false;
            id(occupancy_last_true_ms) = 0;
            id(sw_greenhouse_occupied).publish_state(false);
            ESP_LOGW("occupancy","Local quiet override forced occupancy empty");
          }
          if(id(greenhouse_occupied)){
            if(id(occupancy_last_true_ms) == 0){
              id(occupancy_last_true_ms) = now_ms;
            } else if(now_ms - id(occupancy_last_true_ms) > OCCUPANCY_FAILSAFE_MS){
              id(greenhouse_occupied) = false;
              id(occupancy_last_true_ms) = 0;
              id(sw_greenhouse_occupied).publish_state(false);
              ESP_LOGW("occupancy","Occupancy fail-safe expired without fresh API detection; forcing empty");
            }
          }

          /**************** 2 — relay metadata & helpers **************************/
          struct RelayMeta {
            esphome::switch_::Switch *sw;
            uint32_t on_stamp_ms = 0;
            uint32_t runtime_ms = 0;
            uint32_t min_on_ms;
            uint32_t min_off_ms;
            uint32_t last_on_ms = 0;
            uint32_t last_off_ms = 0;
          };

          static RelayMeta R[] = {
            { id(heat1_rly), 0,0, MIN_HEAT_ON_MS, MIN_HEAT_OFF_MS }, // H1
            { id(heat2_rly), 0,0, MIN_HEAT_ON_MS, MIN_HEAT_OFF_MS }, // H2
            { id(fan1_rly) , 0,0, MIN_FAN_ON_MS , MIN_FAN_OFF_MS  }, // F1
            { id(fan2_rly) , 0,0, MIN_FAN_ON_MS , MIN_FAN_OFF_MS  }, // F2
            { id(fog_rly)  , 0,0, MIN_FOG_ON_MS , MIN_FOG_OFF_MS  }, // Fog
            { id(vent_rly) , 0,0, MIN_VENT_ON_MS, MIN_VENT_OFF_MS }  // Vent
          };

          auto update_runtime = [&](RelayMeta &r){
            if(!r.sw->state && r.on_stamp_ms){
              r.runtime_ms += now_ms - r.on_stamp_ms;
              r.on_stamp_ms = 0;
            }
          };
          auto can_on  = [&](RelayMeta &r){ return now_ms - r.last_off_ms >= r.min_off_ms; };
          auto can_off = [&](RelayMeta &r){ return now_ms - r.last_on_ms  >= r.min_on_ms; };

          auto set_relay = [&](RelayMeta &r,bool want,bool force_on,bool force_off=false){
            update_runtime(r);
            if(want){
              if(!r.sw->state && (force_on || can_on(r))){
                r.sw->turn_on();
                r.last_on_ms = now_ms;
                r.on_stamp_ms= now_ms;
              }
            }else{
              if(r.sw->state && (force_off || can_off(r))){
                r.sw->turn_off();
                r.last_off_ms = now_ms;
                update_runtime(r);
              }
            }
          };

          /**************** 3 — mid‑night reset of runtimes (A3 fix) **************/
          static int last_doy = -1;
          if(id(sntp_time).now().is_valid()){
            int doy = id(sntp_time).now().day_of_year;
                if(doy != last_doy){
                  // A3: snapshot runtime for relays ON at midnight boundary
                  for(auto &r : R){
                    if(r.sw->state && r.on_stamp_ms){
                      r.runtime_ms += now_ms - r.on_stamp_ms;
                      r.on_stamp_ms = now_ms;
                    }
                  }
                  // Now reset counters
                  for(auto &r : R) r.runtime_ms = 0;
                  id(runtime_heat1_ms) = 0;
                  id(runtime_heat2_ms) = 0;
                  id(runtime_fan1_ms)  = 0;
                  id(runtime_fan2_ms)  = 0;
                  id(runtime_fog_ms)   = 0;
                  id(runtime_vent_ms)  = 0;
                  // B5: reset DLI accumulator at midnight
                  id(dli_accumulator) = 0.0f;
                  last_doy = doy;
                }
          }

          /**************** 4 — sensor ingest & derived fields ********************/
          auto vpd_calc = [&](float T,float RH){
            float tc=(T-32.0f)*5.0f/9.0f;
            if(fabs(tc + 237.3f) < 0.1f) return 1.0f;  // guard against division by ~zero
            float es=0.6108f*expf((17.27f*tc)/(tc+237.3f));
            return es*(1.0f-RH/100.0f);
          };

          // Age pulled outdoor data — invalidate if >1 hour stale
          id(pulled_data_age_s) += dt_ms / 1000;
          if(id(pulled_data_age_s) > 3600){
            id(pulled_outdoor_temp_f) = NAN;
            id(pulled_outdoor_rh_pct) = NAN;
          }
          float Tin;
          float RHin;
          // Use average sensors if valid, otherwise fall back to case probe.
          bool avg_ok = !isnan(id(average_temperature).state) && !isnan(id(average_humidity).state);
          bool case_ok_t = !isnan(id(case_temperature).state);
          if(avg_ok){
            Tin = id(average_temperature).state;
            RHin = id(average_humidity).state;
          }else if(case_ok_t){
            Tin = id(case_temperature).state;
            RHin = isnan(id(case_humidity).state) ? 50.0f : id(case_humidity).state;
            ESP_LOGW("sensor","Average sensors NaN — using case probe (%.1f°F)", Tin);
          }else{
            Tin = 65.0f;  // safe mid-range assumption
            RHin = 50.0f;
            ESP_LOGE("sensor","ALL temperature probes NaN — using safe default 65°F");
          }

          // Track how long ALL probes have been offline
          static uint32_t all_probes_nan_ms = 0;
          if(!avg_ok && !case_ok_t){
            all_probes_nan_ms += dt_ms;
            if(all_probes_nan_ms > 300000 && (all_probes_nan_ms % 60000) < dt_ms){
              ESP_LOGE("health","ALL temperature probes offline for %.0f min!",
                       all_probes_nan_ms / 60000.0f);
            }
          }else{
            all_probes_nan_ms = 0;
          }

          // Sanity check: reject physically impossible indoor readings
          if(Tin < -20.0f || Tin > 150.0f){
            ESP_LOGE("sensor","Tin=%.1f out of range — clamping to 65°F", Tin);
            Tin = 65.0f;
          }

          float VPD = id(average_vpd_kpa).state;
          if(isnan(VPD) && !isnan(Tin) && !isnan(RHin)){
            VPD = vpd_calc(Tin,RHin);
          }
          if(isnan(VPD)) VPD = 1.0f;  // safe mid-range if all else fails
          if(VPD < 0.0f) VPD = 0.0f;
          if(VPD > 10.0f) VPD = 10.0f;  // cap at physically reasonable max

          float dH = id(enthalpy_diff).state;   // outside - inside
          // Track enthalpy staleness — if no update in 10 min, treat as NaN
          static uint32_t enthalpy_age_ms = 0;
          static float last_dH = NAN;
          if(!isnan(dH) && dH != last_dH){
            enthalpy_age_ms = 0;
            last_dH = dH;
          }else{
            enthalpy_age_ms += dt_ms;
          }
          if(enthalpy_age_ms > 600000){  // 10 min stale → treat as NaN
            dH = NAN;
          }

          /**************** 5 — apply safety rails & NaN handling (A6 graduated) */
          bool tin_nan = isnan(Tin);
          if(tin_nan){
            // A6: 3-tier NaN fallback:
            //   1) ha_outdoor_temp + indoor offset
            //   2) binary assumption (cold or hot)
            float ha_t = id(ha_outdoor_temp).state;
            if(isnan(ha_t)) ha_t = id(pulled_outdoor_temp_f);
            if(!isnan(ha_t)){
              Tin = ha_t + id(indoor_offset_on_nan_f);
              ESP_LOGW("nan","Tin NaN — using HA outdoor %.1f + offset %.1f = %.1f°F",
                       ha_t, id(indoor_offset_on_nan_f), Tin);
            } else if(id(assume_cold_on_nan)){
              Tin = id(safety_min_f) - 10.0f;
              ESP_LOGW("nan","Tin NaN — all sources failed, assuming cold %.1f°F", Tin);
            }else{
              Tin = id(safety_max_f) + 10.0f;
              ESP_LOGW("nan","Tin NaN — all sources failed, assuming hot %.1f°F", Tin);
            }
          }
          bool vpd_nan = isnan(VPD);
          if(vpd_nan){
            // approximate VPD from RH only if possible
            if(!isnan(RHin)){
              VPD = vpd_calc(Tin,RHin);
            }else{
              VPD = 0.0f;
            }
          }

          /**************** 6 — set-points & thresholds ***************************/
          const float Tlow  = id(target_temp_low_f)  + id(bias_heat_f);
          const float Thigh = id(target_temp_high_f) + id(bias_cool_f);
          const float HT    = id(hyst_temp_f);
          const float dH2   = id(stage2_heat_delta_f);
          const float dC2   = id(stage2_cool_delta_f);
          const float VPDlo = id(target_vpd_low_kpa);
          const float VPDhi = id(target_vpd_high_kpa);
          const float HV    = id(hyst_vpd_kpa);
          // SAFETY SANITY: refuse invalid bounds — fall back to hardcoded defaults
          float TminSafe = id(safety_min_f);
          float TmaxSafe = id(safety_max_f);
          float VPDminSafe = id(safety_vpd_min_kpa);
          float VPDmaxSafe = id(safety_vpd_max_kpa);
          if(TminSafe < 30.0f || TminSafe > 70.0f || isnan(TminSafe)){
            id(safety_min_f) = 45.0f; TminSafe = 45.0f;
            ESP_LOGE("safety","Invalid safety_min (%.1f) — reset to 45°F", TminSafe);
          }
          if(TmaxSafe < 70.0f || TmaxSafe > 120.0f || isnan(TmaxSafe)){
            id(safety_max_f) = 95.0f; TmaxSafe = 95.0f;
            ESP_LOGE("safety","Invalid safety_max (%.1f) — reset to 95°F", TmaxSafe);
          }
          if(TminSafe >= TmaxSafe){
            id(safety_min_f) = 45.0f; id(safety_max_f) = 95.0f;
            TminSafe = 45.0f; TmaxSafe = 95.0f;
            ESP_LOGE("safety","Inverted safety bounds — reset to 45/95°F");
          }
          if(VPDminSafe < 0.0f || VPDmaxSafe < 1.0f || VPDminSafe >= VPDmaxSafe || isnan(VPDminSafe) || isnan(VPDmaxSafe)){
            id(safety_vpd_min_kpa) = 0.3f; id(safety_vpd_max_kpa) = 3.0f;
            VPDminSafe = 0.3f; VPDmaxSafe = 3.0f;
            ESP_LOGE("safety","Invalid VPD safety bounds — reset to 0.3/3.0 kPa");
          }

          /* enthalpy gate (economiser) — persist across loops for deadband hysteresis */
          bool econ_block = id(econ_block_state);
          if(!id(economiser_enabled)){
            econ_block = false;
          } else if(isnan(dH)){
            // Intake sensor offline — block venting to avoid blind decisions
            if(!econ_block){
              ESP_LOGW("econ","Intake sensor offline (dH=NaN) — blocking economiser venting");
            }
            econ_block = true;
          } else {
            // A8: log economiser transitions
            bool was_blocked = econ_block;
            if(dH <= id(enthalpy_open_kjkg))  econ_block = false;
            if(dH >= id(enthalpy_close_kjkg)) econ_block = true;
            if(econ_block && !was_blocked)
              ESP_LOGI("econ","Economiser BLOCKED (dH=%.1f >= %.1f)", dH, id(enthalpy_close_kjkg));
            if(!econ_block && was_blocked)
              ESP_LOGI("econ","Economiser UNBLOCKED (dH=%.1f <= %.1f)", dH, id(enthalpy_open_kjkg));
          }

          /**************** 6b — OUTDOOR RH ADAPTIVE FOG BURST ******************/
          {
            float outdoor_rh = id(ha_outdoor_rh).state;
            if(!isnan(outdoor_rh)){
              int new_mode;
              // Hysteresis: use 5% dead band
              if(outdoor_rh < 15.0f)      new_mode = 0;  // DRY
              else if(outdoor_rh > 45.0f) new_mode = 2;  // HUMID
              else if(outdoor_rh > 20.0f && outdoor_rh < 40.0f) new_mode = 1;  // MODERATE
              else new_mode = id(outdoor_rh_mode);  // In dead band — hold

              if(new_mode != id(outdoor_rh_mode)){
                id(outdoor_rh_mode) = new_mode;
                // Only adjust fog burst duration — NOT VPD thresholds
                switch(new_mode){
                  case 0: id(fog_burst_minutes) = 3; break;  // DRY: short bursts
                  case 1: id(fog_burst_minutes) = 5; break;  // MODERATE
                  case 2: id(fog_burst_minutes) = 8; break;  // HUMID: longer bursts
                }
                ESP_LOGI("adapt","RH mode → %s (RH=%.0f%%, fog_burst=%dmin)",
                         new_mode==0?"DRY":new_mode==1?"MOD":"HUMID",
                         outdoor_rh, id(fog_burst_minutes));
              }
            }
          }

                    /**************** 7 — lead/lag rotation *******************************/
          bool leadIs1 = id(fan_lead_is_fan1);
          auto &meta_lead = leadIs1 ? R[2] : R[3];
          auto &meta_lag  = leadIs1 ? R[3] : R[2];
          static uint32_t last_rotate_ms = millis();
          if(now_ms - last_rotate_ms >= LEAD_ROTATE_TIMEOUT_MS){
            last_rotate_ms = now_ms;
            id(fan_lead_is_fan1) = !leadIs1;
            ESP_LOGI("lead","Lead fan rotated → %s", id(fan_lead_is_fan1) ? "Fan 1" : "Fan 2");
          }

          /**************** 8+9 — MODE + EQUIPMENT (via greenhouse_logic.h) *******/
          // Single source of truth: same code runs on ESP32 and in x86 tests.
          static ControlState ctl_state = initial_state();
          // Mister telemetry (local tracking for state labels — not in ControlState
          // because the mister state machine in section 12 is the authority)
          // mist_telemetry replaced by ctl_state.mist_stage (the authority)  // 0=off, 1=S1, 2=S2

          auto sntp_now = id(sntp_time).now();
          int local_hour = sntp_now.is_valid() ? sntp_now.hour : 12;

          // Sprint-15: outdoor temp + dewpoint feed the summer-vent gate.
          // Sources:
          //   - ha_outdoor_temp/ha_outdoor_rh from direct Tempest UDP
          //   - pulled_outdoor_* remains a legacy fallback if present
          //   - outdoor_data_age_s from the Tempest obs_st receive timestamp
          // Outdoor dewpoint computed from temp+RH using the standard
          // Magnus formula (matches the indoor dewpoint sensor convention).
          // If either reading is NaN, force outdoor_data_age_s to a stale
          // sentinel so the gate fails safe (disabled).
          float outdoorT = id(ha_outdoor_temp).state;
          float outdoorRH = id(ha_outdoor_rh).state;
          float outdoor_dp = NAN;
          if (!isnan(outdoorT) && !isnan(outdoorRH) && outdoorRH > 0.0f) {
              // Magnus: a=17.27, b=237.7°C; convert °F → °C → DP °C → DP °F.
              float Tc = (outdoorT - 32.0f) * (5.0f / 9.0f);
              float gamma = (17.27f * Tc) / (237.7f + Tc) + log(outdoorRH / 100.0f);
              float dp_c = (237.7f * gamma) / (17.27f - gamma);
              outdoor_dp = dp_c * (9.0f / 5.0f) + 32.0f;
          }
          uint32_t outdoor_age = uint32_t(99999);
          if (!isnan(outdoorT) && !isnan(outdoorRH)) {
              uint32_t last_obs = id(tempest_last_obs_ms);
              outdoor_age = last_obs > 0 ? (now_ms - last_obs) / 1000 : id(pulled_data_age_s);
          }

          SensorInputs sensor_in = {
              .temp_f = Tin, .vpd_kpa = VPD, .rh_pct = RHin,
              .dew_point_f = isnan(id(dewpoint_avg).state) ? Tin - 10.0f : id(dewpoint_avg).state,
              .outdoor_rh_pct = isnan(id(ha_outdoor_rh).state) ? 30.0f : id(ha_outdoor_rh).state,
              .enthalpy_delta = isnan(dH) ? -5.0f : dH,
              .solar_w_m2 = isnan(id(tempest_solar_w_m2)) ? 0.0f : id(tempest_solar_w_m2),
              .vpd_south = id(vpd_south).state,
              .vpd_west = id(vpd_west).state,
              .vpd_east = id(vpd_east).state,
              .local_hour = local_hour,
              .occupied = id(greenhouse_occupied),
              .outdoor_temp_f = outdoorT,
              .outdoor_dewpoint_f = outdoor_dp,
              .outdoor_data_age_s = outdoor_age
          };

          Setpoints setpts = {
              .temp_high = id(target_temp_high_f),
              .temp_low = id(target_temp_low_f),
              .vpd_high = VPDhi, .vpd_low = VPDlo,
              .bias_cool = id(bias_cool_f), .bias_heat = id(bias_heat_f),
              .vpd_hysteresis = HV,
              .temp_hysteresis = id(hyst_temp_f),
              .heat_hysteresis = id(heat_hysteresis_f),
              .dH2 = dH2, .dC2 = dC2,
              .safety_max = TmaxSafe, .safety_min = TminSafe,
              .vpd_max_safe = VPDmaxSafe, .vpd_min_safe = VPDminSafe,
              .sealed_max_ms = uint32_t(id(mist_max_closed_vent_s)) * 1000UL,
              .relief_duration_ms = uint32_t(id(mist_thermal_relief_s)) * 1000UL,
              .vpd_watch_dwell_ms = uint32_t(id(vpd_watch_dwell_s)) * 1000UL,
              .mist_s2_delay_ms = uint32_t(id(mister_all_delay_s)) * 1000UL,
              .max_relief_cycles = (uint32_t)id(max_relief_cycles),
              .fog_escalation_kpa = id(fog_escalation_kpa),
              .fog_rh_ceiling = (float)id(fog_rh_ceiling_pct),
              .fog_min_temp = (float)id(fog_min_temp_f),
              .fog_window_start = id(fog_time_window_start),
              .fog_window_end = id(fog_time_window_end),
              .dehum_aggressive_kpa = id(dehum_aggressive_kpa),
              .occupancy_inhibit = id(occupancy_inhibit_enabled) && id(greenhouse_occupied),
              .econ_block = econ_block,
              .vent_latch_timeout_ms = id(vent_latch_timeout_ms),
              .safety_max_seal_margin_f = id(safety_max_seal_margin_f),
              .econ_heat_margin_f = id(econ_heat_margin_f),
              // sprint-15: summer thermal-driven vent gate.
              .sw_summer_vent_enabled = id(sw_summer_vent_enabled),
              .vent_prefer_temp_delta_f = id(vent_prefer_temp_delta_f),
              .vent_prefer_dp_delta_f = id(vent_prefer_dp_delta_f),
              .outdoor_staleness_max_s = (uint32_t)id(outdoor_staleness_max_s),
              .summer_vent_min_runtime_s = (uint32_t)id(summer_vent_min_runtime_s),
              // Phase-2 dwell gate.
              .sw_dwell_gate_enabled = id(sw_dwell_gate_enabled),
              .dwell_gate_ms = (uint32_t)id(dwell_gate_ms),
              // Unified band-first controller compatibility field. The
              // ESPHome control loop forces this ON so planner, dispatcher,
              // and ESP32 share one live control path.
              .sw_fsm_controller_enabled = id(sw_fsm_controller_enabled),
              .mist_backoff_ms = (uint32_t)id(mist_backoff_s) * 1000UL
          };

          validate_setpoints(setpts);
          setpts.sw_fsm_controller_enabled = true;
          if (!id(sw_fsm_controller_enabled)) {
              id(sw_fsm_controller_enabled) = true;
              id(sw_fsm_controller_enabled_switch).publish_state(true);
          }
          Mode mode = determine_mode(sensor_in, setpts, ctl_state, dt_ms);
          RelayOutputs relay_out = resolve_equipment(mode, sensor_in, setpts, ctl_state, leadIs1);

          bool willHeat1 = relay_out.heat1, willHeat2 = relay_out.heat2;
          bool willFan1 = relay_out.fan1, willFan2 = relay_out.fan2;
          bool willFog = relay_out.fog, willVent = relay_out.vent;

          // Manual overrides (ESP32-only, not in header)
          if(id(manual_fan_active)){ willFan1 = true; willFan2 = true; willVent = true; }
          if(id(manual_fog_active)){ willFog = true; }
          if(id(vent_lock_active) && !id(manual_fan_active) && mode != SAFETY_COOL){
            willFan1 = false;
            willFan2 = false;
            willVent = false;
          }

          /**************** 11a — FAN/VENT + VENT-CLOSE INTERLOCKS ***************/
          // The pure state machine keeps fans and vent logically consistent,
          // but relay dwell timers are physical state. On a VENTILATE→sealed
          // transition, fan min_on can otherwise keep a fan running after the
          // vent is allowed to close. Hold/reopen the vent until non-safety fan
          // dwell clears. SAFETY_HEAT is the intentional circulation exception:
          // it runs the lead fan with vent closed to keep heat in.
          const bool fan_physically_on = id(fan1_rly)->state || id(fan2_rly)->state;
          const bool fan_wanted = willFan1 || willFan2;
          const bool fan_requires_vent = mode != SAFETY_HEAT && (fan_physically_on || fan_wanted);
          const bool fan_vent_interlock_active = fan_requires_vent && !willVent;
          static bool fan_vent_interlock_prev = false;
          if (fan_requires_vent) {
              willVent = true;
          }
          if (fan_vent_interlock_active != fan_vent_interlock_prev) {
              if (fan_vent_interlock_active) {
                  ESP_LOGI("interlock","Fan/vent: holding vent open until fan dwell clears");
              } else {
                  ESP_LOGI("interlock","Fan/vent: fan dwell clear, releasing vent hold");
              }
              fan_vent_interlock_prev = fan_vent_interlock_active;
          }

          const bool vent_is_open = id(vent_rly)->state;
          const bool heat_vent_interlock_active =
              mode != SAFETY_HEAT && (willHeat1 || willHeat2) && (vent_is_open || willVent);
          const bool heat_fan_interlock_active =
              mode != SAFETY_HEAT && (willHeat1 || willHeat2) && (fan_physically_on || fan_wanted);
          const bool heat_air_exchange_interlock_active =
              heat_vent_interlock_active || heat_fan_interlock_active;
          static bool heat_vent_interlock_prev = false;
          static bool heat_fan_interlock_prev = false;
          if (heat_air_exchange_interlock_active) {
              willHeat1 = false;
              willHeat2 = false;
          }
          if (heat_vent_interlock_active != heat_vent_interlock_prev) {
              if (heat_vent_interlock_active) {
                  ESP_LOGI("interlock","Heat/vent: suppressing non-safety heat until vent closes");
              } else {
                  ESP_LOGI("interlock","Heat/vent: vent closed, releasing heat hold");
              }
              heat_vent_interlock_prev = heat_vent_interlock_active;
          }
          if (heat_fan_interlock_active != heat_fan_interlock_prev) {
              if (heat_fan_interlock_active) {
                  ESP_LOGI("interlock","Heat/fan: suppressing non-safety heat until fan dwell clears");
              } else {
                  ESP_LOGI("interlock","Heat/fan: fan dwell clear, releasing heat hold");
              }
              heat_fan_interlock_prev = heat_fan_interlock_active;
          }

          const bool heat1_available = willHeat1 && (id(heat1_rly)->state || can_on(R[0]));
          const bool heat_stage_interlock_active = willHeat2 && !heat1_available;
          static bool heat_stage_interlock_prev = false;
          if (heat_stage_interlock_active) {
              willHeat2 = false;
          }
          if (heat_stage_interlock_active != heat_stage_interlock_prev) {
              if (heat_stage_interlock_active) {
                  ESP_LOGI("interlock","Heat stage: suppressing heat2 until heat1 is available");
              } else {
                  ESP_LOGI("interlock","Heat stage: heat1 available, releasing heat2 hold");
              }
              heat_stage_interlock_prev = heat_stage_interlock_active;
          }

          // Fog + misters follow their existing vent-policy tunables. Pre-sprint-15.1,
          // 74% of fog-on-time and 12% of mister-on-time had vent still open
          // (set_relay respects per-relay min_on timers but has no cross-relay
          // ordering). Reading `vent_rly->state` gives the ACTUAL physical state,
          // so even if firmware has already set willVent=false this cycle, we
          // can suppress normal moisture until the actuator reports closed when
          // the corresponding tunable asks for closed-vent moisture.
          //
          // Operator toggles:
          //   - sw_fog_closes_vent (`fog_closes_vent`, default true) gates fog
          //   - sw_mister_closes_vent (`mister_closes_vent`, default false)
          //     gates normal mister pulses. The explicit VENTILATE assist path
          //     bypasses both so dry-hot cooling can add moisture without
          //     pretending the house is sealed.
          const bool open_vent_fog_assist =
              (mode == VENTILATE) && ctl_state.vent_mist_assist_active && relay_out.fog;
          const bool open_vent_mister_assist =
              (mode == VENTILATE) && ctl_state.vent_mist_assist_active;
          if (id(fog_closes_vent) && vent_is_open && !open_vent_fog_assist) {
              willFog = false;
          }

          /**************** 10 — CYCLE COUNTERS ***********************************/
          if(willHeat1 && !id(heat1_rly)->state) id(cnt_heat1_today) += 1;
          if(willHeat2 && !id(heat2_rly)->state) id(cnt_heat2_today) += 1;
          if(willFog && !id(fog_rly)->state)     id(cnt_fog_today) += 1;
          if(willFan1 && !id(fan1_rly)->state)   id(cnt_fan1_today) += 1;
          if(willFan2 && !id(fan2_rly)->state)   id(cnt_fan2_today) += 1;
          if(willVent && !id(vent_rly)->state)    id(cnt_vent_today) += 1;

          /**************** 11 — APPLY RELAY OUTPUTS ******************************/
          const bool force_heat_off = heat_air_exchange_interlock_active;
          const bool heat1_will_be_on_after_apply =
              (willHeat1 && (id(heat1_rly)->state || can_on(R[0])))
              || (id(heat1_rly)->state && !force_heat_off && !can_off(R[0]));
          const bool force_heat2_off =
              force_heat_off
              || (id(heat2_rly)->state && !willHeat2 && !heat1_will_be_on_after_apply);
          set_relay(R[0], willHeat1, false, force_heat_off);
          set_relay(R[1], willHeat2, false, force_heat2_off);
          set_relay(R[5], willVent, fan_requires_vent);
          set_relay(R[2], willFan1, false);
          set_relay(R[3], willFan2, false);
          set_relay(R[4], willFog, false);

          /**************** 12 — MISTER STATE MACHINE *****************************/
          // Runs only for SEALED_MIST or explicit VENTILATE assist. Zone stress
          // chooses the pulse target; it does not create a standalone mister mode.
          // Stages: S1 (single zone) → S2 (all zones rotating) → FOG (escalation)
          {
            const uint32_t MISTER_ENGAGE_DELAY_MS = uint32_t(id(mister_engage_delay_s)) * 1000UL;
            const uint32_t MISTER_ALL_DELAY_MS    = uint32_t(id(mister_all_delay_s))    * 1000UL;

            float south_vpd = id(vpd_south).state;
            float west_vpd  = id(vpd_west).state;
            float east_vpd  = id(vpd_east).state;
            float avg_vpd   = VPD;
            float south_temp = id(south_wall_temperature).state;
            float west_temp  = id(west_wall_temperature).state;
            float east_temp  = id(east_wall_temperature).state;

            // Sprint-15.1 fix 5: vent-close interlock for normal mister
            // pulses. Atomizers ejecting moisture while vent is open leaks
            // most of the humidity, so `sw_mister_closes_vent` still blocks
            // ordinary SEALED_MIST pulses until the physical vent closes.
            // VENTILATE assist is an explicit exception: temp has priority,
            // fans/vent must remain open, and the planner/firmware are asking
            // for bounded evaporative support rather than sealed humidifying.
              const bool mister_vent_ok = open_vent_mister_assist || !id(mister_closes_vent) || !vent_is_open;
              bool humidity_demand = ((mode == SEALED_MIST) || ctl_state.vent_mist_assist_active) && mister_vent_ok;

            auto now_for_wet_gate = id(sntp_time).now();
            const bool wet_time_valid = now_for_wet_gate.is_valid() && !id(sntp_failed);
            const int wet_now_minute = wet_time_valid
              ? local_minute_of_day(now_for_wet_gate.hour, now_for_wet_gate.minute)
              : 0;
            auto direct_wet_allowed = [&](int zone) -> bool {
              if(!id(direct_wet_gate_enabled)) return true;
              if(!wet_time_valid) return false;
              if(id(direct_wet_min_temp_f) > 0.0f && (isnan(Tin) || Tin < id(direct_wet_min_temp_f))) return false;
              if(zone == 1) {
                return direct_wet_window_open(
                  wet_now_minute,
                  id(activity_start_hour),
                  id(activity_start_minute),
                  id(activity_duration_min),
                  id(direct_wet_south_start_offset_min),
                  id(direct_wet_south_drydown_before_off_min));
              }
              if(zone == 4) {
                return direct_wet_window_open(
                  wet_now_minute,
                  id(activity_start_hour),
                  id(activity_start_minute),
                  id(activity_duration_min),
                  id(direct_wet_wall_start_offset_min),
                  id(direct_wet_wall_drydown_before_off_min));
              }
              if(zone == 2) {
                return direct_wet_window_open(
                  wet_now_minute,
                  id(activity_start_hour),
                  id(activity_start_minute),
                  id(activity_duration_min),
                  id(direct_wet_west_start_offset_min),
                  id(direct_wet_west_drydown_before_off_min));
              }
              if(zone == 3) {
                return direct_wet_window_open(
                  wet_now_minute,
                  id(activity_start_hour),
                  id(activity_start_minute),
                  id(activity_duration_min),
                  id(direct_wet_center_start_offset_min),
                  id(direct_wet_center_drydown_before_off_min));
              }
              return false;
            };
            const bool south_wet_allowed = direct_wet_allowed(1);
            const bool west_wet_allowed = direct_wet_allowed(2);
            const bool center_wet_allowed = direct_wet_allowed(3);
            const bool wall_wet_allowed = direct_wet_allowed(4);
            const bool any_mister_wet_allowed = south_wet_allowed || west_wet_allowed || center_wet_allowed;
            auto direct_wet_relay_watchdog = [&]() {
              if(!id(direct_wet_gate_enabled)) return;
              if(!south_wet_allowed) {
                id(south_wall_mister).turn_off();
                id(south_wall_mister_fertilized).turn_off();
              }
              if(!west_wet_allowed) {
                id(west_wall_mister).turn_off();
                id(west_wall_mister_fertilized).turn_off();
              }
              if(!wall_wet_allowed) {
                id(wall_drips).turn_off();
                id(wall_drips_fertilized).turn_off();
              }
              if(!center_wet_allowed) {
                id(center_mister).turn_off();
                id(center_drips).turn_off();
                id(center_drips_fertilized).turn_off();
              }
              if(!id(south_wall_mister_fertilized).state &&
                 !id(west_wall_mister_fertilized).state &&
                 !id(wall_drips_fertilized).state &&
                 !id(center_drips_fertilized).state) {
                id(fertilizer_master_valve).turn_off();
              }
              bool active_zone_gate_closed =
                  (id(mister_pulse_zone) == 1 && !south_wet_allowed) ||
                  (id(mister_pulse_zone) == 2 && !west_wet_allowed) ||
                  (id(mister_pulse_zone) == 3 && !center_wet_allowed);
              if(active_zone_gate_closed) {
                id(mister_pulse_zone) = 0;
                id(mister_pulse_timer_ms) = 0;
              }
            };
            direct_wet_relay_watchdog();
            auto first_allowed_mister_zone = [&]() -> int {
              if(south_wet_allowed) return 1;
              if(west_wet_allowed) return 2;
              if(center_wet_allowed) return 3;
              return 0;
            };

              // If misters WERE firing but vent just opened, kill the zone
              // drivers immediately so we don't wait for the pulse timer.
            if (!mister_vent_ok && id(mister_pulse_zone) > 0) {
                id(south_wall_mister).turn_off();
                id(south_wall_mister_fertilized).turn_off();
                id(west_wall_mister).turn_off();
                id(west_wall_mister_fertilized).turn_off();
                id(center_mister).turn_off();
                id(mister_pulse_zone) = 0;
                id(mister_pulse_timer_ms) = 0;
                ESP_LOGI("interlock","Mister suppressed — vent still open");
            }

            // Defensive: zero the engage-delay timers on SEALED_MIST rising edge.
            // The mister_blocked branch intentionally preserves them (fast
            // re-engage when block clears), so a SEALED→IDLE bounce inside the
            // 60s idle holdoff could otherwise carry stale accumulation into
            // the next seal cycle and fire mister_state=1 immediately.
            static bool was_sealed = false;
            if(humidity_demand && !was_sealed){
              id(humid_s1_duration_ms) = 0;
              id(humid_s2_duration_ms) = 0;
            }
            was_sealed = humidity_demand;

            // Misters run for sealed humidification and band-first controller vent mist assist.
            // Fog remains the heavy escalation and is still gated by the vent
            // close interlock above when fog_closes_vent is enabled.
              bool occupancy_blocks = id(occupancy_inhibit_enabled) && id(greenhouse_occupied);
              // Quick check: is any zone above its crop VPD target?
              bool any_zone_stressed = false;
              if(south_wet_allowed && !isnan(south_vpd) && id(vpd_target_south) > 0 && south_vpd > id(vpd_target_south)) any_zone_stressed = true;
              if(west_wet_allowed && !isnan(west_vpd) && id(vpd_target_west) > 0 && west_vpd > id(vpd_target_west)) any_zone_stressed = true;
              if(!isnan(east_vpd) && id(vpd_target_east) > 0 && east_vpd > id(vpd_target_east)) any_zone_stressed = true;
              if(center_wet_allowed && id(vpd_target_center) > 0 && avg_vpd > id(vpd_target_center)) any_zone_stressed = true;
              bool zone_mister_demand = humidity_demand && mister_vent_ok;
              // FW-9: VPD emergency override — allow misting even if budget exhausted
              float vpd_max_zone = fmax(south_vpd, fmax(west_vpd, east_vpd));
              bool vpd_emergency = !isnan(vpd_max_zone) && (vpd_max_zone > id(safety_vpd_max_kpa));
              bool mister_blocked =
                  (id(mister_water_today) >= id(mister_water_budget_gal) && !vpd_emergency)
                  || !zone_mister_demand
                  || !any_mister_wet_allowed
                  || id(irrig_state) > 0
                  || occupancy_blocks;

            if(mister_blocked && id(mister_state) > 0){
              ESP_LOGI("mister","BLOCKED (budget=%.0f/%.0f humid=%d zone=%d occ=%d)",
                       id(mister_water_today), id(mister_water_budget_gal),
                       humidity_demand, any_zone_stressed, occupancy_blocks);
              id(south_wall_mister).turn_off();
              id(south_wall_mister_fertilized).turn_off();
              id(west_wall_mister).turn_off();
              id(west_wall_mister_fertilized).turn_off();
              id(center_mister).turn_off();
              id(mister_state) = 0;
              id(mister_selected_zone) = 0;
              id(mister_duty_phase) = 0;
              id(mister_duty_timer_ms) = 0;
              // NOTE: Do NOT reset humid_s1/s2 duration timers here.
              // Preserves escalation progress so misters re-engage quickly
              // when the blocking condition clears (e.g., COOL→IDLE transition).
            }

            if(!mister_blocked){
              // Track humidity duration for mister engage delay.
              if(humidity_demand && id(mister_state) == 0){
                id(humid_s1_duration_ms) += dt_ms;
                id(humid_idle_holdoff_ms) = 0;
              } else if(!humidity_demand){
                // Hold-off: only reset engage timer after 60s continuous idle
                id(humid_idle_holdoff_ms) += dt_ms;
                if(id(humid_idle_holdoff_ms) > 60000UL){
                  id(humid_s1_duration_ms) = 0;
                  id(humid_s2_duration_ms) = 0;
                }
              } else {
                id(humid_idle_holdoff_ms) = 0;
              }

              // ═══════════ INVERTED HIERARCHY: MISTERS → FOG ═══════════
              // S1: Pulse-rotation misters (cheap, targeted, zone-specific)
              // S2: Aggressive misters (all zones rotating, shorter gaps)
              // S3: FOG (~800W heavy artillery — misters couldn't handle it)

              const uint32_t PULSE_ON_MS  = uint32_t(id(mister_pulse_on_s)) * 1000UL;
              const uint32_t PULSE_GAP_MS = uint32_t(id(mister_pulse_gap_s)) * 1000UL;
              const float MISTER_HYST = fminf(HV, fmaxf(0.05f, id(mister_engage_kpa) * 0.25f));

              // Helper: select mister zone with highest stress score.
              // Each zone has its own VPD target from its planted crops.
              // Stress score starts with (actual VPD - target) / target.
              // Once humidity demand exists, zone heat stress is also folded
              // in from the crop temp band so hot south/east pockets influence
              // which mister zone gets the next pulse.
              // East has a sensor + target but NO mister — its stress boosts
              // adjacent zones (south, center) to increase their misting urgency.
              // Center has no sensor, uses avg_vpd with a penalty multiplier.
              auto select_most_stressed_zone = [&]() -> int {
                float s_stress = -999.0f, w_stress = -999.0f, c_stress = -999.0f;
                float temp_band = max(2.0f, id(target_temp_high_f) - id(target_temp_low_f));
                auto zone_temp_stress = [&](float zone_temp) -> float {
                  if(isnan(zone_temp)) return 0.0f;
                  float above_high = max(0.0f, zone_temp - id(target_temp_high_f)) / temp_band;
                  float above_avg  = max(0.0f, zone_temp - Tin) / temp_band;
                  return above_high + above_avg;
                };

                // East zone stress (sensor, no mister) — boosts south + center
                float east_vpd_val = isnan(east_vpd) ? 0.0f : east_vpd;
                float e_stress = 0.0f;
                if(!isnan(east_vpd) && id(vpd_target_east) > 0.0f)
                  e_stress = max(0.0f, (east_vpd_val - id(vpd_target_east)) / id(vpd_target_east));
                e_stress += zone_temp_stress(east_temp);

                // South: own sensor + gets boost from east stress (adjacent)
                  if(south_wet_allowed && !isnan(south_vpd) && id(vpd_target_south) > 0.0f)
                    s_stress = (south_vpd - id(vpd_target_south)) / id(vpd_target_south)
                               + zone_temp_stress(south_temp)
                               + e_stress * id(east_adjacency_factor);

                  // West: own sensor, no east adjacency boost
                  if(west_wet_allowed && !isnan(west_vpd) && id(vpd_target_west) > 0.0f)
                    w_stress = (west_vpd - id(vpd_target_west)) / id(vpd_target_west)
                               + zone_temp_stress(west_temp);

                  // Center: avg_vpd proxy + east adjacency boost + sensor penalty
                  if(center_wet_allowed && id(vpd_target_center) > 0.0f)
                    c_stress = (avg_vpd - id(vpd_target_center)) / id(vpd_target_center)
                               * id(mister_center_penalty)
                               + e_stress * id(east_adjacency_factor);

                // Only mist zones actually above their VPD or temp target.
                if(s_stress <= 0 && w_stress <= 0 && c_stress <= 0) return 0;
                if(s_stress >= w_stress && s_stress >= c_stress && s_stress > 0) return 1;
                if(w_stress >= s_stress && w_stress >= c_stress && w_stress > 0) return 2;
                if(c_stress > 0) return 3;
                return 0;
              };

              auto turn_on_zone = [&](int zone) {
                id(south_wall_mister).turn_off();
                id(south_wall_mister_fertilized).turn_off();
                id(west_wall_mister).turn_off();
                id(west_wall_mister_fertilized).turn_off();
                id(center_mister).turn_off();
                if(zone == 1 && !south_wet_allowed) zone = first_allowed_mister_zone();
                if(zone == 2 && !west_wet_allowed) zone = first_allowed_mister_zone();
                if(zone == 3 && !center_wet_allowed) zone = first_allowed_mister_zone();
                if(zone == 0) return;
                // sprint-2: last-fire ms for fairness watchdog.
                // sprint-7: per-zone cycle counters at the rising edge
                //          (turn_on_zone is always preceded by all-off,
                //          so every call is an off→on transition).
                if(zone == 1)      { id(south_wall_mister).turn_on(); id(last_fire_south_ms)  = now_ms; id(cnt_mister_south_today)  += 1; }
                else if(zone == 2) { id(west_wall_mister).turn_on();  id(last_fire_west_ms)   = now_ms; id(cnt_mister_west_today)   += 1; }
                else if(zone == 3) { id(center_mister).turn_on();     id(last_fire_center_ms) = now_ms; id(cnt_mister_center_today) += 1; }
                id(mister_pulse_zone) = zone;
                id(mister_selected_zone) = zone;
              };

              auto turn_off_all_misters = [&]() {
                id(south_wall_mister).turn_off();
                id(south_wall_mister_fertilized).turn_off();
                id(west_wall_mister).turn_off();
                id(west_wall_mister_fertilized).turn_off();
                id(center_mister).turn_off();
                id(mister_pulse_zone) = 0;
              };

              const char* zone_names[] = {"none", "south", "west", "center"};

              // Fairness watchdog (sprint-2): if a stressed zone hasn't fired in
              // FAIRNESS_WINDOW_MS, it bypasses the stress-scoring contest. Motivated
              // by the 90-day audit showing west stressed 36% of time but firing only
              // 13% of mister cycles — center's use of avg_vpd as a stress proxy
              // correlates it with south, and east adjacency boosts south+center when
              // east is stressed; west gets neither boost. Guarantees no stressed
              // zone waits longer than 10 min without a pulse. Ties → most overdue.
              auto select_overdue_zone = [&]() -> int {
                const uint32_t FAIRNESS_WINDOW_MS = 600000UL;  // 10 min
                  int candidate = 0;
                  uint32_t candidate_age = 0;
                  auto check = [&](int z, float vpd, float target, uint32_t last_fire) {
                    if(!direct_wet_allowed(z)) return;
                    if(isnan(vpd) || target <= 0.0f) return;
                    if(vpd <= target) return;  // zone not stressed
                  uint32_t age = now_ms - last_fire;  // last_fire==0 ⇒ age == uptime
                  if(age > FAIRNESS_WINDOW_MS && age > candidate_age) {
                    candidate = z;
                    candidate_age = age;
                  }
                };
                check(1, south_vpd, id(vpd_target_south),  id(last_fire_south_ms));
                check(2, west_vpd,  id(vpd_target_west),   id(last_fire_west_ms));
                check(3, avg_vpd,   id(vpd_target_center), id(last_fire_center_ms));
                return candidate;
              };

              // Pulse-zone selector: watchdog first, stress scoring second.
              // Caller must have already decided "fire a pulse now"; this only
              // answers "which zone." Increments fairness counter when watchdog wins.
                auto select_zone_for_pulse = [&]() -> int {
                  int overdue = select_overdue_zone();
                  if(overdue > 0) {
                    id(cnt_mister_fairness_overrides_today) += 1;
                    ESP_LOGI("mister","FAIRNESS: zone=%s overdue — overriding scoring",
                             zone_names[overdue]);
                    return overdue;
                  }
                  return select_most_stressed_zone();
                };
                auto fallback_wet_zone = [&]() -> int {
                  if(south_wet_allowed) return 1;
                  if(west_wet_allowed) return 2;
                  if(center_wet_allowed) return 3;
                  return 0;
                };

              // --- S1 ENGAGE: misters start only under humidity demand; zone/global
              // stress decide whether a pulse is warranted and which zone gets it.
              bool global_stressed = (avg_vpd > id(mister_engage_kpa));

              if(id(mister_state) == 0
                 && humidity_demand
                 && id(humid_s1_duration_ms) >= MISTER_ENGAGE_DELAY_MS
                 && (any_zone_stressed || global_stressed)){

                int zone = select_zone_for_pulse();
                  if(zone == 0) zone = fallback_wet_zone();
                if(zone > 0) {  // Engage
                  id(mister_state) = 1;  // S1 = single zone pulse
                  id(mister_vpd_at_start) = avg_vpd;  // Track effectiveness
                  turn_on_zone(zone);
                  id(mister_pulse_timer_ms) = PULSE_ON_MS;
                  ESP_LOGI("mister","S1 MISTERS: pulse %s %ds (VPD=%.2f, target=%.2f)",
                           zone_names[zone], id(mister_pulse_on_s), avg_vpd,
                           zone == 1 ? id(vpd_target_south) : zone == 2 ? id(vpd_target_west) : id(vpd_target_center));
                }
              }

              // --- ESCALATE S1 → S2: all zones rotating ---
              if(id(mister_state) == 1){
                id(humid_s2_duration_ms) += dt_ms;
                if(id(humid_s2_duration_ms) >= MISTER_ALL_DELAY_MS
                   && avg_vpd > id(mister_all_kpa)){
                    id(mister_state) = 2;  // S2 = all zones rotating
                    id(mister_rotation_index) = 0;
                    int zone = select_zone_for_pulse();
                    if(zone == 0) zone = fallback_wet_zone();
                    turn_on_zone(zone);
                  uint32_t weighted_ms = PULSE_ON_MS;
                  float svpd = isnan(south_vpd) ? 0.0f : south_vpd;
                  float wvpd = isnan(west_vpd) ? 0.0f : west_vpd;
                  float max_vpd = max(max(svpd, wvpd), avg_vpd);
                  if(zone == 1 && svpd >= max_vpd * 0.95f) weighted_ms = uint32_t(PULSE_ON_MS * id(mister_vpd_weight));
                  else if(zone == 2 && wvpd >= max_vpd * 0.95f) weighted_ms = uint32_t(PULSE_ON_MS * id(mister_vpd_weight));
                  id(mister_pulse_timer_ms) = weighted_ms;
                  ESP_LOGI("mister","S2 ALL-ROTATE: start %s %dms (VPD=%.2f)",
                           zone_names[zone], weighted_ms, avg_vpd);
                }else{
                }
              }

              // --- ESCALATE S2 → S3: FOG (heavy artillery) ---
              // Fog fires when misters alone can't control VPD.
              // fog_closes_vent controls whether fog forces the vent shut.
              // This is tracked separately — see willFog gate at line ~439.

              // --- DE-ESCALATE S2 → S1 ---
              if(id(mister_state) == 2 && avg_vpd < (id(mister_all_kpa) - MISTER_HYST)){
                ESP_LOGI("mister","S2→S1: VPD=%.2f", avg_vpd);
                  id(mister_state) = 1;
                  id(humid_s2_duration_ms) = 0;
                  int zone = select_zone_for_pulse();
                  if(zone == 0) zone = fallback_wet_zone();
                  turn_on_zone(zone);
                id(mister_pulse_timer_ms) = PULSE_ON_MS;
              }

              // --- DE-ESCALATE S1 → off ---
              if(id(mister_state) == 1 && !any_zone_stressed && avg_vpd < (id(mister_engage_kpa) - MISTER_HYST)){
                ESP_LOGI("mister","S1→off: VPD=%.2f", avg_vpd);
                turn_off_all_misters();
                id(mister_state) = 0;
                id(mister_selected_zone) = 0;
                id(mister_pulse_timer_ms) = 0;
                id(humid_s1_duration_ms) = 0;
                id(humid_s2_duration_ms) = 0;
              }

              // --- PULSE TIMER (both S2 and S3) ---
              if(id(mister_state) > 0){
                if(id(mister_pulse_timer_ms) > dt_ms){
                  id(mister_pulse_timer_ms) -= dt_ms;
                }else{
                  id(mister_pulse_timer_ms) = 0;
                }

                if(id(mister_pulse_timer_ms) == 0){
                  if(id(mister_pulse_zone) > 0){
                    // === PULSE ON → GAP ===
                    // Track effectiveness: VPD change during this pulse
                    if(!isnan(id(mister_vpd_at_start)) && !isnan(avg_vpd)){
                      float delta = avg_vpd - id(mister_vpd_at_start);
                      id(mister_vpd_delta).publish_state(delta);
                      ESP_LOGI("mister","Pulse done: zone=%s delta=%.3f kPa (%.2f → %.2f)",
                               zone_names[id(mister_pulse_zone)], delta,
                               id(mister_vpd_at_start), avg_vpd);
                    }
                    turn_off_all_misters();
                    id(mister_pulse_timer_ms) = PULSE_GAP_MS;

                  }else{
                    // === GAP → NEXT PULSE ===
                    if(id(mister_state) == 1){
                        // S1: re-read VPD, pulse most stressed zone
                        int zone = select_zone_for_pulse();
                        if(zone == 0) zone = fallback_wet_zone();
                      id(mister_vpd_at_start) = avg_vpd;  // Track effectiveness
                      turn_on_zone(zone);
                      id(mister_pulse_timer_ms) = PULSE_ON_MS;
                      ESP_LOGI("mister","PULSE: %s %ds (VPD=%.2f)",
                               zone_names[zone], id(mister_pulse_on_s), avg_vpd);

                    }else if(id(mister_state) == 2){
                        // S2: pick the most stressed zone each pulse (not round-robin)
                        int zone = select_zone_for_pulse();
                        if(zone == 0) zone = fallback_wet_zone();
                      id(mister_vpd_at_start) = avg_vpd;  // Track effectiveness
                      turn_on_zone(zone);
                      // VPD-weighted duration for high-stress zones
                      uint32_t weighted_ms = PULSE_ON_MS;
                      float zone_vpd = (zone == 1) ? south_vpd : (zone == 2) ? west_vpd : avg_vpd;
                      float zone_target = (zone == 1) ? id(vpd_target_south) : (zone == 2) ? id(vpd_target_west) : id(vpd_target_center);
                      if(!isnan(zone_vpd) && zone_target > 0 && zone_vpd > zone_target * 1.2f){
                        weighted_ms = uint32_t(PULSE_ON_MS * id(mister_vpd_weight));
                      }
                      id(mister_pulse_timer_ms) = weighted_ms;
                      ESP_LOGI("mister","ROTATE: %s %dms (VPD=%.2f target=%.2f)",
                               zone_names[zone], weighted_ms,
                               isnan(zone_vpd) ? 0.0f : zone_vpd, zone_target);
                    }
                  }
                }
              }

              // Update h for telemetry (new hierarchy: S1=misters, S2=all-rotate, S3=fog)

              // --- RUNTIME TRACKING ---
              if(id(south_wall_mister).state) id(runtime_mister_south_ms) += dt_ms;
              if(id(west_wall_mister).state)  id(runtime_mister_west_ms) += dt_ms;
              if(id(center_mister).state)     id(runtime_mister_center_ms) += dt_ms;

              // Water tracking (flow meter during mister pulse)
              if(id(mister_pulse_zone) > 0 && id(mister_state) > 0){
                float gpm = id(water_flow_rate).state;
                if(!isnan(gpm) && gpm > 0.0f){
                  id(mister_water_today) += gpm * (float(dt_ms) / 60000.0f);
                }
              }
            }
          }

          /**************** 14 — Telemetry & debug *******************************/
          char lbl[48];
          if(mode == SEALED_MIST){
            snprintf(lbl, sizeof(lbl), "SEALED_MIST_%s", MIST_NAMES[ctl_state.mist_stage]);
          }else{
            snprintf(lbl, sizeof(lbl), "%s", MODE_NAMES[mode]);
          }
          {
            static char last_gh_state[48] = "";
            if(strcmp(last_gh_state, lbl) != 0){
              id(gh_state).publish_state(lbl);
              snprintf(last_gh_state, sizeof(last_gh_state), "%s", lbl);
            }
          }

          /*** OBS-1e — Silent-override audit (Sprint 16) ***/
          {
            OverrideFlags of = evaluate_overrides(sensor_in, setpts, ctl_state, mode);
            char obuf[224]; obuf[0] = '\0'; size_t n = 0;
            auto add = [&](const char* tag){
              if(n > 0 && n + 1 < sizeof(obuf)) obuf[n++] = ',';
              size_t len = strlen(tag);
              if(n + len < sizeof(obuf)){ memcpy(obuf + n, tag, len); n += len; }
            };
            if(of.occupancy_blocks_equipment) add("occupancy_blocks_equipment");
            if(of.fog_gate_rh)               add("fog_gate_rh");
            if(of.fog_gate_temp)             add("fog_gate_temp");
            if(of.fog_gate_window)           add("fog_gate_window");
            if(of.relief_cycle_breaker)      add("relief_cycle_breaker");
            if(of.seal_blocked_temp)         add("seal_blocked_temp");
            if(of.vpd_dry_override)          add("vpd_dry_override");
            // Sprint-15.1 fix 1: wire the sprint-15 gate flag into
            // active_overrides. Pre-fix the gate was invisible — no way to
            // tell whether it was firing. Short tag "summer_vent" matches
            // what ingestor override_events routing expects.
            if(of.summer_vent_active)        add("summer_vent");
            if(of.vent_mist_assist)          add("vent_mist_assist");
            if(of.fog_heat_assist)           add("fog_heat_assist");
            obuf[n] = '\0';
            const char* overrides = n > 0 ? obuf : "none";
            static char last_overrides[224] = "";
            if(strcmp(last_overrides, overrides) != 0){
              id(gh_overrides).publish_state(overrides);
              snprintf(last_overrides, sizeof(last_overrides), "%s", overrides);
            }
          }

          // Sprint-15.1 fix 8: publish mode_reason. The literal is owned
          // by determine_mode() (short static C string, no heap). Guard
          // against nullptr so an unknown branch never crashes the publish.
          {
            const char* reason = ctl_state.last_mode_reason;
            const char* safe_reason = reason ? reason : "unknown";
            static char last_mode_reason[48] = "";
            if(strcmp(last_mode_reason, safe_reason) != 0){
              id(gh_mode_reason).publish_state(safe_reason);
              snprintf(last_mode_reason, sizeof(last_mode_reason), "%s", safe_reason);
            }
          }

          /*** OBS-3 — Relief-cycle state exposure (Sprint 18) ***/
          {
            static uint8_t ctl_diag_ctr = 11;
            if(++ctl_diag_ctr >= 12){
              ctl_diag_ctr = 0;
              id(ctl_relief_cycle_count).publish_state((float)ctl_state.relief_cycle_count);
              id(ctl_vent_latch_timer_s).publish_state((float)(ctl_state.vent_latch_timer_ms / 1000));
              id(ctl_sealed_timer_s).publish_state((float)(ctl_state.sealed_timer_ms / 1000));
              id(ctl_vpd_watch_timer_s).publish_state((float)(ctl_state.vpd_watch_timer_ms / 1000));
              id(ctl_mist_backoff_timer_s).publish_state((float)(ctl_state.mist_backoff_timer_ms / 1000));
              id(ctl_vent_mist_assist_active).publish_state(ctl_state.vent_mist_assist_active ? 1.0f : 0.0f);
            }
          }

          /*** A1 — State transition logging ***/
          {
            static Mode prev_log_mode = IDLE;
            static MistStage prev_log_mist = MIST_WATCH;
            if(mode != prev_log_mode || (mode == SEALED_MIST && ctl_state.mist_stage != prev_log_mist)){
              char trans[80];
              auto hm = id(sntp_time).now();
              if(hm.is_valid()){
                snprintf(trans, sizeof(trans), "%s→%s @ %02d:%02d",
                         lbl, lbl, hm.hour, hm.minute);
              }else{
                snprintf(trans, sizeof(trans), "→%s", lbl);
              }
              ESP_LOGI("transition","State change: %s", trans);
              id(ts_last_transition).publish_state(trans);
              prev_log_mode = mode;
              prev_log_mist = ctl_state.mist_stage;
            }
          }

          /*** B5 — DLI accumulation (every 5s) ***/
          {
            id(dli_accumulator) += lighting_dli_increment(
              id(greenhouse_light_lux).state,
              id(tempest_lux),
              id(grow_light_main).state,
              id(grow_light_grow).state,
              5.0f);
          }

          /*** B6 — Per-circuit lighting state machines (every 60s) ***/
          {
            static LightingState gl_main_state = initial_lighting_state();
            static LightingState gl_grow_state = initial_lighting_state();
            auto publish_lighting_epoch = [](auto *sensor, time_t epoch){
              char buf[24];
              snprintf(buf, sizeof(buf), "%lld", (long long)epoch);
              sensor->publish_state(buf);
            };

            if((now_ms - id(gl_last_check_ms)) >= 60000){
              id(gl_last_check_ms) = now_ms;

              auto time = id(sntp_time).now();
              if(!time.is_valid()){
                if(id(grow_light_main).state){
                  id(grow_light_main).turn_off();
                  ESP_LOGW("grow_light","main OFF: time_invalid");
                }
                if(id(grow_light_grow).state){
                  id(grow_light_grow).turn_off();
                  ESP_LOGW("grow_light","grow OFF: time_invalid");
                }
                id(gl_main_state_text).publish_state("OFF");
                id(gl_main_reason).publish_state("time_invalid");
                id(gl_grow_state_text).publish_state("OFF");
                id(gl_grow_reason).publish_state("time_invalid");
                id(gl_main_decision_epoch).publish_state("invalid");
                id(gl_grow_decision_epoch).publish_state("invalid");
              } else {
                float cur_lux = id(tempest_lux);
                if(isnan(cur_lux)) cur_lux = id(greenhouse_light_lux).state;
                if(isnan(cur_lux)) cur_lux = 0.0f;

                LightingInputs light_in = {
                  .natural_lux = cur_lux,
                  .local_hour = time.hour,
                  .occupied = id(greenhouse_occupied)
                };
                LightingSetpoints main_sp = {
                  .target_light_minutes = (uint32_t)id(gl_main_target_light_minutes),
                  .lux_on_threshold = id(gl_main_lux_threshold),
                  .lux_hysteresis = id(gl_main_lux_hysteresis),
                  .start_hour = id(gl_main_sunrise_hour),
                  .cutoff_hour = id(gl_main_sunset_hour),
                  .min_on_ms = (uint32_t)id(gl_main_min_on_s) * 1000UL,
                  .min_off_ms = (uint32_t)id(gl_main_min_off_s) * 1000UL,
                  .auto_enabled = id(gl_main_auto_enabled)
                };
                LightingSetpoints grow_sp = {
                  .target_light_minutes = (uint32_t)id(gl_grow_target_light_minutes),
                  .lux_on_threshold = id(gl_grow_lux_threshold),
                  .lux_hysteresis = id(gl_grow_lux_hysteresis),
                  .start_hour = id(gl_grow_sunrise_hour),
                  .cutoff_hour = id(gl_grow_sunset_hour),
                  .min_on_ms = (uint32_t)id(gl_grow_min_on_s) * 1000UL,
                  .min_off_ms = (uint32_t)id(gl_grow_min_off_s) * 1000UL,
                  .auto_enabled = id(gl_grow_auto_enabled)
                };

                LightingDecision main_dec = evaluate_lighting(
                  light_in, main_sp, gl_main_state, id(grow_light_main).state, now_ms);
                LightingDecision grow_dec = evaluate_lighting(
                  light_in, grow_sp, gl_grow_state, id(grow_light_grow).state, now_ms);

                auto apply_light = [&](const char* label, esphome::switch_::Switch* sw, LightingDecision dec){
                  if(dec.want_on && !sw->state){
                    sw->turn_on();
                    ESP_LOGI("grow_light","%s ON: %s | lux=%.0f | light=%.0f/%.0f min | h=%d",
                             label, dec.reason, cur_lux, dec.qualified_light_minutes, dec.target_light_minutes, time.hour);
                  } else if(!dec.want_on && sw->state){
                    sw->turn_off();
                    ESP_LOGI("grow_light","%s OFF: %s | lux=%.0f | light=%.0f/%.0f min | h=%d",
                             label, dec.reason, cur_lux, dec.qualified_light_minutes, dec.target_light_minutes, time.hour);
                  }
                };
                apply_light("main", id(grow_light_main), main_dec);
                apply_light("grow", id(grow_light_grow), grow_dec);

                id(gl_main_state_text).publish_state(main_dec.want_on ? "ON" : "OFF");
                id(gl_main_reason).publish_state(main_dec.reason);
                id(gl_grow_state_text).publish_state(grow_dec.want_on ? "ON" : "OFF");
                id(gl_grow_reason).publish_state(grow_dec.reason);
                publish_lighting_epoch(id(gl_main_decision_epoch), time.timestamp);
                publish_lighting_epoch(id(gl_grow_decision_epoch), time.timestamp);
                }
            }
          }

              // Log a concise summary at debug level. To see these logs,
              // temporarily raise logger.level in the top-level config.
              ESP_LOGD("summary","%s | Tin %.1f°F VPD %.2f kPa | "
                                 "H1:%d H2:%d F1:%d F2:%d Fog:%d Vent:%d",
                       lbl, Tin, VPD,
                       willHeat1, willHeat2, willFan1, willFan2,
                       willFog, willVent);

              {
                static uint8_t state_log_ctr = 11;
                static Mode state_log_mode = IDLE;
                static MistStage state_log_mist = MIST_WATCH;
                bool state_changed = mode != state_log_mode || (mode == SEALED_MIST && ctl_state.mist_stage != state_log_mist);
                if(state_changed || ++state_log_ctr >= 60){
                  state_log_ctr = 0;
                  state_log_mode = mode;
                  state_log_mist = ctl_state.mist_stage;
                  ESP_LOGI("state","Mode=%s Tin=%.1f°F VPD=%.2f kPa", lbl, Tin, VPD);
                }
              }

          {
              static uint8_t heat_diag_ctr = 0;
              if (++heat_diag_ctr >= 60) {
                  heat_diag_ctr = 0;
                  float S1_thr = Tlow + setpts.heat_hysteresis;
                  float S2_thr = Tlow - dH2;
                  ESP_LOGD("heat_diag",
                      "S1<%.1f S2<%.1f Tin=%.1f Tlow=%.1f hyst=%.1f dH2=%.1f H1:%d H2:%d",
                      S1_thr, S2_thr, Tin, Tlow, setpts.heat_hysteresis, dH2,
                      (int)willHeat1, (int)willHeat2);
              }
          }

              // Expose runtime metrics and economiser state to global variables for HA sensors
              id(runtime_heat1_ms) = R[0].runtime_ms;
              id(runtime_heat2_ms) = R[1].runtime_ms;
              id(runtime_fan1_ms)  = R[2].runtime_ms;
              id(runtime_fan2_ms)  = R[3].runtime_ms;
              id(runtime_fog_ms)   = R[4].runtime_ms;
              id(runtime_vent_ms)  = R[5].runtime_ms;
              id(econ_block_state) = econ_block;
          App.feed_wdt();
  ################################################################################
  # Per-probe watchdog — only reboot if ALL probes silent (not just case)
  # Case probe: 120s timeout. Wall probes: 300s. Only reboot if all 5 fail.
  ################################################################################
  - interval: 60s
    then:
      - lambda: |-
          if(!id(sntp_time).now().is_valid()) return;
          uint32_t now_ms = millis();
          bool case_ok   = (id(last_case_ms) > 0 && (now_ms - id(last_case_ms)) < 120000);
          bool north_ok  = (id(last_north_ms) > 0 && (now_ms - id(last_north_ms)) < 300000);
          bool west_ok   = (id(last_west_ms) > 0 && (now_ms - id(last_west_ms)) < 300000);
          bool south_ok  = (id(last_south_ms) > 0 && (now_ms - id(last_south_ms)) < 300000);
          bool east_ok   = (id(last_east_ms) > 0 && (now_ms - id(last_east_ms)) < 300000);
          bool any_ok = case_ok || north_ok || west_ok || south_ok || east_ok;
          if(!case_ok && id(last_case_ms) > 0){
            ESP_LOGW("watchdog","Case probe stale >120s");
          }
          if(!any_ok && id(last_case_ms) > 0){
            ESP_LOGE("watchdog","ALL probes silent — rebooting");
            esp_restart();
          }


  ################################################################################
  # External probe watchdog – reboot if *all* probes silent > fallback_window_s
  ################################################################################
  - interval: 60s
    then:
      - lambda: |-
          uint32_t now = millis()/1000;
          if(id(last_external_update) > 0 &&
             now > id(last_external_update) &&
             (now - id(last_external_update)) > id(fallback_window_s)){
            ESP_LOGE("watchdog","No probe update >%u s – rebooting", id(fallback_window_s));
            esp_restart();
          }


  ################################################################################
  # 14b — IRRIGATION STATE MACHINE
  #
  # Autonomous drip irrigation with mutual exclusion, fert cycling, VPD boost,
  # optional weather skip, and manual triggers.  Runs independently of WiFi/HA.
  #
  # States: 0=idle, 1=wall_clean, 2=wall_fert, 3=center_clean, 4=center_fert,
  #         5=wall_flush, 6=center_flush, 7=south_mister_fert,
  #         8=west_mister_fert, 9=south_mister_flush, 10=west_mister_flush
  # Queue bitmask: bit0=wall_clean, bit1=wall_fert, bit2=center_clean,
  #                bit3=center_fert, bit4=south_mister_fert,
  #                bit5=west_mister_fert
  ################################################################################
  - interval: 5s
    then:
      - lambda: |-
          static uint32_t irrig_last_ms = millis();
          uint32_t irrig_now = millis();
          uint32_t irrig_dt = (irrig_now < irrig_last_ms) ? 0 : (irrig_now - irrig_last_ms);
          irrig_last_ms = irrig_now;

          // Track which job entered flush (persists across ticks)
          static int flush_origin = 0;

          // ── VPD stress accumulator ──
          float cur_vpd = id(average_vpd_kpa).state;
          float vpd_hi = id(target_vpd_high_kpa);
          if(!isnan(cur_vpd) && cur_vpd > vpd_hi){
            id(irrig_vpd_stress_ms) += irrig_dt;
          }

          // ── Midnight reset ──
          static int irrig_last_doy = -1;
          if(id(sntp_time).now().is_valid()){
            int doy = id(sntp_time).now().day_of_year;
            if(doy != irrig_last_doy && irrig_last_doy != -1){
              id(irrig_vpd_stress_ms) = 0;
              id(runtime_wall_drip_ms) = 0;
              id(runtime_center_drip_ms) = 0;
              id(runtime_fert_master_ms) = 0;
              ESP_LOGI("irrig","Midnight reset — counters cleared");
            }
            irrig_last_doy = doy;
          }

            // ── Runtime tracking ──
            if(id(wall_drips).state)              id(runtime_wall_drip_ms)   += irrig_dt;
            if(id(center_drips).state)            id(runtime_center_drip_ms) += irrig_dt;
            if(id(south_wall_mister_fertilized).state) id(runtime_mister_south_ms) += irrig_dt;
            if(id(west_wall_mister_fertilized).state)  id(runtime_mister_west_ms)  += irrig_dt;
            if(id(fertilizer_master_valve).state) id(runtime_fert_master_ms) += irrig_dt;

            auto wet_now_t = id(sntp_time).now();
            const bool wet_time_valid = wet_now_t.is_valid() && !id(sntp_failed);
            const int wet_now_minute = wet_time_valid
              ? local_minute_of_day(wet_now_t.hour, wet_now_t.minute)
              : 0;
            auto irrig_direct_wet_allowed_zone = [&](int zone) -> bool {
              if(!id(direct_wet_gate_enabled)) return true;
              if(!wet_time_valid) return false;
              float t = id(average_temperature).state;
              if(id(direct_wet_min_temp_f) > 0.0f && (isnan(t) || t < id(direct_wet_min_temp_f))) return false;
              if(zone == 1) {
                return direct_wet_window_open(
                  wet_now_minute,
                  id(activity_start_hour),
                  id(activity_start_minute),
                  id(activity_duration_min),
                  id(direct_wet_south_start_offset_min),
                  id(direct_wet_south_drydown_before_off_min));
              }
              if(zone == 2) {
                return direct_wet_window_open(
                  wet_now_minute,
                  id(activity_start_hour),
                  id(activity_start_minute),
                  id(activity_duration_min),
                  id(direct_wet_west_start_offset_min),
                  id(direct_wet_west_drydown_before_off_min));
              }
              if(zone == 4) {
                return direct_wet_window_open(
                  wet_now_minute,
                  id(activity_start_hour),
                  id(activity_start_minute),
                  id(activity_duration_min),
                  id(direct_wet_wall_start_offset_min),
                  id(direct_wet_wall_drydown_before_off_min));
              }
              if(zone == 3) {
                return direct_wet_window_open(
                  wet_now_minute,
                  id(activity_start_hour),
                  id(activity_start_minute),
                  id(activity_duration_min),
                  id(direct_wet_center_start_offset_min),
                  id(direct_wet_center_drydown_before_off_min));
              }
              return false;
            };
            auto irrig_direct_wet_allowed = [&](bool is_wall) -> bool {
              return irrig_direct_wet_allowed_zone(is_wall ? 4 : 3);
            };
            auto queued_fert_jobs = [&]() -> bool {
              return (id(irrig_queue) & (2 | 8 | 16 | 32)) != 0;
            };
            auto turn_off_all_irrigation = [&]() {
              id(wall_drips).turn_off();
              id(wall_drips_fertilized).turn_off();
              id(south_wall_mister).turn_off();
              id(south_wall_mister_fertilized).turn_off();
              id(west_wall_mister).turn_off();
              id(west_wall_mister_fertilized).turn_off();
              id(center_drips).turn_off();
              id(center_drips_fertilized).turn_off();
              id(fertilizer_master_valve).turn_off();
            };
            if(id(direct_wet_gate_enabled) && id(irrig_state) > 0) {
              bool active_wall = id(irrig_state) == 1 || id(irrig_state) == 2 || id(irrig_state) == 5;
              bool active_south = id(irrig_state) == 7 || id(irrig_state) == 9;
              bool active_west = id(irrig_state) == 8 || id(irrig_state) == 10;
              bool active_center = id(irrig_state) == 3 || id(irrig_state) == 4 || id(irrig_state) == 6;
              if((active_wall && !irrig_direct_wet_allowed(true)) ||
                 (active_south && !irrig_direct_wet_allowed_zone(1)) ||
                 (active_west && !irrig_direct_wet_allowed_zone(2)) ||
                 (active_center && !irrig_direct_wet_allowed(false))) {
                turn_off_all_irrigation();
                id(irrig_state) = 0;
                id(irrig_timer_ms) = 0;
                ESP_LOGW("irrig","STOPPED by direct-wet gate");
              }
            }

            // ── Skip if globally disabled ──
            if(!id(irrig_enabled)) return;

          // ── Schedule check (only when idle, no queue pending) ──
          if(id(irrig_state) == 0 && id(irrig_queue) == 0 &&
             id(sntp_time).now().is_valid() && !id(sntp_failed)){

            auto now_t = id(sntp_time).now();
              int cur_hour = now_t.hour;
              int cur_min  = now_t.minute;
              int cur_doy  = now_t.day_of_year;
              int cur_dow0 = ((int(now_t.day_of_week) + 6) % 7);  // ESPTime: Sun=1 -> 0

            // Weather skip: VPD >= 0.6 kPa AND outdoor temp >= 35°F
            bool weather_ok = true;
            if(id(irrig_weather_skip)){
              float outdoor_t = id(ha_outdoor_temp).state;
              if(isnan(outdoor_t)) outdoor_t = id(pulled_outdoor_temp_f);
              if(!isnan(cur_vpd) && cur_vpd < 0.6f) weather_ok = false;
              if(!isnan(outdoor_t) && outdoor_t < 35.0f) weather_ok = false;
            }

            // Wall schedule
              if(id(irrig_wall_enabled) &&
                 cur_hour == id(irrig_wall_start_hour) &&
                 cur_min  == id(irrig_wall_start_minute) &&
                 (id(irrig_last_wall_doy) == 0 ||
                  ((cur_doy >= id(irrig_last_wall_doy)) ? (cur_doy - id(irrig_last_wall_doy)) : (365 - id(irrig_last_wall_doy) + cur_doy)) >= id(irrig_wall_interval_days))){
                if(!day_mask_allows(id(irrig_wall_days_mask), cur_dow0)){
                  ESP_LOGI("irrig","Wall SKIPPED (day mask) doy=%d", cur_doy);
                  id(irrig_last_wall_doy) = cur_doy;
                } else if(!irrig_direct_wet_allowed(true)){
                  ESP_LOGW("irrig","Wall SKIPPED (direct-wet gate) doy=%d", cur_doy);
                } else if(weather_ok){
                  bool do_fert = id(irrig_wall_fert_days_mask) > 0
                    ? day_mask_allows(id(irrig_wall_fert_days_mask), cur_dow0)
                    : ((id(irrig_wall_fert_every_n) > 0) &&
                      ((id(irrig_wall_cycle_count) % id(irrig_wall_fert_every_n)) == 0));
                  id(irrig_queue) |= do_fert ? (2 | 16 | 32) : 1;
                  ESP_LOGI("irrig","Wall SCHEDULED (%s) doy=%d",
                         do_fert ? "FERT" : "CLEAN", cur_doy);
              } else {
                ESP_LOGI("irrig","Wall SKIPPED (weather) doy=%d", cur_doy);
                id(irrig_last_wall_doy) = cur_doy;
              }
            }

            // Center schedule
              if(id(irrig_center_enabled) &&
                 cur_hour == id(irrig_center_start_hour) &&
                 cur_min  == id(irrig_center_start_minute) &&
                 (id(irrig_last_center_doy) == 0 ||
                  ((cur_doy >= id(irrig_last_center_doy)) ? (cur_doy - id(irrig_last_center_doy)) : (365 - id(irrig_last_center_doy) + cur_doy)) >= id(irrig_center_interval_days))){
                if(!day_mask_allows(id(irrig_center_days_mask), cur_dow0)){
                  ESP_LOGI("irrig","Center SKIPPED (day mask) doy=%d", cur_doy);
                  id(irrig_last_center_doy) = cur_doy;
                } else if(!irrig_direct_wet_allowed(false)){
                  ESP_LOGW("irrig","Center SKIPPED (direct-wet gate) doy=%d", cur_doy);
                } else if(weather_ok){
                  bool do_fert = id(irrig_center_fert_days_mask) > 0
                    ? day_mask_allows(id(irrig_center_fert_days_mask), cur_dow0)
                    : ((id(irrig_center_fert_every_n) > 0) &&
                      ((id(irrig_center_cycle_count) % id(irrig_center_fert_every_n)) == 0));
                  id(irrig_queue) |= do_fert ? 8 : 4;
                ESP_LOGI("irrig","Center SCHEDULED (%s) doy=%d",
                         do_fert ? "FERT" : "CLEAN", cur_doy);
              } else {
                ESP_LOGI("irrig","Center SKIPPED (weather) doy=%d", cur_doy);
                id(irrig_last_center_doy) = cur_doy;
              }
            }
          }

          // ── Dequeue next job (mutual exclusion) ──
          if(id(irrig_state) == 0 && id(irrig_queue) != 0){
            int job = 0;
            int bit = 0;
            if     (id(irrig_queue) & 1){ job = 1; bit = 1; }
            else if(id(irrig_queue) & 2){ job = 2; bit = 2; }
            else if(id(irrig_queue) & 16){ job = 7; bit = 16; }
            else if(id(irrig_queue) & 32){ job = 8; bit = 32; }
            else if(id(irrig_queue) & 4){ job = 3; bit = 4; }
            else if(id(irrig_queue) & 8){ job = 4; bit = 8; }

            if(job > 0){
              id(irrig_queue) &= ~bit;
              int job_zone = (job == 7) ? 1 : (job == 8) ? 2 : (job == 3 || job == 4) ? 3 : 4;
              if(!irrig_direct_wet_allowed_zone(job_zone)){
                const char* drop_zone = (job_zone == 1) ? "SOUTH" : (job_zone == 2) ? "WEST" : (job_zone == 3) ? "CENTER" : "WALL";
                ESP_LOGW("irrig","DROP QUEUED %s job (direct-wet gate)", drop_zone);
                job = 0;
              }
            }

            if(job > 0){
              id(irrig_state) = job;

              bool is_wall = (job == 1 || job == 2);
              bool is_center = (job == 3 || job == 4);
              bool is_south_mister = (job == 7);
              bool is_west_mister = (job == 8);
              bool is_fert = (job == 2 || job == 4 || is_south_mister || is_west_mister);
              int base_min = is_fert
                ? (is_center ? id(irrig_center_fert_duration_min) : id(irrig_wall_fert_duration_min))
                : (is_center ? id(irrig_center_duration_min) : id(irrig_wall_duration_min));

              // VPD boost
              float stress_hrs = float(id(irrig_vpd_stress_ms)) / 3600000.0f;
              if(stress_hrs > id(irrig_vpd_boost_threshold_hrs)){
                float boost = 1.0f + float(id(irrig_vpd_boost_pct)) / 100.0f;
                base_min = int(float(base_min) * boost);
                ESP_LOGI("irrig","VPD boost: %.1fh>%.1fh → %dmin",
                         stress_hrs, id(irrig_vpd_boost_threshold_hrs), base_min);
              }

              id(irrig_timer_ms) = uint32_t(base_min) * 60000UL;

              id(wall_drips).turn_off();
              id(wall_drips_fertilized).turn_off();
              id(south_wall_mister).turn_off();
              id(south_wall_mister_fertilized).turn_off();
              id(west_wall_mister).turn_off();
              id(west_wall_mister_fertilized).turn_off();
              id(center_drips).turn_off();
              id(center_drips_fertilized).turn_off();
              id(center_mister).turn_off();

              // Open fert master if fert run
              if(is_fert) id(fertilizer_master_valve).turn_on();

              // Turn on drip line. sprint-7: count one cycle per dispatch —
              // matches equipment_state's rising-edge count for the
              // underlying relay. Fert/clean increment the same zone
              // counter (audit granularity is per-zone).
              switch(job){
                case 1: id(wall_drips).turn_on();              id(cnt_drip_wall_today)   += 1; break;
                case 2: id(wall_drips_fertilized).turn_on();   id(cnt_drip_wall_today)   += 1; break;
                case 3: id(center_drips).turn_on();            id(cnt_drip_center_today) += 1; break;
                case 4: id(center_drips_fertilized).turn_on(); id(cnt_drip_center_today) += 1; break;
                case 7: id(south_wall_mister_fertilized).turn_on(); id(cnt_mister_south_today) += 1; break;
                case 8: id(west_wall_mister_fertilized).turn_on();  id(cnt_mister_west_today)  += 1; break;
              }

              const char* job_name = (job == 1) ? "WALL_CLEAN" :
                (job == 2) ? "WALL_FERT" :
                (job == 3) ? "CENTER_CLEAN" :
                (job == 4) ? "CENTER_FERT" :
                (job == 7) ? "SOUTH_MISTER_FERT" :
                (job == 8) ? "WEST_MISTER_FERT" : "UNKNOWN";
              ESP_LOGI("irrig","START %s — %dmin", job_name, base_min);
            }
          }

          // ── Active irrigation/fert-mister countdown (states 1-4, 7-8) ──
          if((id(irrig_state) >= 1 && id(irrig_state) <= 4) || id(irrig_state) == 7 || id(irrig_state) == 8){
            if(irrig_dt >= id(irrig_timer_ms)) id(irrig_timer_ms) = 0;
            else id(irrig_timer_ms) -= irrig_dt;

            if(id(irrig_timer_ms) == 0){
              int job = id(irrig_state);
              bool is_wall = (job == 1 || job == 2);
              bool is_center = (job == 3 || job == 4);
              bool is_south_mister = (job == 7);
              bool is_west_mister = (job == 8);
              bool is_fert = (job == 2 || job == 4 || is_south_mister || is_west_mister);

              // Turn off active line
              switch(job){
                case 1: id(wall_drips).turn_off(); break;
                case 2: id(wall_drips_fertilized).turn_off(); break;
                case 3: id(center_drips).turn_off(); break;
                case 4: id(center_drips_fertilized).turn_off(); break;
                case 7: id(south_wall_mister_fertilized).turn_off(); break;
                case 8: id(west_wall_mister_fertilized).turn_off(); break;
              }

              // Fert → flush with clean water
              int flush_min = is_center ? id(irrig_center_flush_min) : id(irrig_wall_flush_min);
              if(is_fert && flush_min > 0){
                flush_origin = job;
                id(irrig_state) = is_center ? 6 : is_south_mister ? 9 : is_west_mister ? 10 : 5;
                id(irrig_timer_ms) = uint32_t(flush_min) * 60000UL;
                // Flush is a separate rising edge on the matching clean relay,
                // so equipment_state and firmware cycle counters stay aligned.
                if(is_south_mister)      { id(south_wall_mister).turn_on(); id(cnt_mister_south_today) += 1; }
                else if(is_west_mister)  { id(west_wall_mister).turn_on();  id(cnt_mister_west_today)  += 1; }
                else if(is_center)       { id(center_drips).turn_on();      id(cnt_drip_center_today)  += 1; }
                else                     { id(wall_drips).turn_on();        id(cnt_drip_wall_today)    += 1; }
                const char* flush_name = is_south_mister ? "SOUTH_MISTER" : is_west_mister ? "WEST_MISTER" : is_center ? "CENTER" : "WALL";
                ESP_LOGI("irrig","FLUSH %s — %dmin", flush_name, flush_min);
              } else {
                // Done — finalize
                if(is_wall){
                  id(irrig_wall_cycle_count) += 1;
                  if(id(sntp_time).now().is_valid())
                    id(irrig_last_wall_doy) = id(sntp_time).now().day_of_year;
                  ESP_LOGI("irrig","DONE WALL (cycle #%d)", id(irrig_wall_cycle_count));
                } else if(is_center) {
                  id(irrig_center_cycle_count) += 1;
                  if(id(sntp_time).now().is_valid())
                    id(irrig_last_center_doy) = id(sntp_time).now().day_of_year;
                  ESP_LOGI("irrig","DONE CENTER (cycle #%d)", id(irrig_center_cycle_count));
                } else {
                  ESP_LOGI("irrig","DONE %s_MISTER_FERT", is_south_mister ? "SOUTH" : "WEST");
                }
                // Close fert master if no fert queued
                if(is_fert && !queued_fert_jobs()){
                  id(fertilizer_master_valve).turn_off();
                }
                id(irrig_state) = 0;
              }
            }
          }

          // ── Flush countdown (states 5-6 drip, 9-10 mister) ──
          if(id(irrig_state) == 5 || id(irrig_state) == 6 || id(irrig_state) == 9 || id(irrig_state) == 10){
            if(irrig_dt >= id(irrig_timer_ms)) id(irrig_timer_ms) = 0;
            else id(irrig_timer_ms) -= irrig_dt;

            if(id(irrig_timer_ms) == 0){
              bool is_wall = (id(irrig_state) == 5);
              bool is_center = (id(irrig_state) == 6);
              bool is_south_mister = (id(irrig_state) == 9);
              bool is_west_mister = (id(irrig_state) == 10);

              // Turn off flush line
              if(is_wall)             id(wall_drips).turn_off();
              else if(is_center)      id(center_drips).turn_off();
              else if(is_south_mister) id(south_wall_mister).turn_off();
              else if(is_west_mister)  id(west_wall_mister).turn_off();

              // Close fert master if no fert queued
              if(!queued_fert_jobs()){
                id(fertilizer_master_valve).turn_off();
              }

              // Finalize
              if(is_wall){
                id(irrig_wall_cycle_count) += 1;
                if(id(sntp_time).now().is_valid())
                  id(irrig_last_wall_doy) = id(sntp_time).now().day_of_year;
                ESP_LOGI("irrig","DONE WALL+FLUSH (cycle #%d)", id(irrig_wall_cycle_count));
              } else if(is_center) {
                id(irrig_center_cycle_count) += 1;
                if(id(sntp_time).now().is_valid())
                  id(irrig_last_center_doy) = id(sntp_time).now().day_of_year;
                ESP_LOGI("irrig","DONE CENTER+FLUSH (cycle #%d)", id(irrig_center_cycle_count));
              } else {
                ESP_LOGI("irrig","DONE %s_MISTER+FLUSH", is_south_mister ? "SOUTH" : "WEST");
              }

              id(irrig_state) = 0;
            }
          }

################################################################################
# HEAP PROFILE — low-rate fallback fragmentation telemetry.
################################################################################
  - interval: 900s
    startup_delay: 90s
    then:
      - lambda: |-
          ESP_LOGD("heap", "Heap profile: free=%.1f kB min=%.1f kB largest=%.1f kB",
                   gh_free_heap_kb(),
                   gh_min_free_heap_kb(),
                   gh_largest_free_heap_block_kb());

