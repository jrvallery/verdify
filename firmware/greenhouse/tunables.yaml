###############################################################################
# greenhouse/tunables.yaml -- user-adjustable settings exposed to Home Assistant
###############################################################################

number:
  # --- Temperature band (°F) -----------------------------------------
  - platform: template
    id: num_temp_low
    name: "Set Temp Low °F"
    min_value: 40
    max_value: 80
    step: 0.5
    lambda: "return id(target_temp_low_f);"
    set_action:
      - lambda: |
          id(target_temp_low_f) = x;
          id(num_temp_low).publish_state(x);

  - platform: template
    id: num_temp_high
    name: "Set Temp High °F"
    min_value: 60
    max_value: 100
    step: 0.5
    lambda: "return id(target_temp_high_f);"
    set_action:
      - lambda: |
          id(target_temp_high_f) = x;
          id(num_temp_high).publish_state(x);

  # --- Stage‑2 deltas (°F) -------------------------------------------
  - platform: template
    id: num_stage2_heat
    name: "Δ Heat Stage‑2 °F"
    min_value: 2
    max_value: 15
    step: 0.5
    lambda: "return id(stage2_heat_delta_f);"
    set_action:
