# ─────────────────────────────── BOOL SWITCHES ────────────────────────────────
# These template switches expose boolean configuration flags to Home Assistant.
# Users can toggle these switches in the UI, which updates the corresponding
# global variables.  Each switch publishes its new state so HA stays in sync.
switch:
  # Grow light auto mode — enable DLI-based supplementation
  - platform: template
    id: sw_gl_auto
    name: "GL Auto Mode"
    icon: mdi:lightbulb-auto
    optimistic: false
    restore_mode: RESTORE_DEFAULT_ON
    lambda: "return id(gl_auto_enabled);"
    turn_on_action:
      - lambda: |
          id(gl_auto_enabled) = true;
          id(sw_gl_auto).publish_state(true);
          ESP_LOGI("grow_light","Auto mode ENABLED");
    turn_off_action:
      - lambda: |
          id(gl_auto_enabled) = false;
          id(sw_gl_auto).publish_state(false);
          ESP_LOGI("grow_light","Auto mode DISABLED");

  # Close vent during fog pulses to prevent dry air infiltration
  - platform: template
    id: sw_fog_closes_vent
    name: "Fog Closes Vent"
    restore_mode: RESTORE_DEFAULT_OFF
    lambda: 'return id(fog_closes_vent);'
    turn_on_action:
      - lambda: |
          id(fog_closes_vent) = true;
          id(sw_fog_closes_vent).publish_state(true);
    turn_off_action:
      - lambda: |
          id(fog_closes_vent) = false;
          id(sw_fog_closes_vent).publish_state(false);

  # Close vent during mister pulses to trap humidity
  - platform: template
    id: sw_mister_closes_vent
    name: "Mister Closes Vent"
    restore_mode: RESTORE_DEFAULT_OFF
    lambda: 'return id(mister_closes_vent);'
    turn_on_action:
      - lambda: |
          id(mister_closes_vent) = true;
          id(sw_mister_closes_vent).publish_state(true);
    turn_off_action:
      - lambda: |
          id(mister_closes_vent) = false;
          id(sw_mister_closes_vent).publish_state(false);

  # Enable/disable economiser (enthalpy gate for venting)
  - platform: template
    id: sw_economiser_enabled
    name: "Economiser Enabled"
    restore_mode: RESTORE_DEFAULT_ON
    lambda: 'return id(economiser_enabled);'
    turn_on_action:
      - lambda: |
          id(economiser_enabled) = true;
          id(sw_economiser_enabled).publish_state(true);
    turn_off_action:
      - lambda: |
          id(economiser_enabled) = false;
          id(sw_economiser_enabled).publish_state(false);


  # Irrigation master enable
  - platform: template
    id: sw_irrig_enabled
    name: "Irrigation Enabled"
    restore_mode: RESTORE_DEFAULT_ON
    lambda: 'return id(irrig_enabled);'
    turn_on_action:
      - lambda: |
          id(irrig_enabled) = true;
          id(sw_irrig_enabled).publish_state(true);
    turn_off_action:
      - lambda: |
          id(irrig_enabled) = false;
          id(sw_irrig_enabled).publish_state(false);

  # Wall drip enable
  - platform: template
    id: sw_irrig_wall_enabled
    name: "Irrigation Wall Enabled"
    restore_mode: RESTORE_DEFAULT_ON
    lambda: 'return id(irrig_wall_enabled);'
    turn_on_action:
      - lambda: |
          id(irrig_wall_enabled) = true;
          id(sw_irrig_wall_enabled).publish_state(true);
    turn_off_action:
      - lambda: |
          id(irrig_wall_enabled) = false;
          id(sw_irrig_wall_enabled).publish_state(false);

  # Center drip enable
  - platform: template
    id: sw_irrig_center_enabled
    name: "Irrigation Center Enabled"
    restore_mode: RESTORE_DEFAULT_OFF
    lambda: 'return id(irrig_center_enabled);'
    turn_on_action:
      - lambda: |
          id(irrig_center_enabled) = true;
          id(sw_irrig_center_enabled).publish_state(true);
    turn_off_action:
      - lambda: |
          id(irrig_center_enabled) = false;
          id(sw_irrig_center_enabled).publish_state(false);

  # Weather skip enable
  - platform: template
    id: sw_irrig_weather_skip
    name: "Irrigation Weather Skip"
    restore_mode: RESTORE_DEFAULT_OFF
    lambda: 'return id(irrig_weather_skip);'
    turn_on_action:
      - lambda: |
          id(irrig_weather_skip) = true;
          id(sw_irrig_weather_skip).publish_state(true);
    turn_off_action:
      - lambda: |
          id(irrig_weather_skip) = false;
          id(sw_irrig_weather_skip).publish_state(false);

  # Occupancy mist/fog inhibit — blocks misters and fogger when greenhouse is occupied
  - platform: template
    id: sw_occupancy_inhibit
    name: "Occupancy Mist Inhibit"
    icon: "mdi:account-cancel"
    restore_mode: RESTORE_DEFAULT_ON
    lambda: 'return id(occupancy_inhibit_enabled);'
    turn_on_action:
      - lambda: |
          id(occupancy_inhibit_enabled) = true;
          id(sw_occupancy_inhibit).publish_state(true);
    turn_off_action:
      - lambda: |
          id(occupancy_inhibit_enabled) = false;
          id(sw_occupancy_inhibit).publish_state(false);

# ─── IRRIGATION MANUAL TRIGGER BUTTONS ────────────────────────────────────────
button:
  - platform: template
    id: btn_wall_clean
    name: "Wall Drips - RUN CLEAN"
    on_press:
      - lambda: |-
          id(irrig_queue) |= 1;
          ESP_LOGI("irrig","Manual: WALL CLEAN queued");

  - platform: template
    id: btn_wall_fert
    name: "Wall Drips - RUN FERT"
    on_press:
      - lambda: |-
          id(irrig_queue) |= 2;
          ESP_LOGI("irrig","Manual: WALL FERT queued");

  - platform: template
