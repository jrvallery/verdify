###############################################################################
# greenhouse/hardware.yaml -- Hardware implementation for greenhouse
#
# Defines text sensors, I²C/UART/Modbus configuration and all GPIO relays.
###############################################################################

# ───────────────────── Boot-info sensors ─────────────────────
text_sensor:
  - platform: template
    id: ts_last_boot
    name: "Last Boot"
    icon: mdi:clock-start
    entity_category: diagnostic
    update_interval: 60s
    lambda: |-
      if (!id(sntp_time).now().is_valid())   // SNTP not yet synced
        return {};
      uint32_t up = (uint32_t) id(uptime_seconds).state;
      time_t boot_ts = id(sntp_time).now().timestamp - up;
      char buf[25];
      strftime(buf, sizeof(buf), "%Y-%m-%d %H:%M:%S", localtime(&boot_ts));
      return {buf};

  - platform: template
    id: ts_boot_reason
    name: "Reset Reason"
    icon: mdi:restart
    entity_category: diagnostic
    update_interval: 60s
    lambda: |-
      switch (esp_reset_reason()) {
        case ESP_RST_POWERON:   return {"Power-on"};
        case ESP_RST_EXT:       return {"External reset"};
        case ESP_RST_SW:        return {"Software reset"};
        case ESP_RST_PANIC:     return {"Guru/Panic"};
        case ESP_RST_INT_WDT:   return {"Interrupt WDT"};
        case ESP_RST_TASK_WDT:  return {"Task WDT"};
        case ESP_RST_WDT:       return {"Other WDT"};
        case ESP_RST_DEEPSLEEP: return {"Deep-sleep wake"};
        case ESP_RST_BROWNOUT:  return {"Brown-out"};
        case ESP_RST_SDIO:      return {"SDIO reset"};
        default:                return { std::to_string(esp_reset_reason()) };
      }

  - platform: wifi_info
    ip_address:
      name: "IP Address"
      entity_category: diagnostic
    ssid:
      name: "WiFi SSID"
      entity_category: diagnostic
    mac_address:
      name: "MAC Address"
      entity_category: diagnostic

  - platform: template
    id: gh_state
    name: "Greenhouse State"
    entity_category: diagnostic
    update_interval: 5s

  - platform: template
    id: ts_lead_fan
    name: "Lead Fan"
    entity_category: diagnostic
    update_interval: 30s
    lambda: |-
      return { id(fan_lead_is_fan1) ? "Fan 1" : "Fan 2" };

  - platform: template
    id: ctl_snapshot_json
    name: "Greenhouse Snapshot (JSON)"
    internal: true

# ───────────────────── I²C / UART / Modbus ─────────────────────
i2c:
  sda: GPIO16
  scl: GPIO15
  scan: true

pcf8574:
  - id: pcf_out_1
    address: 0x21
  - id: pcf_out_2
    address: 0x25
  - id: pcf_in_2
    address: 0x24

uart:
  id: rs485_uart
  tx_pin: GPIO32
  rx_pin: GPIO13
  baud_rate: 9600

modbus:
  id: modbus_main
  uart_id: rs485_uart

modbus_controller:
  - id: case_probe
    address: 1
    modbus_id: modbus_main
    update_interval: 5s
  - id: north_wall_probe
    address: 2
    modbus_id: modbus_main
    update_interval: 10s
  - id: west_wall_probe
    address: 3
    modbus_id: modbus_main
    update_interval: 10s
  - id: south_wall_probe
    address: 4
    modbus_id: modbus_main
    update_interval: 10s
  - id: east_wall_probe
    address: 5
    modbus_id: modbus_main
    update_interval: 10s
  - id: exterior_intake_probe
    address: 6
    modbus_id: modbus_main
    update_interval: 10s
  # ── Soil sensors (DFRobot SEN0600/SEN0601, Modbus RTU 9600 8N1) ──
  # Addr 7: SEN0601 south-1 (moisture+temp+EC), Addr 8: SEN0600 south-2, Addr 9: SEN0600 west
  - id: south_1_soil_probe
    address: 7
    modbus_id: modbus_main
    update_interval: 60s
    command_throttle: 200ms
  - id: south_2_soil_probe
    address: 8
    modbus_id: modbus_main
    update_interval: 60s
    command_throttle: 200ms
  - id: west_soil_probe
    address: 9
    modbus_id: modbus_main
    update_interval: 60s
    command_throttle: 200ms

# ───────────────────── SWITCHES (relays & templates) ─────────────────────
switch:
  # --- Internal climate relays (hidden from HA) ---
  - platform: gpio
    id: fan1_rly
    pin:
      pcf8574: pcf_out_2
      number: 3
      mode: OUTPUT
      inverted: true
    internal: true
    restore_mode: RESTORE_DEFAULT_OFF

  - platform: gpio
    id: fan2_rly
    pin:
      pcf8574: pcf_out_2
      number: 4
      mode: OUTPUT
      inverted: true
    internal: true
    restore_mode: RESTORE_DEFAULT_OFF

  - platform: gpio
    id: vent_rly
    pin:
      pcf8574: pcf_out_2
      number: 5
      mode: OUTPUT
      inverted: true
    internal: true
    restore_mode: RESTORE_DEFAULT_OFF

  - platform: gpio
    id: fog_rly
    pin:
      pcf8574: pcf_out_2
      number: 6
      mode: OUTPUT
      inverted: true
    internal: true
    restore_mode: RESTORE_DEFAULT_OFF

  - platform: gpio
    id: heat1_rly
    pin:
      pcf8574: pcf_out_2
      number: 7
      mode: OUTPUT
      inverted: true
    internal: true
    restore_mode: RESTORE_DEFAULT_OFF

  - platform: gpio
    id: heat2_rly
    pin:
      pcf8574: pcf_out_2
      number: 2
      mode: OUTPUT
      inverted: true
    internal: true
    restore_mode: RESTORE_DEFAULT_OFF

  # --- Irrigation / mister relays (visible) -----
  - platform: gpio
    id: west_wall_mister
    name: "Mister • West Wall"
    pin:
      pcf8574: pcf_out_1
      number: 0
      mode: OUTPUT
      inverted: true
    restore_mode: RESTORE_DEFAULT_OFF

  - platform: gpio
    id: west_wall_mister_fertilized
    name: "Mister • West Wall (Fert.)"
    pin:
      pcf8574: pcf_out_1
      number: 1
      mode: OUTPUT
      inverted: true
    restore_mode: RESTORE_DEFAULT_OFF

  - platform: gpio
    id: south_wall_mister_fertilized
    name: "Mister • South Wall (Fert.)"
    pin:
      pcf8574: pcf_out_1
      number: 2
      mode: OUTPUT
      inverted: true
    restore_mode: RESTORE_DEFAULT_OFF

  - platform: gpio
    id: south_wall_mister
    name: "Mister • South Wall"
    pin:
      pcf8574: pcf_out_1
      number: 3
      mode: OUTPUT
      inverted: true
    restore_mode: RESTORE_DEFAULT_OFF

  - platform: gpio
    id: wall_drips
    name: "Drip • Wall"
    pin:
      pcf8574: pcf_out_1
      number: 4
      mode: OUTPUT
      inverted: true
    restore_mode: RESTORE_DEFAULT_OFF

  - platform: gpio
    id: center_mister
    name: "Mister • Center"
    pin:
      pcf8574: pcf_out_1
      number: 5
      mode: OUTPUT
      inverted: true
    restore_mode: RESTORE_DEFAULT_OFF

  - platform: gpio
    id: center_drips_fertilized
    name: "Drip • Center (Fert.)"
    pin:
      pcf8574: pcf_out_1
      number: 6
      mode: OUTPUT
      inverted: true
    restore_mode: RESTORE_DEFAULT_OFF

  - platform: gpio
    id: center_drips
    name: "Drip • Center"
    pin:
      pcf8574: pcf_out_1
      number: 7
      mode: OUTPUT
      inverted: true
    restore_mode: RESTORE_DEFAULT_OFF

  - platform: gpio
    id: wall_drips_fertilized
    name: "Drip • Wall (Fert.)"
    pin:
      pcf8574: pcf_out_2
      number: 0
      mode: OUTPUT
      inverted: true
    restore_mode: RESTORE_DEFAULT_OFF

  - platform: gpio
    id: fertilizer_master_valve
    name: "Valve • Fert. Master"
    pin:
      pcf8574: pcf_out_2
      number: 1
      mode: OUTPUT
      inverted: true
    restore_mode: RESTORE_DEFAULT_OFF

  # --- Grow lights (direct HA REST API, no middleman) ---
  # HA at home.vallery.net (192.168.30.107), Lutron Caseta entities
  # Uses long-lived access token for auth
  - platform: template
    id: grow_light_main
    name: "Grow Light Main"
    icon: mdi:lightbulb
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    turn_on_action:
      - http_request.post:
          url: "http://192.168.30.107:8123/api/services/switch/turn_on"
          request_headers:
            Authorization: !secret ha_bearer_token
            Content-Type: "application/json"
          body: '{"entity_id": "switch.greenhouse_main"}'
      - lambda: 'ESP_LOGI("lights", "Main lights ON via HA API");'
    turn_off_action:
      - http_request.post:
          url: "http://192.168.30.107:8123/api/services/switch/turn_off"
          request_headers:
            Authorization: !secret ha_bearer_token
            Content-Type: "application/json"
          body: '{"entity_id": "switch.greenhouse_main"}'
      - lambda: 'ESP_LOGI("lights", "Main lights OFF via HA API");'

  - platform: template
    id: grow_light_grow
    name: "Grow Light Grow"
    icon: mdi:lightbulb
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    turn_on_action:
      - http_request.post:
          url: "http://192.168.30.107:8123/api/services/switch/turn_on"
          request_headers:
            Authorization: !secret ha_bearer_token
            Content-Type: "application/json"
          body: '{"entity_id": "switch.greenhouse_grow"}'
      - lambda: 'ESP_LOGI("lights", "Grow lights ON via HA API");'
    turn_off_action:
      - http_request.post:
          url: "http://192.168.30.107:8123/api/services/switch/turn_off"
          request_headers:
            Authorization: !secret ha_bearer_token
            Content-Type: "application/json"
          body: '{"entity_id": "switch.greenhouse_grow"}'
      - lambda: 'ESP_LOGI("lights", "Grow lights OFF via HA API");'

