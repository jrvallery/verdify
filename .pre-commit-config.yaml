repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Must stay within one minor of the ruff CI installs (unpinned `pip install ruff`).
    # v0.11 and v0.15 disagree on how `mcp.server.fastmcp` is classified in isort —
    # leaving them apart causes a commit/CI ping-pong on mcp/server.py import order.
    rev: v0.15.10
    hooks:
      - id: ruff
        args: [--config, pyproject.toml, --fix, --exit-non-zero-on-fix]
      - id: ruff-format
        args: [--config, pyproject.toml, --check]

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: '\.md$'
      - id: end-of-file-fixer
        exclude: '\.md$'
      - id: check-yaml
        args: [--allow-multiple-documents]
        exclude: 'firmware/'  # ESPHome YAML has special syntax
      - id: check-json
      - id: check-merge-conflict
      - id: detect-private-key
