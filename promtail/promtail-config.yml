server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://192.168.30.100:3100/loki/api/v1/push

scrape_configs:
  # ── Docker container logs (all 7 verdify containers) ──
  - job_name: verdify-docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: label
            values: ["com.docker.compose.project=verdify"]
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: container
      - source_labels: ['__meta_docker_container_name']
        regex: '/verdify-(.*)'
        target_label: service
      - target_label: job
        replacement: verdify-docker
      - target_label: host
        replacement: iris
      - target_label: project
        replacement: verdify

  # NOTE: Systemd journal requires a special Promtail build with journal support.
  # The standard Docker image doesn't include it. Ingestor/MCP logs are captured
  # via their Docker container output (if containerized) or via state/*.log files.

  # ── Application state logs ──
  - job_name: verdify-state-logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: verdify-app-logs
          host: iris
          project: verdify
          __path__: /srv/verdify/state/*.log
