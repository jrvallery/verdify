server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    absolute_redirect off;

    location ~ ^(.+)/$ {
        if (-f $document_root$uri/index.html) {
            rewrite ^ $uri/index.html break;
        }
        return 301 $1$is_args$args;
    }

    location / {
        try_files $uri $uri.html $uri/index.html =404;
    }

    # No caching for JS/CSS (development/iteration phase)
    location ~* \.(css|js)$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Self-hosted launch video streams
    location ~* \.m3u8$ {
        types { application/vnd.apple.mpegurl m3u8; }
        default_type application/vnd.apple.mpegurl;
        add_header Cache-Control "public, max-age=300";
    }

    location ~* \.ts$ {
        types { video/mp2t ts; }
        default_type video/mp2t;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    location ~* \.(mp4|m4v)$ {
        types { video/mp4 mp4 m4v; }
        default_type video/mp4;
        add_header Cache-Control "public, max-age=2592000, immutable";
        add_header Accept-Ranges bytes;
    }

    # Cache images
    location ~* \.(png|jpg|jpeg|gif|ico|svg|woff|woff2|webp)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    error_page 404 /404.html;
}
