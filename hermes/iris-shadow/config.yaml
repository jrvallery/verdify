# Hermes profile config for the SHADOW Iris (Phase 6 shadow week).
#
# Identical to hermes/iris/config.yaml except for the MCP server URL:
# shadow Iris points at mcp/server_shadow.py (port 8001) so all write
# tools (set_plan / set_tunable / plan_evaluate / lessons_manage) land
# in the *_shadow tables. Production setpoints are never touched during
# the shadow week.
#
# Brought up via `docker compose --profile shadow up -d hermes-iris-shadow`.

model:
  provider: openai
  model: gpt-5.5
  reasoning_effort: high
  api_key_env: OPENAI_API_KEY

agent:
  max_turns: 30
  disabled_toolsets:
    - memory
    - web
    - terminal
    - filesystem
    - browser

mcp_servers:
  verdify_greenhouse_shadow:
    # ← The only material difference from production hermes/iris/config.yaml
    url: "http://verdify-mcp:8001/mcp"
    headers:
      Authorization: "Bearer ${VERDIFY_MCP_TOKEN}"
    tools:
      include:
        - climate
        - scorecard
        - equipment_state
        - forecast
        - get_setpoints
        - plan_status
        - history
        - alerts
        - lessons
        - lessons_search
        - knowledge_search
        - crops
        - observations
        - topology
        - position_current
        - crop_history
        - crop_lifecycle
        - set_plan
        - set_tunable
        - acknowledge_trigger
        - plan_evaluate
        - lessons_manage
      exclude:
        - query
      resources: false
      prompts: false

skills:
  guard_agent_created: true

api_server:
  enabled: true
  host: "0.0.0.0"
  port: 8642        # internal container port; docker-compose binds 127.0.0.1:8643
  api_key_env: HERMES_IRIS_SHADOW_API_KEY

dashboard:
  enabled: false
